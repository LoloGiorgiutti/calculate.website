<style>
:root{
  --bg:#F7F8FA;--surface:#fff;--ink:#0A0E1A;--ink-2:#363B4F;--ink-3:#858AA0;
  --line:#E4E7EE;--line-2:#EFF1F6;--accent:#4F6BFF;--accent-soft:#EEF1FF;
  --dark:#0A0E1A;--red:#E53E3E;--green:#10B981;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

/* Header */
header{background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:100;display:flex;align-items:center;height:58px;padding:0 20px}
.logo{font-size:16px;font-weight:700;letter-spacing:-0.03em;color:var(--ink)}
.logo span{color:var(--accent)}

/* Hero */
.hero{background:var(--dark);color:#fff;padding:28px 20px 24px;text-align:center}
.breadcrumb{font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,.4);margin-bottom:14px;letter-spacing:.03em}
.breadcrumb a{color:rgba(255,255,255,.4)}
.breadcrumb a:hover{color:rgba(255,255,255,.7)}
h1{font-size:clamp(22px,4vw,30px);font-weight:700;letter-spacing:-0.03em;margin-bottom:6px}
.hero-sub{font-size:14px;color:rgba(255,255,255,.55)}

.main{max-width:720px;margin:0 auto;padding:24px 20px 80px}

/* Toggle */
.view-toggle{display:inline-flex;background:var(--surface);border:1.5px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:20px}
.view-toggle button{padding:8px 22px;border:none;background:transparent;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:var(--ink-3);cursor:pointer;transition:all .15s}
.view-toggle button.active{background:var(--accent);color:#fff}

/* ══ VISTA MENSUAL ══ */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-nav-center{display:flex;align-items:center;gap:10px}
.cal-nav-title{font-size:20px;font-weight:700;letter-spacing:-0.02em;color:var(--ink)}
.nav-btn{width:36px;height:36px;border:1.5px solid var(--line);background:var(--surface);border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-3);transition:all .15s;font-size:18px;line-height:1}
.nav-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.today-btn{padding:7px 14px;border:1.5px solid var(--line);background:var(--surface);border-radius:9px;cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;color:var(--ink-3);transition:all .15s}
.today-btn:hover{border-color:var(--accent);color:var(--accent)}

.cal-wrap{background:var(--surface);border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-bottom:16px}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--line-2)}
.cal-head div{padding:10px 0;text-align:center;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3)}
.cal-head div.sun-col{color:var(--red)}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-day{min-height:70px;padding:8px 10px;border-right:1px solid var(--line-2);border-bottom:1px solid var(--line-2);cursor:pointer;transition:background .12s;display:flex;flex-direction:column;gap:2px;position:relative}
.cal-day:nth-child(7n){border-right:none}
.cal-day:hover:not(.other-month){background:var(--accent-soft)}
.cal-day.other-month{background:#FAFBFD;cursor:default}
.cal-day.other-month .day-num{color:#CDD0DA}
.cal-day.today{background:var(--accent-soft)}
.cal-day.today .day-num{background:var(--accent);color:#fff;border-radius:50%;font-weight:700}
.cal-day.selected{outline:2px solid var(--accent);outline-offset:-2px;background:var(--accent-soft)}
.cal-day.sun-day:not(.other-month) .day-num{color:var(--red)}
.cal-day.holiday:not(.other-month)::after{content:'';position:absolute;bottom:6px;right:8px;width:5px;height:5px;background:var(--green);border-radius:50%}

.day-num{font-size:13px;font-weight:600;color:var(--ink);width:26px;height:26px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.day-holiday-label{font-size:9px;color:var(--green);font-weight:600;line-height:1.2;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

/* Info día */
.day-info{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:20px 24px;margin-bottom:16px}
.di-title{font-size:16px;font-weight:700;letter-spacing:-0.02em;margin-bottom:4px;color:var(--ink)}
.di-holiday{font-size:12px;color:var(--green);font-weight:600;margin-bottom:14px}
.di-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.di-item{background:var(--bg);border-radius:10px;padding:12px 14px}
.di-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);margin-bottom:4px}
.di-val{font-size:15px;font-weight:700;color:var(--ink)}
.di-val.accent{color:var(--accent)}

/* ══ VISTA ANUAL ══ */
.year-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.year-nav-title{font-size:22px;font-weight:700;letter-spacing:-0.02em;color:var(--ink)}

.year-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}

.mini-cal{background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.mini-head{background:var(--bg);padding:10px 12px 8px;border-bottom:1px solid var(--line-2);display:flex;align-items:center;justify-content:space-between}
.mini-month-name{font-size:13px;font-weight:700;color:var(--ink);cursor:pointer;transition:color .12s}
.mini-month-name:hover{color:var(--accent)}
.mini-year-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-3)}

.mini-dow{display:grid;grid-template-columns:repeat(7,1fr);padding:5px 8px 3px}
.mini-dow span{font-size:9px;font-weight:700;color:var(--ink-3);text-align:center}
.mini-dow span.sun{color:var(--red)}

.mini-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:2px 8px 8px;gap:1px}
.mini-d{font-size:11px;font-weight:500;color:var(--ink-2);text-align:center;padding:3px 1px;border-radius:4px;cursor:pointer;transition:background .1s;position:relative}
.mini-d:hover:not(.mini-other){background:var(--accent-soft);color:var(--accent)}
.mini-d.mini-other{color:#CDD0DA;cursor:default}
.mini-d.mini-sun:not(.mini-other){color:var(--red)}
.mini-d.mini-today{background:var(--accent) !important;color:#fff !important;border-radius:50%;font-weight:700}
.mini-d.mini-holiday:not(.mini-other)::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:3px;height:3px;background:var(--green);border-radius:50%}

/* Leyenda */
.legend{display:flex;align-items:center;gap:20px;margin-bottom:16px;font-size:12px;color:var(--ink-3)}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-dot{width:8px;height:8px;border-radius:50%}

@media(max-width:600px){
  .year-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .di-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:380px){
  .year-grid{grid-template-columns:1fr}
}
@media(max-width:480px){
  .cal-day{min-height:48px;padding:5px 4px}
  .cal-head div{font-size:10px;padding:8px 0}
  .day-num{font-size:12px;width:22px;height:22px}
  .cal-day.today .day-num{width:22px;height:22px}
  .day-holiday-label{display:none}
  .di-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<header>
  <a href="/" class="logo">Calculadora<span>.live</span></a>

<div class="hero">
  <div class="breadcrumb"><a href="/">Inicio</a> / <a href="/fechas/">Fechas</a> / Calendario</div>
  <h1>Calendario</h1>
  <p class="hero-sub">Vista mensual y anual · Feriados nacionales · Datos de cada día</p>
</div>

<div class="main">

  <div class="view-toggle">
    <button id="btn-mes" class="active" onclick="setView('mes')">Mes</button>
    <button id="btn-year" onclick="setView('year')">Año</button>
  </div>

  <!-- ══ VISTA MENSUAL ══ -->
  <div id="view-mes">
    <div class="cal-nav">
      <button class="nav-btn" onclick="cambiarMes(-1)">&#8249;</button>
      <div class="cal-nav-center">
        <span class="cal-nav-title" id="nav-title"></span>
        <button class="today-btn" onclick="irHoy()">Hoy</button>
      </div>
      <button class="nav-btn" onclick="cambiarMes(1)">&#8250;</button>
    </div>

    <div class="cal-wrap">
      <div class="cal-head">
        <div>Lun</div><div>Mar</div><div>Mié</div>
        <div>Jue</div><div>Vie</div><div>Sáb</div>
        <div class="sun-col">Dom</div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> Feriado nacional</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> Hoy</div>
      <div class="legend-item" style="color:var(--red);font-weight:600">Dom · Domingos</div>
    </div>

    <div class="day-info" id="day-info" style="display:none">
      <div class="di-title" id="di-title"></div>
      <div class="di-holiday" id="di-holiday" style="display:none"></div>
      <div class="di-grid" id="di-grid"></div>
    </div>
  </div>

  <!-- ══ VISTA ANUAL ══ -->
  <div id="view-year" style="display:none">
    <div class="year-nav">
      <button class="nav-btn" onclick="cambiarYear(-1)">&#8249;</button>
      <span class="year-nav-title" id="year-title"></span>
      <button class="nav-btn" onclick="cambiarYear(1)">&#8250;</button>
    </div>
    <div class="legend" style="margin-top:-8px">
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> Feriado</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> Hoy</div>
    </div>
    <div class="year-grid" id="year-grid"></div>
  </div>

</div>

<script src="/nav.js"></script>
<script>
var DIAS   = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
var MESES  = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
var ESTACIONES = [
  [[-1,12,1],[2,28,2],[3,1,3],[5,31,3]],  // unused placeholder; see getEstacion()
];

var hoy      = new Date();
var curYear  = hoy.getFullYear();
var curMonth = hoy.getMonth();
var viewYear = hoy.getFullYear();

/* ── Feriados fijos Argentina (MM-DD) ── */
var FERIADOS_FIJOS = {
  '01-01': 'Año Nuevo',
  '03-24': 'Día de la Memoria por la Verdad y la Justicia',
  '04-02': 'Día del Veterano y los Caídos en Malvinas',
  '05-01': 'Día del Trabajador',
  '05-25': 'Revolución de Mayo',
  '06-20': 'Paso a la Inmortalidad del Gral. Belgrano',
  '07-09': 'Día de la Independencia',
  '12-08': 'Inmaculada Concepción de María',
  '12-25': 'Navidad',
};

/* Feriados variables por año (calculados o hardcoded para años cercanos) */
var FERIADOS_VAR = {
  2025: {
    '03-03': 'Carnaval', '03-04': 'Carnaval',
    '04-18': 'Viernes Santo',
    '08-18': 'Paso a la Inmortalidad del Gral. San Martín',
    '10-13': 'Día del Respeto a la Diversidad Cultural',
    '11-24': 'Día de la Soberanía Nacional',
  },
  2026: {
    '02-16': 'Carnaval', '02-17': 'Carnaval',
    '04-03': 'Viernes Santo',
    '08-17': 'Paso a la Inmortalidad del Gral. San Martín',
    '10-12': 'Día del Respeto a la Diversidad Cultural',
    '11-23': 'Día de la Soberanía Nacional',
  },
  2027: {
    '02-08': 'Carnaval', '02-09': 'Carnaval',
    '03-26': 'Viernes Santo',
    '08-16': 'Paso a la Inmortalidad del Gral. San Martín',
    '10-11': 'Día del Respeto a la Diversidad Cultural',
    '11-22': 'Día de la Soberanía Nacional',
  },
};

function getFeriado(y, m, d){
  var key = pad2(m+1) + '-' + pad2(d);
  if(FERIADOS_FIJOS[key]) return FERIADOS_FIJOS[key];
  var varYear = FERIADOS_VAR[y] || {};
  return varYear[key] || null;
}

function pad2(n){ return String(n).padStart(2,'0'); }
function isLeap(y){ return (y%4===0 && y%100!==0) || y%400===0; }
function daysInMonth(m,y){ return [31,isLeap(y)?29:28,31,30,31,30,31,31,30,31,30,31][m]; }
function monFirst(dow){ return (dow+6)%7; } // Dom=0 → 6, Lun=1 → 0

function dayOfYear(d){
  return Math.floor((d - new Date(d.getFullYear(),0,0)) / 86400000);
}
function weekOfYear(d){
  var tmp = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  var dn  = tmp.getUTCDay() || 7;
  tmp.setUTCDate(tmp.getUTCDate() + 4 - dn);
  var ys  = new Date(Date.UTC(tmp.getUTCFullYear(),0,1));
  return Math.ceil((((tmp-ys)/86400000)+1)/7);
}

function getEstacion(m, d){
  // Hemisferio Sur (Argentina)
  if((m===11 && d>=22)||(m===0)||(m===1)||(m===2 && d<20)) return '☀️ Verano';
  if((m===2 && d>=20)||(m===3)||(m===4)||(m===5 && d<21)) return '🍂 Otoño';
  if((m===5 && d>=21)||(m===6)||(m===7)||(m===8 && d<23)) return '❄️ Invierno';
  return '🌸 Primavera';
}

function getZodiaco(m, d){
  var signs=[
    [1,20,'Acuario'],[2,19,'Piscis'],[3,21,'Aries'],[4,20,'Tauro'],
    [5,21,'Géminis'],[6,21,'Cáncer'],[7,23,'Leo'],[8,23,'Virgo'],
    [9,23,'Libra'],[10,23,'Escorpio'],[11,22,'Sagitario'],[12,22,'Capricornio']
  ];
  for(var i=0;i<signs.length;i++){
    if(m+1===signs[i][0] && d<signs[i][1]) return signs[(i+11)%12][2];
  }
  return signs[m][2];
}

/* ══ VISTA MENSUAL ══ */
function render(){
  document.getElementById('nav-title').textContent = MESES[curMonth] + ' ' + curYear;

  var firstCol = monFirst(new Date(curYear, curMonth, 1).getDay());
  var dias     = daysInMonth(curMonth, curYear);
  var prevDias = daysInMonth(curMonth===0?11:curMonth-1, curMonth===0?curYear-1:curYear);
  var total    = Math.ceil((firstCol + dias) / 7) * 7;

  var grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  for(var i=0; i<total; i++){
    var div = document.createElement('div');
    div.className = 'cal-day';

    var d, m, y, isOther = false;
    if(i < firstCol){
      d = prevDias - firstCol + i + 1;
      m = curMonth===0 ? 11 : curMonth-1;
      y = curMonth===0 ? curYear-1 : curYear;
      isOther = true;
    } else if(i >= firstCol + dias){
      d = i - firstCol - dias + 1;
      m = curMonth===11 ? 0 : curMonth+1;
      y = curMonth===11 ? curYear+1 : curYear;
      isOther = true;
    } else {
      d = i - firstCol + 1;
      m = curMonth;
      y = curYear;
    }

    var dow = new Date(y, m, d).getDay(); // 0=Dom
    if(isOther) div.classList.add('other-month');
    if(dow === 0) div.classList.add('sun-day');

    var isToday = !isOther && d===hoy.getDate() && m===hoy.getMonth() && y===hoy.getFullYear();
    if(isToday) div.classList.add('today');

    var feriado = !isOther ? getFeriado(y, m, d) : null;
    if(feriado) div.classList.add('holiday');

    // Número del día
    var numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = d;
    div.appendChild(numEl);

    // Nombre del feriado (mini)
    if(feriado){
      var fl = document.createElement('div');
      fl.className = 'day-holiday-label';
      fl.textContent = feriado;
      div.appendChild(fl);
    }

    if(!isOther){
      (function(dd,mm,yy){
        div.addEventListener('click', function(){ selectDay(dd,mm,yy,this); });
      })(d,m,y);
    }

    grid.appendChild(div);
  }
}

function selectDay(d, m, y, cell){
  // Limpiar selección previa
  var prev = document.querySelector('.cal-day.selected');
  if(prev) prev.classList.remove('selected');
  cell.classList.add('selected');

  var dayDate = new Date(y, m, d);
  var dow     = dayDate.getDay();
  document.getElementById('di-title').textContent =
    DIAS[dow] + ' ' + d + ' de ' + MESES[m] + ' de ' + y;

  var feriado = getFeriado(y, m, d);
  var hDiv    = document.getElementById('di-holiday');
  if(feriado){ hDiv.textContent = '🎉 Feriado: ' + feriado; hDiv.style.display='block'; }
  else        { hDiv.style.display='none'; }

  var doy      = dayOfYear(dayDate);
  var totalD   = 365 + (isLeap(y)?1:0);
  var woy      = weekOfYear(dayDate);
  var daysLeft = totalD - doy;
  var hoyMid   = new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate());
  var diff     = Math.round((dayDate - hoyMid) / 86400000);

  var fromText;
  if(diff===0)       fromText = 'Hoy';
  else if(diff===1)  fromText = 'Mañana';
  else if(diff===-1) fromText = 'Ayer';
  else if(diff>0)    fromText = 'En ' + diff + ' días';
  else               fromText = 'Hace ' + Math.abs(diff) + ' días';

  document.getElementById('di-grid').innerHTML =
    diItem('Día del año',    doy + ' / ' + totalD) +
    diItem('Semana ISO',     'Semana ' + woy) +
    diItem('Días restantes', daysLeft) +
    diItem('Desde hoy',      fromText, diff===0?'accent':'') +
    diItem('Estación',       getEstacion(m,d)) +
    diItem('Zodíaco',        getZodiaco(m,d));

  document.getElementById('day-info').style.display = 'block';
}

function diItem(l,v,cls){
  return '<div class="di-item"><div class="di-label">'+l+'</div>'
        +'<div class="di-val'+(cls?' '+cls:'')+'">'+v+'</div></div>';
}

function cambiarMes(delta){
  curMonth += delta;
  if(curMonth>11){curMonth=0;curYear++;}
  if(curMonth<0) {curMonth=11;curYear--;}
  document.getElementById('day-info').style.display='none';
  render();
}

function irHoy(){
  curYear  = hoy.getFullYear();
  curMonth = hoy.getMonth();
  document.getElementById('day-info').style.display='none';
  setView('mes');
  render();
}

/* ══ VISTA ANUAL ══ */
function renderYear(){
  document.getElementById('year-title').textContent = viewYear;
  var grid = document.getElementById('year-grid');
  grid.innerHTML = '';
  for(var mo=0; mo<12; mo++) grid.appendChild(buildMiniCal(mo, viewYear));
}

function buildMiniCal(mo, yr){
  var wrap = document.createElement('div');
  wrap.className = 'mini-cal';

  // Cabecera mes
  var head = document.createElement('div');
  head.className = 'mini-head';
  var mname = document.createElement('span');
  mname.className = 'mini-month-name';
  mname.textContent = MESES[mo];
  (function(m,y){ mname.onclick = function(){ curMonth=m; curYear=y; setView('mes'); }; })(mo,yr);
  var ylab = document.createElement('span');
  ylab.className = 'mini-year-label';
  ylab.textContent = yr;
  head.appendChild(mname); head.appendChild(ylab);
  wrap.appendChild(head);

  // Días de semana
  var dowRow = document.createElement('div');
  dowRow.className = 'mini-dow';
  ['L','M','X','J','V','S','D'].forEach(function(l, i){
    var s = document.createElement('span');
    s.textContent = l;
    if(i===6) s.className = 'sun';
    dowRow.appendChild(s);
  });
  wrap.appendChild(dowRow);

  // Grid
  var grd = document.createElement('div');
  grd.className = 'mini-grid';

  var firstCol = monFirst(new Date(yr, mo, 1).getDay());
  var dias     = daysInMonth(mo, yr);
  var prevDias = daysInMonth(mo===0?11:mo-1, mo===0?yr-1:yr);
  var total    = Math.ceil((firstCol + dias)/7)*7;

  for(var i=0; i<total; i++){
    var span = document.createElement('span');
    span.className = 'mini-d';
    var d, isOther = false;
    if(i < firstCol){ d = prevDias - firstCol + i + 1; isOther = true; }
    else if(i >= firstCol + dias){ d = i - firstCol - dias + 1; isOther = true; }
    else { d = i - firstCol + 1; }

    span.textContent = d;
    if(isOther) { span.classList.add('mini-other'); }
    else {
      if(i%7===6) span.classList.add('mini-sun');
      if(d===hoy.getDate() && mo===hoy.getMonth() && yr===hoy.getFullYear()) span.classList.add('mini-today');
      if(getFeriado(yr, mo, d)) span.classList.add('mini-holiday');
      (function(dd,mm,yy){
        span.onclick = function(){
          curMonth=mm; curYear=yy; setView('mes');
          setTimeout(function(){
            var cells = document.querySelectorAll('.cal-day:not(.other-month)');
            cells.forEach(function(c){
              var n = c.querySelector('.day-num');
              if(n && parseInt(n.textContent)===dd) c.click();
            });
          }, 50);
        };
      })(d,mo,yr);
    }
    grd.appendChild(span);
  }
  wrap.appendChild(grd);
  return wrap;
}

function cambiarYear(delta){
  viewYear += delta;
  renderYear();
}

/* ══ TOGGLE ══ */
function setView(v){
  document.getElementById('view-mes').style.display  = v==='mes'  ? 'block' : 'none';
  document.getElementById('view-year').style.display = v==='year' ? 'block' : 'none';
  document.getElementById('btn-mes').classList.toggle('active',  v==='mes');
  document.getElementById('btn-year').classList.toggle('active', v==='year');
  if(v==='year') renderYear();
  if(v==='mes')  render();
}

// Init
render();
</script>
