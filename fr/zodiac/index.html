<style>
:root{--bg:#F7F8FA;--surface:#FFF;--ink:#080A12;--ink-light:#60647A;--ink-faint:#B4B8CC;--hi:#4F6BFF;--hi-soft:#EEF1FF;--border:#D4D8E6;--radius:16px;--radius-sm:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
.page{max-width:520px;margin:0 auto;padding:36px 20px 60px}
.page-title{font-size:26px;font-weight:700;letter-spacing:-.03em;margin-bottom:6px}
.page-sub{font-size:14px;color:var(--ink-light);line-height:1.5;margin-bottom:28px}
.card{background:var(--surface);border-radius:var(--radius);padding:24px;margin-bottom:16px;border:1px solid var(--border)}
.field{margin-bottom:18px}.field:last-child{margin-bottom:0}
label{display:block;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-light);margin-bottom:8px}
input[type=date]{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Inter',sans-serif;font-size:16px;color:var(--ink);background:var(--surface);outline:none;transition:border-color .15s;cursor:pointer}
input[type=date]:focus{border-color:var(--hi)}
.result-card{background:#0C1528;border-radius:var(--radius);padding:28px;margin-bottom:16px;border-top:3px solid var(--hi)}
.result-eyebrow{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:8px}
.sign-big{font-size:60px;line-height:1;text-align:center;margin-bottom:8px}
.sign-name{font-size:32px;font-weight:700;color:white;letter-spacing:-.02em;text-align:center}
.sign-dates{font-size:13px;color:rgba(255,255,255,.4);text-align:center;margin-bottom:20px}
.sign-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.sign-attr{background:rgba(255,255,255,.05);border-radius:10px;padding:12px;text-align:center}
.sign-attr-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:4px}
.sign-attr-val{font-size:13px;font-weight:600;color:white}
.traits{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.trait{padding:4px 12px;background:rgba(26,95,232,.25);border:1px solid rgba(26,95,232,.3);color:#93C5FD;border-radius:99px;font-size:12px;font-weight:600}
.chinese-card{background:rgba(255,255,255,.05);border-radius:10px;padding:16px;margin-top:16px;border-top:1px solid rgba(255,255,255,.1)}
.chinese-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:8px}
.chinese-animal{font-size:20px;font-weight:700;color:white}
.empty-state{color:rgba(255,255,255,.3);font-size:15px;text-align:center;padding:20px 0}
</style>
</head>
<body>
<header></header>
<div class="page">
  <h1 class="page-title">Signe du Zodiaque</h1>
  <p class="page-sub">Découvrez votre signe du zodiaque occidental et votre animal du zodiaque chinois selon votre date de naissance.</p>

  <div class="card">
    <div class="field">
      <label>Date de naissance</label>
      <input type="date" id="birthdate" oninput="calculate()">
    </div>
  </div>

  <div class="result-card">
    <div id="result-content"><div class="empty-state">Entrez votre date de naissance</div></div>
  </div>
</div>
<script>
var SIGNS=[
  {sym:'♑',name:'Capricorne',   from:[12,22],to:[1,19],  element:'Terre',  quality:'Cardinal',ruler:'Saturne',   traits:['Ambitieux','Discipliné','Patient','Responsable']},
  {sym:'♒',name:'Verseau',      from:[1,20], to:[2,18],  element:'Air',    quality:'Fixe',    ruler:'Uranus',    traits:['Indépendant','Visionnaire','Humanitaire','Excentrique']},
  {sym:'♓',name:'Poissons',     from:[2,19], to:[3,20],  element:'Eau',    quality:'Mutable', ruler:'Neptune',   traits:['Intuitif','Empathique','Artistique','Rêveur']},
  {sym:'♈',name:'Bélier',       from:[3,21], to:[4,19],  element:'Feu',    quality:'Cardinal',ruler:'Mars',      traits:['Audacieux','Énergique','Courageux','Impulsif']},
  {sym:'♉',name:'Taureau',      from:[4,20], to:[5,20],  element:'Terre',  quality:'Fixe',    ruler:'Vénus',     traits:['Fiable','Patient','Pratique','Têtu']},
  {sym:'♊',name:'Gémeaux',      from:[5,21], to:[6,20],  element:'Air',    quality:'Mutable', ruler:'Mercure',   traits:['Curieux','Adaptable','Espiègle','Indécis']},
  {sym:'♋',name:'Cancer',       from:[6,21], to:[7,22],  element:'Eau',    quality:'Cardinal',ruler:'Lune',      traits:['Attentionné','Intuitif','Émotionnel','Loyal']},
  {sym:'♌',name:'Lion',         from:[7,23], to:[8,22],  element:'Feu',    quality:'Fixe',    ruler:'Soleil',    traits:['Généreux','Créatif','Confiant','Dramatique']},
  {sym:'♍',name:'Vierge',       from:[8,23], to:[9,22],  element:'Terre',  quality:'Mutable', ruler:'Mercure',   traits:['Analytique','Serviable','Diligent','Perfectionniste']},
  {sym:'♎',name:'Balance',      from:[9,23], to:[10,22], element:'Air',    quality:'Cardinal',ruler:'Vénus',     traits:['Diplomate','Équitable','Sociable','Indécis']},
  {sym:'♏',name:'Scorpion',     from:[10,23],to:[11,21], element:'Eau',    quality:'Fixe',    ruler:'Pluton',    traits:['Intense','Déterminé','Perspicace','Secret']},
  {sym:'♐',name:'Sagittaire',   from:[11,22],to:[12,21], element:'Feu',    quality:'Mutable', ruler:'Jupiter',   traits:['Optimiste','Aventurier','Philosophe','Agité']},
];
var CHINESE_ANIMALS=[
  {year:1900,name:'Rat',sym:'🐀'},{year:1901,name:'Bœuf',sym:'🐂'},{year:1902,name:'Tigre',sym:'🐅'},
  {year:1903,name:'Lapin',sym:'🐇'},{year:1904,name:'Dragon',sym:'🐉'},{year:1905,name:'Serpent',sym:'🐍'},
  {year:1906,name:'Cheval',sym:'🐎'},{year:1907,name:'Chèvre',sym:'🐐'},{year:1908,name:'Singe',sym:'🐒'},
  {year:1909,name:'Coq',sym:'🐓'},{year:1910,name:'Chien',sym:'🐕'},{year:1911,name:'Cochon',sym:'🐷'},
];
var MONTHS_FR=['janv','févr','mars','avr','mai','juin','juil','août','sept','oct','nov','déc'];
function getSign(m,d){for(var i=0;i<SIGNS.length;i++){var s=SIGNS[i];if((m===s.from[0]&&d>=s.from[1])||(m===s.to[0]&&d<=s.to[1]))return s;}return SIGNS[0];}
function getChineseSign(y){return CHINESE_ANIMALS[((y-1900)%12+12)%12];}
function calculate(){
  var val=document.getElementById('birthdate').value;
  if(!val){document.getElementById('result-content').innerHTML='<div class="empty-state">Entrez votre date de naissance</div>';return;}
  var p=val.split('-');var year=+p[0],month=+p[1],day=+p[2];
  var sign=getSign(month,day);var chinese=getChineseSign(year);
  var fromStr=MONTHS_FR[sign.from[0]-1]+' '+sign.from[1];
  var toStr=MONTHS_FR[sign.to[0]-1]+' '+sign.to[1];
  var traitsHTML=sign.traits.map(function(t){return '<span class="trait">'+t+'</span>';}).join('');
  document.getElementById('result-content').innerHTML=
    '<div class="result-eyebrow">Votre signe solaire</div>'
    +'<div class="sign-big">'+sign.sym+'</div>'
    +'<div class="sign-name">'+sign.name+'</div>'
    +'<div class="sign-dates">'+fromStr+' – '+toStr+'</div>'
    +'<div class="sign-grid">'
      +'<div class="sign-attr"><div class="sign-attr-lbl">Élément</div><div class="sign-attr-val">'+sign.element+'</div></div>'
      +'<div class="sign-attr"><div class="sign-attr-lbl">Qualité</div><div class="sign-attr-val">'+sign.quality+'</div></div>'
      +'<div class="sign-attr"><div class="sign-attr-lbl">Régent</div><div class="sign-attr-val">'+sign.ruler+'</div></div>'
    +'</div>'
    +'<div class="traits">'+traitsHTML+'</div>'
    +'<div class="chinese-card">'
      +'<div class="chinese-title">Zodiaque Chinois</div>'
      +'<div class="chinese-animal">'+chinese.sym+' '+chinese.name+' ('+year+')</div>'
    +'</div>';
}
</script>

</body>
