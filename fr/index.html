<style>
  :root{--bg:#F7F8FA;--surface:#FFFFFF;--ink:#0A0E1A;--ink-2:#363B4F;--ink-3:#858AA0;--line:#E4E7EE;--line-2:#EFF1F6;--accent:#4F6BFF;--accent-2:#7C5CFF;--accent-soft:#EEF1FF;--dark:#0A0E1A;--dark-2:#141929;--dark-line:#1F2438;--pos:#22C55E;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;letter-spacing:-0.011em}
  a{color:inherit;text-decoration:none}
  header{background:var(--dark);border-bottom:1px solid var(--dark-line);position:sticky;top:0;z-index:100;display:flex;align-items:center;height:58px;padding:0 20px}
  .header-inner{flex:1;display:flex;align-items:center;justify-content:space-between;gap:16px;padding-left:10px;min-width:0}
  .logo{font-size:16px;font-weight:700;letter-spacing:-0.03em;flex-shrink:0}.logo .name{color:#fff}.logo .dot{color:var(--accent)}
  .header-nav{display:flex;gap:2px;margin-right:auto}.header-nav a{padding:6px 11px;border-radius:6px;font-size:12px;color:rgba(255,255,255,.6);font-weight:500;transition:all .12s}.header-nav a:hover{background:var(--dark-2);color:#fff}
  .hero-wrap{background:var(--dark);color:#fff;padding:72px 0 108px;position:relative;overflow:hidden}
  .hero-wrap::before{content:'';position:absolute;top:-150px;right:-80px;width:700px;height:700px;background:radial-gradient(circle,rgba(79,107,255,.15) 0%,transparent 55%);pointer-events:none}
  .hero{max-width:1240px;margin:0 auto;padding:0 32px;display:grid;grid-template-columns:1.2fr 1fr;gap:64px;align-items:center;position:relative;z-index:1}
  .hero-eyebrow{display:inline-flex;align-items:center;gap:10px;padding:6px 14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:99px;font-size:12px;font-weight:500;color:rgba(255,255,255,.8);margin-bottom:32px;font-family:'JetBrains Mono',monospace}
  .he-pulse{width:6px;height:6px;border-radius:50%;background:var(--pos);box-shadow:0 0 0 3px rgba(34,197,94,.25);flex-shrink:0}
  .hero h1{font-size:68px;font-weight:700;line-height:1.02;letter-spacing:-0.04em;margin-bottom:24px}
  .hero h1 .muted{background:linear-gradient(135deg,rgba(255,255,255,.85) 0%,rgba(255,255,255,.4) 100%);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:600}
  .hero h1 .acc{color:#fff}
  .hero-lead{font-size:18px;color:rgba(255,255,255,.65);line-height:1.6;margin-bottom:40px;max-width:520px}
  .hero-actions{display:flex;gap:12px;align-items:center}
  .btn-primary{padding:13px 24px;background:#fff;color:var(--dark);border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:8px;border:0;text-decoration:none}
  .btn-primary:hover{background:var(--accent);color:#fff}
  .btn-ghost{padding:13px 20px;font-size:14px;font-weight:500;color:rgba(255,255,255,.65);cursor:pointer;transition:color .15s;text-decoration:none}
  .btn-ghost:hover{color:#fff}
  .hero-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:24px;backdrop-filter:blur(12px)}
  .hc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
  .hc-lbl{font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.09em}
  .hc-count{font-family:'JetBrains Mono',monospace;font-size:11px;padding:3px 8px;background:rgba(79,107,255,.2);color:var(--accent);border-radius:5px}
  .cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .cat-chip{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);border-radius:10px;padding:12px 14px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:3px;text-decoration:none}
  .cat-chip:hover{background:rgba(255,255,255,.1);border-color:rgba(79,107,255,.4)}
  .cat-chip-name{font-size:13px;font-weight:600;color:#fff}
  .cat-chip-n{font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(255,255,255,.4)}
  main{max-width:1240px;margin:0 auto;padding:0 32px 100px;margin-top:-60px;position:relative;z-index:2}
  .cat-block{margin-bottom:48px;background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:32px;box-shadow:0 2px 20px rgba(10,14,26,.04)}
  .cat-block-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:22px;padding-bottom:20px;border-bottom:1px solid var(--line-2)}
  .cat-title-wrap{display:flex;align-items:baseline;gap:14px}
  .cat-num{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-3)}
  .cat-title{font-size:24px;font-weight:700;letter-spacing:-0.022em}
  .cat-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-3);padding:2px 8px;background:var(--bg);border:1px solid var(--line);border-radius:5px}
  .cat-link{font-size:13px;color:var(--accent);font-weight:600;display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--accent-soft);border-radius:9px;transition:all .15s;white-space:nowrap}
  .cat-link:hover{background:var(--accent);color:#fff;gap:10px}
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .card{background:var(--bg);border:1px solid var(--line);border-radius:13px;padding:22px;cursor:pointer;transition:all .18s;position:relative;display:flex;flex-direction:column}
  .card:hover{border-color:var(--accent);background:var(--surface);transform:translateY(-2px);box-shadow:0 10px 28px rgba(79,107,255,.09)}
  .card-tag{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);padding:3px 8px;background:var(--accent-soft);border-radius:4px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:14px;align-self:flex-start}
  .card-title{font-size:17px;font-weight:600;letter-spacing:-0.017em;margin-bottom:6px;color:var(--ink)}
  .card-desc{font-size:13px;color:var(--ink-3);line-height:1.55;margin-bottom:16px;flex:1}
  .card-cta{font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--accent);font-weight:600;display:inline-flex;align-items:center;gap:4px;transition:gap .15s;margin-top:auto}
  .card:hover .card-cta{gap:8px}
  @media(max-width:1024px){.header-nav{display:none}.hero{grid-template-columns:1fr;gap:36px}.hero h1{font-size:46px}.cards{grid-template-columns:repeat(2,1fr)}.cat-block{padding:20px}}
  @media(max-width:600px){.hero{padding:0 20px}main{padding:0 16px 60px}.cards{grid-template-columns:1fr}.hero h1{font-size:38px}.cat-block-head{flex-direction:column;gap:12px;align-items:flex-start}}
</style>
</head>
<body class="home-page">
<header>
  <div class="header-inner">
    <a href="/" class="logo"><span class="name">calculate</span><span class="dot">.website</span></a>
    <nav class="header-nav" id="desktop-nav"></nav>
  </div>
</header>

<section class="hero-wrap">
  <div class="hero">
    <div>
      <div class="hero-eyebrow"><span class="he-pulse"></span>&nbsp;<span>Calculatrices · gratuites · sans inscription</span></div>
      <h1><span class="muted">Ici vous pouvez</span><br><span class="acc">tout calculer.</span></h1>
      <p class="hero-lead">Des outils précis pour votre quotidien. Santé, finances, mathématiques, dates et plus. Sans friction, sans attente.</p>
      <div class="hero-actions">
        <a href="#calculators" class="btn-primary">Explorer les calculatrices →</a>
        <a href="/percentage/" class="btn-ghost">La plus populaire</a>
      </div>
    </div>
    <div class="hero-card">
      <div class="hc-head">
        <div class="hc-lbl">Catégories</div>
        <div class="hc-count" id="hc-count">…</div>
      </div>
      <div class="cat-grid" id="hero-cat-grid"></div>
    </div>
  </div>
</section>

<main id="calculators">
  <div id="home-grid-root"></div>
</main>
<footer></footer>
<script src="/nav.js"></script>
<script>
(function () {
  var calcs = window.__CALCS || [];
  var catGrid = document.getElementById('hero-cat-grid');
  var hcCount = document.getElementById('hc-count');
  if (catGrid && calcs.length) {
    var total = calcs.reduce(function(s,c){ return s+c.items.length; }, 0);
    if (hcCount) hcCount.textContent = total + ' calculatrices';
    calcs.slice(0,6).forEach(function(cat){
      var chip = document.createElement('a');
      chip.className = 'cat-chip';
      chip.href = '/fr/' + cat.slug + '/';
      chip.innerHTML = '<span class="cat-chip-name">' + cat.label + '</span>'
        + '<span class="cat-chip-n">' + cat.items.length + ' outils</span>';
      catGrid.appendChild(chip);
    });
  }
  var root = document.getElementById('home-grid-root');
  if (!root || !calcs.length) return;
  function buildHomeGrid(country) {
    country = country || (typeof cwGetCountry === 'function' ? cwGetCountry() : 'global');
    var html = '';
    var catIdx = 0;
    calcs.forEach(function(cat){
      var items = cat.items.filter(function(item){
        if (!item.countries || item.countries.length === 0) return true;
        if (country === 'global') return true;
        return item.countries.indexOf('global') !== -1 || item.countries.indexOf(country) !== -1;
      });
      if (items.length === 0) return;
      catIdx++;
      html += '<div class="cat-block"><div class="cat-block-head"><div class="cat-title-wrap">'
        + '<span class="cat-num">0' + catIdx + '</span>'
        + '<h2 class="cat-title">' + (cat.title || cat.cat) + '</h2>'
        + '<span class="cat-count">' + items.length + '</span>'
        + '</div><a class="cat-link" href="/fr/' + cat.slug + '/">Voir tout →</a>'
        + '</div><div class="cards">';
      items.forEach(function(item){
        var desc = item.hd || item.d;
        html += '<a class="card" href="' + '/fr' + item.u + '">'
          + '<span class="card-tag">' + cat.label + '</span>'
          + '<div class="card-title">' + item.n + '</div>'
          + '<div class="card-desc">' + desc + '</div>'
          + '<span class="card-cta">Ouvrir →</span></a>';
      });
      html += '</div></div>';
    });
    root.innerHTML = html;
  }
  buildHomeGrid();
  window.__cwRebuildHome = buildHomeGrid;
})();
</script>
</body>
</html>
