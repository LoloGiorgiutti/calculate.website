<style>
  :root{--bg:#F7F8FA;--surface:#FFF;--ink:#080A12;--ink-light:#60647A;--ink-faint:#B4B8CC;--hi:#4F6BFF;--hi-soft:#EEF1FF;--border:#D4D8E6;--radius:16px;--radius-sm:10px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
  .page{max-width:520px;margin:0 auto;padding:36px 20px 60px}
  .page-title{font-size:26px;font-weight:700;letter-spacing:-0.03em;margin-bottom:6px}
  .page-sub{font-size:14px;color:var(--ink-light);line-height:1.5;margin-bottom:28px}
  .card{background:var(--surface);border-radius:var(--radius);padding:24px;margin-bottom:16px;border:1px solid var(--border)}
  .field{margin-bottom:18px}.field:last-child{margin-bottom:0}
  label{display:block;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-light);margin-bottom:8px}
  input[type=date]{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Inter',sans-serif;font-size:16px;color:var(--ink);background:var(--surface);outline:none;transition:border-color .15s;cursor:pointer}
  input[type=date]:focus{border-color:var(--hi)}
  .result-card{background:#0C1528;border-radius:var(--radius);padding:28px;margin-bottom:16px;border-top:3px solid var(--hi)}
  .result-eyebrow{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:6px}
  .result-main{font-size:52px;font-weight:700;color:white;letter-spacing:-0.03em;line-height:1;margin-bottom:4px}
  .result-unit{font-size:20px;font-weight:400;opacity:0.5;margin-left:6px}
  .result-sub{font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:20px}
  .result-rows{border-top:1px solid rgba(255,255,255,0.1);padding-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .stat-box{background:rgba(255,255,255,0.05);border-radius:10px;padding:14px}
  .stat-val{font-size:22px;font-weight:700;color:white;letter-spacing:-0.02em}
  .stat-lbl{font-size:11px;color:rgba(255,255,255,0.4);margin-top:3px}
  .empty-state{color:rgba(255,255,255,0.3);font-size:15px}
  .toggle-row{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
  .toggle-lbl{font-size:14px;font-weight:500;color:var(--ink)}
  .toggle{position:relative;width:44px;height:24px;flex-shrink:0}
  .toggle input{opacity:0;width:0;height:0}
  .toggle-track{position:absolute;inset:0;background:var(--border);border-radius:99px;cursor:pointer;transition:background .2s}
  .toggle input:checked + .toggle-track{background:var(--hi)}
  .toggle-track::after{content:'';position:absolute;left:3px;top:3px;width:18px;height:18px;border-radius:50%;background:white;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,0.2)}
  .toggle input:checked + .toggle-track::after{transform:translateX(20px)}
</style>
</head>
<body>
<header></header>
<div class="page">
  <h1 class="page-title">Jours entre Deux Dates</h1>
  <p class="page-sub">Combien de jours y a-t-il entre deux dates ? Aussi affiché en semaines et en mois.</p>

  <div class="card">
    <div class="field">
      <label>Date de début</label>
      <input type="date" id="date1" oninput="calculate()">
    </div>
    <div class="field">
      <label>Date de fin</label>
      <input type="date" id="date2" oninput="calculate()">
    </div>
    <div class="field">
      <div class="toggle-row">
        <span class="toggle-lbl">Jours ouvrables uniquement (lun–ven)</span>
        <label class="toggle">
          <input type="checkbox" id="business" onchange="calculate()">
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>
  </div>

  <div class="result-card">
    <div class="result-eyebrow">Différence</div>
    <div id="result-main" class="result-main"><span class="empty-state" style="font-size:16px">Sélectionnez les dates</span></div>
    <div id="result-sub" class="result-sub"></div>
    <div id="result-rows" class="result-rows" style="display:none">
      <div class="stat-box">
        <div class="stat-val" id="r-weeks">—</div>
        <div class="stat-lbl">Semaines</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="r-months">—</div>
        <div class="stat-lbl">Mois approx.</div>
      </div>
    </div>
  </div>
</div>
<script>
  var today=new Date();
  var in30=new Date();in30.setDate(today.getDate()+30);
  document.getElementById('date1').value=today.toISOString().split('T')[0];
  document.getElementById('date2').value=in30.toISOString().split('T')[0];
  calculate();

  function calculate(){
    var f1=new Date(document.getElementById('date1').value);
    var f2=new Date(document.getElementById('date2').value);
    var mainEl=document.getElementById('result-main');
    var subEl=document.getElementById('result-sub');
    var rowsEl=document.getElementById('result-rows');
    if(isNaN(f1)||isNaN(f2)){
      mainEl.innerHTML='<span class="empty-state" style="font-size:16px">Sélectionnez les dates</span>';
      subEl.textContent='';rowsEl.style.display='none';return;
    }
    var businessOnly=document.getElementById('business').checked;
    var start=f1<f2?f1:f2;
    var end=f1<f2?f2:f1;
    var sign=f1<=f2?1:-1;
    var days=0;
    if(businessOnly){
      var d=new Date(start);
      while(d<end){var dow=d.getDay();if(dow!==0&&dow!==6)days++;d.setDate(d.getDate()+1);}
    } else {
      days=Math.round(Math.abs(end-start)/(1000*60*60*24));
    }
    days*=sign<0?-1:1;
    var weeks=(Math.abs(days)/7).toFixed(1);
    var months=(Math.abs(days)/30.44).toFixed(1);
    var absDays=Math.abs(days);
    mainEl.innerHTML=absDays.toLocaleString('fr-FR')+'<span class="result-unit">jour'+(absDays!==1?'s':'')+'</span>';
    if(days<0) subEl.textContent='La date de début est après la date de fin';
    else if(days===0) subEl.textContent='Les dates sont identiques';
    else subEl.textContent=businessOnly?'jours ouvrables (lun–ven)':'jours calendaires';
    rowsEl.style.display='grid';
    document.getElementById('r-weeks').textContent=weeks.replace('.',',');
    document.getElementById('r-months').textContent=months.replace('.',',');
  }
</script>

</body>
