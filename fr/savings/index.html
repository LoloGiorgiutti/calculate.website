<style>
:root{--bg:#F7F8FA;--surface:#FFF;--ink:#080A12;--ink-light:#60647A;--ink-faint:#B4B8CC;--hi:#4F6BFF;--hi-soft:#EEF1FF;--border:#D4D8E6;--radius:16px;--radius-sm:10px}
[data-theme=dark]{--bg:#0D1117;--surface:#161B27;--ink:#E6E8F0;--ink-light:#8B8FA8;--border:#2A2F45;--hi-soft:rgba(79,107,255,.18)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
.page{max-width:480px;margin:0 auto;padding:36px 20px 60px}
h1{font-size:26px;font-weight:700;letter-spacing:-.03em;margin-bottom:6px}
.sub{font-size:14px;color:var(--ink-light);line-height:1.6;margin-bottom:28px}
.card{background:var(--surface);border-radius:var(--radius);padding:20px;margin-bottom:16px;border:1px solid var(--border)}
.field{margin-bottom:12px}.field:last-child{margin-bottom:0}
label{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-light);margin-bottom:5px}
.input-wrap{position:relative;display:block;width:100%}
.input-prefix{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink-light);font-size:15px;pointer-events:none;font-weight:500}
.input-suffix{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--ink-light);font-size:13px;pointer-events:none}
input[type=number]{width:100%;height:46px;padding:0 44px 0 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Inter',sans-serif;font-size:16px;font-weight:500;color:var(--ink);background:var(--surface);outline:none;transition:border-color .15s,background .15s,color .15s;-moz-appearance:textfield;appearance:textfield}
input[type=number].has-prefix{padding-left:26px}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]:focus{border-color:var(--hi)}
.field.is-target label{color:var(--hi)}
.field.is-target input[type=number]{background:var(--hi-soft)!important;border-color:var(--hi)!important;color:var(--hi)!important;font-weight:700}
.field.is-target .input-prefix,.field.is-target .input-suffix{color:var(--hi);opacity:.65}
.result-card{background:#0C1528;border-radius:var(--radius);padding:22px 24px;margin-bottom:16px;border-top:3px solid var(--hi)}
.result-eyebrow{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:12px}
.result-rows{display:flex;flex-direction:column;gap:9px}
.result-row{display:flex;justify-content:space-between;align-items:center}
.result-row-lbl{font-size:13px;color:rgba(255,255,255,.5)}
.result-row-val{font-size:14px;font-weight:600;color:rgba(255,255,255,.85);font-family:'JetBrains Mono',monospace}
.result-row-val.pos{color:#86EFAC}
.result-row-val.hi{color:#fff;font-size:15px;font-weight:800}
.result-row-val.hi.pos{color:#86EFAC}
.result-divider{height:1px;background:rgba(255,255,255,.08);margin:2px 0}
.result-note{margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.08);font-size:12px;color:rgba(255,255,255,.4);font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>
<header></header>
<div class="page">
  <h1>💰 Calculateur d'Épargne</h1>
  <p class="sub">Remplissez quatre champs — le cinquième se calcule automatiquement.</p>

  <div class="card">
    <div class="field" id="field-initial">
      <label for="initial">Épargne initiale</label>
      <div class="input-wrap">
        <span class="input-prefix">€</span>
        <input type="number" id="initial" class="has-prefix" placeholder="1 000" min="0">
      </div>
    </div>
    <div class="field" id="field-monthly">
      <label for="monthly">Versement mensuel</label>
      <div class="input-wrap">
        <span class="input-prefix">€</span>
        <input type="number" id="monthly" class="has-prefix" placeholder="200" min="0">
      </div>
    </div>
    <div class="field" id="field-years">
      <label for="years">Durée</label>
      <div class="input-wrap">
        <input type="number" id="years" placeholder="10" min="0" step="0.5">
        <span class="input-suffix">ans</span>
      </div>
    </div>
    <div class="field" id="field-goal">
      <label for="goal">Objectif (solde final)</label>
      <div class="input-wrap">
        <span class="input-prefix">€</span>
        <input type="number" id="goal" class="has-prefix" placeholder="50 000" min="0">
      </div>
    </div>
    <div class="field" id="field-rate">
      <label for="rate">Taux d'intérêt annuel</label>
      <div class="input-wrap">
        <input type="number" id="rate" placeholder="5" min="0" step="0.25">
        <span class="input-suffix">%/an</span>
      </div>
    </div>
  </div>

  <div class="result-card" id="result-card" style="display:none">
    <div class="result-eyebrow">Détail</div>
    <div id="result-rows" class="result-rows"></div>
  </div>
</div>

<script>
var ALL=['initial','monthly','years','goal','rate'];
var DEFAULT_TARGET='goal';
var userFilled=[];

function getTarget(){
  if(userFilled.indexOf(DEFAULT_TARGET)===-1)return DEFAULT_TARGET;
  return userFilled[0];
}

function calcFV(pv,pmt,r,n){if(r<1e-10)return pv+pmt*n;var fn=Math.pow(1+r,n);return pv*fn+pmt*(fn-1)/r;}
function calcPV(fv,pmt,r,n){if(n<=0)return null;if(r<1e-10)return fv-pmt*n;var fn=Math.pow(1+r,n);return(fv-pmt*(fn-1)/r)/fn;}
function calcPMT(fv,pv,r,n){if(n<=0)return null;if(r<1e-10)return(fv-pv)/n;var fn=Math.pow(1+r,n);if(Math.abs(fn-1)<1e-10)return null;return(fv-pv*fn)*r/(fn-1);}
function calcN(fv,pv,pmt,r){
  if(r<1e-10){if(Math.abs(pmt)<0.01)return null;var n=(fv-pv)/pmt;return n>0?n:null;}
  var A=pv+pmt/r,B=fv+pmt/r;if(A<=0||B<=0)return null;
  var n=Math.log(B/A)/Math.log(1+r);return n>0?n:null;
}
function calcRate(fv,pv,pmt,n){
  if(n<=0)return null;
  function f(r){if(Math.abs(r)<1e-12)return pv+pmt*n-fv;var fn=Math.pow(1+r,n);return pv*fn+pmt*(fn-1)/r-fv;}
  if(f(0)>=0)return 0;
  var hi=0.1;while(f(hi)<0&&hi<100)hi*=2;if(f(hi)<0)return null;
  var lo=0;for(var i=0;i<100;i++){var mid=(lo+hi)/2;if(hi-lo<1e-12)break;if(f(mid)<0)lo=mid;else hi=mid;}
  return(lo+hi)/2;
}

function fmt(n){return'€ '+Math.round(Math.abs(n)).toLocaleString('fr-FR');}
function fmtYr(n){
  var y=Math.floor(n),m=Math.round((n-y)*12);
  if(m===12){y++;m=0;}
  var s='';if(y>0)s+=y+(y===1?' an':' ans');
  if(m>0)s+=(s?' ':'')+m+' mois';
  return s||'< 1 mois';
}

function highlight(){
  var t=getTarget();
  ALL.forEach(function(f){
    document.getElementById('field-'+f).classList.toggle('is-target',f===t);
  });
}

ALL.forEach(function(f){
  document.getElementById(f).addEventListener('input',function(){
    userFilled=userFilled.filter(function(id){return id!==f;});
    if(this.value.trim()!=='')userFilled.push(f);
    highlight();
    calculate();
  });
});

function getV(id){
  var v=document.getElementById(id).value.trim();
  if(v===''||isNaN(parseFloat(v)))return null;
  return parseFloat(v);
}

function calculate(){
  var t=getTarget();
  var pv  =t!=='initial'?getV('initial'):null;
  var pmt =t!=='monthly'?getV('monthly'):null;
  var yrs =t!=='years'  ?getV('years')  :null;
  var fv  =t!=='goal'   ?getV('goal')   :null;
  var rAnn=t!=='rate'   ?getV('rate')   :null;
  var r=(rAnn!==null)?(rAnn/100)/12:0;
  var n=yrs!==null?yrs*12:null;
  var result=null;
  try{
    if(t==='goal'){if(pv===null||pmt===null||n===null||n<=0){clr();return;}result=calcFV(pv,pmt,r,n);}
    else if(t==='initial'){if(pmt===null||n===null||n<=0||fv===null){clr();return;}result=calcPV(fv,pmt,r,n);}
    else if(t==='monthly'){if(pv===null||n===null||n<=0||fv===null){clr();return;}result=calcPMT(fv,pv,r,n);}
    else if(t==='years'){
      if(pv===null||pmt===null||fv===null||fv<=0){clr();return;}
      var months=calcN(fv,pv,pmt,r);result=months!==null?months/12:null;
    }else if(t==='rate'){
      if(pv===null||pmt===null||n===null||n<=0||fv===null||fv<=0){clr();return;}
      var mr=calcRate(fv,pv,pmt,n);result=mr!==null?mr*12*100:null;
    }
  }catch(e){clr();return;}
  if(result===null||isNaN(result)||!isFinite(result)){clr();return;}

  var inp=document.getElementById(t);
  if(t==='years')inp.value=Math.round(result*10)/10;
  else if(t==='rate')inp.value=Math.round(result*100)/100;
  else inp.value=Math.round(result);

  var sPV =t==='initial'?result:(pv||0);
  var sPMT=t==='monthly'?result:(pmt||0);
  var sYrs=t==='years'  ?result:(yrs||0);
  var sFV =t==='goal'   ?result:(fv||0);
  var dep=sPV+sPMT*sYrs*12,int_=sFV-dep;
  var html=
    '<div class="result-row"><span class="result-row-lbl">Total versé</span>'
    +'<span class="result-row-val">'+fmt(dep)+'</span></div>'
    +'<div class="result-row"><span class="result-row-lbl">Intérêts gagnés</span>'
    +'<span class="result-row-val '+(int_>=0?'pos':'')+'">'+
    (int_>=0?'+ ':'− ')+fmt(int_)+'</span></div>'
    +'<div class="result-divider"></div>'
    +'<div class="result-row">'
    +'<span class="result-row-lbl" style="color:rgba(255,255,255,.85);font-weight:600">Solde final</span>'
    +'<span class="result-row-val hi pos">'+fmt(sFV)+'</span></div>';
  if(t==='years')html+='<div class="result-note">→ '+fmtYr(result)+'</div>';
  if(t==='rate'){
    var ann=Math.round(result*100)/100,mon=Math.round(result/12*100)/100;
    html+='<div class="result-note">→ '+ann+'% annuel ('+mon+'% mensuel)</div>';
  }
  document.getElementById('result-rows').innerHTML=html;
  document.getElementById('result-card').style.display='block';
}
function clr(){document.getElementById(getTarget()).value='';document.getElementById('result-card').style.display='none';}

highlight();
</script>
<script src="/nav.js"></script>
</body>
</html>
