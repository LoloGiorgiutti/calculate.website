<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculateur de ROI — Retour sur Investissement | calculate.website</title>
<meta name="description" content="Calculez le retour sur investissement (ROI), le bénéfice net et le rendement annualisé. Calculateur de ROI gratuit pour tout investissement.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://calculate.website/fr/roi/">
<link rel="alternate" hreflang="en" href="https://calculate.website/roi/">
<link rel="alternate" hreflang="es" href="https://calculate.website/es/roi/">
<link rel="alternate" hreflang="pt-BR" href="https://calculate.website/pt/roi/">
<link rel="alternate" hreflang="fr" href="https://calculate.website/fr/roi/">
<link rel="alternate" hreflang="x-default" href="https://calculate.website/roi/">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F8FA;--surface:#fff;--ink:#0A0E1A;--ink-2:#363B4F;--ink-3:#858AA0;--line:#E4E7EE;--accent:#4F6BFF;--accent-soft:#EEF1FF;--pos:#22C55E;--radius:16px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}a{color:inherit;text-decoration:none}
header{background:#0A0E1A;border-bottom:1px solid #1F2438;position:sticky;top:0;z-index:100;display:flex;align-items:center;height:58px;padding:0 20px}
.logo{font-size:16px;font-weight:700;letter-spacing:-0.03em;color:#fff}.logo span{color:var(--accent)}
.hero{background:#0A0E1A;color:#fff;padding:48px 20px 72px;text-align:center}
.bc{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:16px}.bc a{color:rgba(255,255,255,.4)}.bc a:hover{color:#fff}.bc span{margin:0 6px;opacity:.4}
h1{font-size:clamp(28px,5vw,44px);font-weight:800;letter-spacing:-0.03em;margin-bottom:12px}.sub{font-size:16px;color:rgba(255,255,255,.6);max-width:500px;margin:0 auto}
main{max-width:520px;margin:-40px auto 0;padding:0 16px 80px;position:relative;z-index:2}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:28px;box-shadow:0 4px 24px rgba(10,14,26,.06);margin-bottom:16px}
.field{margin-bottom:18px}label{display:block;font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:6px}
input[type="number"]{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:15px;font-family:inherit;color:var(--ink);background:var(--bg);outline:none;transition:border-color .15s;-moz-appearance:textfield}
input[type="number"]::-webkit-outer-spin-button,input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none}input:focus{border-color:var(--accent)}
.result-card{background:linear-gradient(135deg,#EEF1FF,#E8EEFF);border:1px solid rgba(79,107,255,.2);border-radius:12px;padding:20px 24px;margin-top:4px}
.result-lbl{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:rgba(10,14,26,.4);margin-bottom:4px}
.result-big{font-size:56px;font-weight:800;letter-spacing:-0.04em;background:linear-gradient(135deg,#4F6BFF,#7C5CFF);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:2px}
.result-big.neg{background:linear-gradient(135deg,#ef4444,#dc2626);-webkit-background-clip:text;background-clip:text;color:transparent}
.result-rows{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid rgba(79,107,255,.15)}
.result-row{display:flex;flex-direction:column;gap:3px}.rrl{font-size:11px;color:rgba(10,14,26,.4);font-weight:600;text-transform:uppercase;letter-spacing:.05em}.rrv{font-size:18px;font-weight:700;color:var(--ink)}
.empty{color:var(--ink-3);font-size:14px;text-align:center;padding:16px 0}
@media(max-width:480px){.result-rows{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><a href="/fr/" class="logo">calculate<span>.website</span></a></header>
<div class="hero">
  <div class="bc"><a href="/fr/">Accueil</a><span>›</span><a href="/fr/finance/">Finances</a><span>›</span>Calculateur de ROI</div>
  <h1>📊 Calculateur de ROI</h1>
  <p class="sub">Calculez le retour sur investissement, le bénéfice net et le rendement annualisé pour tout investissement.</p>
</div>
<main>
  <div class="card">
    <div class="field">
      <label>Investissement initial (€)</label>
      <input type="number" id="initial" min="0" step="100" placeholder="ex. 10000" oninput="calc()">
    </div>
    <div class="field">
      <label>Valeur finale (€)</label>
      <input type="number" id="final" min="0" step="100" placeholder="ex. 15000" oninput="calc()">
    </div>
    <div class="field">
      <label>Durée de l'investissement (années, optionnel)</label>
      <input type="number" id="years" min="0" step="0.5" placeholder="ex. 3" oninput="calc()">
    </div>
    <div id="result"><div class="empty">Saisissez les valeurs initiale et finale ci-dessus</div></div>
  </div>
</main>
<script src="/nav.js"></script>
<script>
function fmt(n,d){return n.toLocaleString('fr-FR',{minimumFractionDigits:d!==undefined?d:2,maximumFractionDigits:d!==undefined?d:2})+' €';}
function calc(){
  var init=parseFloat(document.getElementById('initial').value);
  var fin=parseFloat(document.getElementById('final').value);
  var years=parseFloat(document.getElementById('years').value);
  if(isNaN(init)||isNaN(fin)||init<=0){document.getElementById('result').innerHTML='<div class="empty">Saisissez les valeurs initiale et finale ci-dessus</div>';return;}
  var netProfit=fin-init;
  var roi=(netProfit/init)*100;
  var annualized=!isNaN(years)&&years>0?((Math.pow(fin/init,1/years)-1)*100):null;
  var isPos=roi>=0;
  document.getElementById('result').innerHTML='<div class="result-card"><div class="result-lbl">Retour sur Investissement (ROI)</div><div class="result-big'+(isPos?'':' neg')+'">'+roi.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+'%</div>'
    +'<div class="result-rows">'
    +'<div class="result-row"><div class="rrl">Bénéfice/perte net</div><div class="rrv">'+(isPos?'+':'')+fmt(netProfit)+'</div></div>'
    +'<div class="result-row"><div class="rrl">Investissement initial</div><div class="rrv">'+fmt(init,0)+'</div></div>'
    +'<div class="result-row"><div class="rrl">Valeur finale</div><div class="rrv">'+fmt(fin,0)+'</div></div>'
    +(annualized!==null?'<div class="result-row"><div class="rrl">Rendement annualisé</div><div class="rrv">'+annualized.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+'%/an</div></div>':'')
    +'</div></div>';
}
</script>
</body>
</html>
