<style>
:root{--bg:#F7F8FA;--surface:#FFF;--ink:#080A12;--ink-light:#60647A;--ink-faint:#B4B8CC;--hi:#4F6BFF;--hi-soft:#EEF1FF;--border:#D4D8E6;--radius:16px;--radius-sm:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
.page{max-width:520px;margin:0 auto;padding:36px 20px 60px}
h1{font-size:26px;font-weight:700;letter-spacing:-.03em;margin-bottom:6px}
.sub{font-size:14px;color:var(--ink-light);line-height:1.5;margin-bottom:28px}
.card{background:var(--surface);border-radius:var(--radius);padding:24px;margin-bottom:16px;border:1px solid var(--border)}
label{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-light);margin-bottom:8px}
input[type=date]{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Inter',sans-serif;font-size:16px;color:var(--ink);background:var(--surface);outline:none;transition:border-color .15s;cursor:pointer}
input[type=date]:focus{border-color:var(--hi)}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat-card{background:var(--surface);border-radius:var(--radius-sm);padding:18px;border:1px solid var(--border)}
.stat-icon{font-size:24px;margin-bottom:8px}
.stat-val{font-size:22px;font-weight:700;color:var(--hi);letter-spacing:-.02em;line-height:1;margin-bottom:4px;word-break:break-word}
.stat-lbl{font-size:12px;color:var(--ink-light);line-height:1.4}
.empty{text-align:center;padding:40px 20px;color:var(--ink-faint);font-size:14px}
</style>
</head>
<body>
<header></header>
<div class="page">
  <h1>Votre Vie en Chiffres</h1>
  <p class="sub">Découvrez des statistiques fascinantes sur votre vie depuis votre naissance.</p>

  <div class="card">
    <label>Votre date de naissance</label>
    <input type="date" id="birthdate" oninput="calculate()">
  </div>

  <div id="stats-area"><div class="empty">Entrez votre date de naissance pour voir votre vie en chiffres</div></div>
</div>

<script>
function fmt(n){
  if(n>=1e12) return (n/1e12).toFixed(2)+' bill.';
  if(n>=1e9)  return (n/1e9).toFixed(2)+' mrd';
  if(n>=1e6)  return (n/1e6).toFixed(2)+' mill.';
  return Math.round(n).toLocaleString('fr-FR');
}

function calculate(){
  var val=document.getElementById('birthdate').value;
  if(!val){document.getElementById('stats-area').innerHTML='<div class="empty">Entrez votre date de naissance pour voir votre vie en chiffres</div>';return;}
  var p=val.split('-');
  var birth=new Date(+p[0],+p[1]-1,+p[2]);
  var now=new Date();
  if(birth>now){document.getElementById('stats-area').innerHTML='<div class="empty">La date doit être dans le passé</div>';return;}
  var seconds=(now-birth)/1000;
  var minutes=seconds/60;
  var hours=minutes/60;
  var days=hours/24;

  var stats=[
    {icon:'❤️',val:fmt(seconds*1.1),lbl:'Battements de cœur<br><span style="font-size:10px;color:var(--ink-faint)">moy. 66 bpm</span>'},
    {icon:'🌬️',val:fmt(seconds/5),lbl:'Respirations<br><span style="font-size:10px;color:var(--ink-faint)">moy. ~12/min</span>'},
    {icon:'👁️',val:fmt(seconds*15),lbl:'Clignements des yeux<br><span style="font-size:10px;color:var(--ink-faint)">moy. ~15/min</span>'},
    {icon:'🛌',val:fmt(hours/3),lbl:'Heures de sommeil<br><span style="font-size:10px;color:var(--ink-faint)">moy. 8h/jour</span>'},
    {icon:'🚶',val:fmt(days*8000),lbl:'Pas effectués<br><span style="font-size:10px;color:var(--ink-faint)">moy. ~8 000/jour</span>'},
    {icon:'🍽️',val:fmt(days*3),lbl:'Repas pris<br><span style="font-size:10px;color:var(--ink-faint)">moy. 3/jour</span>'},
    {icon:'🌙',val:fmt(Math.floor(days)),lbl:'Jours que vous avez vécus'},
    {icon:'🔬',val:fmt(seconds*2500000),lbl:'Nouvelles cellules créées<br><span style="font-size:10px;color:var(--ink-faint)">moy. ~2,5M/sec</span>'},
  ];

  var html='<div class="stats-grid">';
  stats.forEach(function(s){
    html+='<div class="stat-card"><div class="stat-icon">'+s.icon+'</div><div class="stat-val">'+s.val+'</div><div class="stat-lbl">'+s.lbl+'</div></div>';
  });
  html+='</div>';
  document.getElementById('stats-area').innerHTML=html;
}
</script>
