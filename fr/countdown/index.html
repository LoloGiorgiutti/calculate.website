<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compte à Rebours — Jours, Heures, Minutes et Secondes | calculate.website</title>
<meta name="description" content="Faites un compte à rebours jusqu'à n'importe quel événement, échéance ou fête. Affiche les jours, heures, minutes et secondes. Gratuit.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://calculate.website/fr/countdown/">
<link rel="alternate" hreflang="en" href="https://calculate.website/countdown/">
<link rel="alternate" hreflang="es" href="https://calculate.website/es/countdown/">
<link rel="alternate" hreflang="pt-BR" href="https://calculate.website/pt/countdown/">
<link rel="alternate" hreflang="fr" href="https://calculate.website/fr/countdown/">
<link rel="alternate" hreflang="x-default" href="https://calculate.website/countdown/">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F8FA;--surface:#fff;--ink:#0A0E1A;--ink-2:#363B4F;--ink-3:#858AA0;--line:#E4E7EE;--accent:#4F6BFF;--accent-soft:#EEF1FF;--pos:#22C55E;--radius:16px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}a{color:inherit;text-decoration:none}
header{background:#0A0E1A;border-bottom:1px solid #1F2438;position:sticky;top:0;z-index:100;display:flex;align-items:center;height:58px;padding:0 20px}
.logo{font-size:16px;font-weight:700;letter-spacing:-0.03em;color:#fff}.logo span{color:var(--accent)}
.hero{background:#0A0E1A;color:#fff;padding:48px 20px 72px;text-align:center}
.bc{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:16px}.bc a{color:rgba(255,255,255,.4)}.bc a:hover{color:#fff}.bc span{margin:0 6px;opacity:.4}
h1{font-size:clamp(28px,5vw,44px);font-weight:800;letter-spacing:-0.03em;margin-bottom:12px}.sub{font-size:16px;color:rgba(255,255,255,.6);max-width:500px;margin:0 auto}
main{max-width:520px;margin:-40px auto 0;padding:0 16px 80px;position:relative;z-index:2}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:28px;box-shadow:0 4px 24px rgba(10,14,26,.06);margin-bottom:16px}
.field{margin-bottom:18px}label{display:block;font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:6px}
input[type="text"],input[type="datetime-local"]{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:15px;font-family:inherit;color:var(--ink);background:var(--bg);outline:none;transition:border-color .15s}
input:focus{border-color:var(--accent)}
.presets{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.preset{padding:4px 10px;background:var(--accent-soft);color:var(--accent);border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}.preset:hover{background:var(--accent);color:#fff}
.countdown-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-top:16px}
.cd-unit{background:linear-gradient(135deg,#EEF1FF,#E8EEFF);border:1px solid rgba(79,107,255,.2);border-radius:12px;padding:16px 8px;text-align:center}
.cd-num{font-family:'JetBrains Mono',monospace;font-size:36px;font-weight:800;background:linear-gradient(135deg,#4F6BFF,#7C5CFF);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1}
.cd-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);margin-top:4px}
.done-msg{font-size:24px;font-weight:800;text-align:center;padding:20px 0;color:var(--pos)}
.empty{color:var(--ink-3);font-size:14px;text-align:center;padding:16px 0}
.total-days{text-align:center;margin-top:12px;font-size:14px;color:var(--ink-3)}
.total-days strong{color:var(--ink);font-size:16px}
@media(max-width:400px){.countdown-grid{grid-template-columns:1fr 1fr}.cd-num{font-size:28px}}
</style>
</head>
<body>
<header><a href="/fr/" class="logo">calculate<span>.website</span></a></header>
<div class="hero">
  <div class="bc"><a href="/fr/">Accueil</a><span>›</span><a href="/fr/dates/">Dates</a><span>›</span>Compte à Rebours</div>
  <h1>⏳ Compte à Rebours</h1>
  <p class="sub">Faites un compte à rebours jusqu'à n'importe quel événement, anniversaire, fête ou échéance en temps réel.</p>
</div>
<main>
  <div class="card">
    <div class="field">
      <label>Nom de l'événement (optionnel)</label>
      <input type="text" id="evname" placeholder="ex. Nouvel An 2027">
    </div>
    <div class="field">
      <label>Date et heure cible</label>
      <input type="datetime-local" id="target" oninput="startCountdown()">
      <div class="presets">
        <button class="preset" onclick="setPreset('new-year')">Nouvel An</button>
        <button class="preset" onclick="setPreset('noel')">Noël</button>
        <button class="preset" onclick="setPreset('ete')">Été</button>
      </div>
    </div>
    <div id="result"><div class="empty">Sélectionnez une date cible ci-dessus</div></div>
  </div>
</main>
<script src="/nav.js"></script>
<script>
var interval=null;
function pad(n){return n<10?'0'+n:n;}
function setPreset(p){
  var now=new Date(),y=now.getFullYear();
  var d;
  if(p==='new-year'){d=new Date(y+1,0,1,0,0,0);}
  else if(p==='noel'){d=new Date(now.getMonth()>=11&&now.getDate()>25?y+1:y,11,25,0,0,0);}
  else if(p==='ete'){d=new Date(now.getMonth()>=5&&now.getDate()>=21?y+1:y,5,21,0,0,0);}
  var fmt=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T00:00';
  document.getElementById('target').value=fmt;startCountdown();
}
function startCountdown(){clearInterval(interval);render();interval=setInterval(render,1000);}
function render(){
  var t=document.getElementById('target').value;
  if(!t){document.getElementById('result').innerHTML='<div class="empty">Sélectionnez une date cible ci-dessus</div>';return;}
  var target=new Date(t).getTime(),now=Date.now(),diff=target-now;
  if(diff<=0){document.getElementById('result').innerHTML='<div class="done-msg">🎉 Le temps est écoulé !</div>';return;}
  var days=Math.floor(diff/86400000),hours=Math.floor((diff%86400000)/3600000),minutes=Math.floor((diff%3600000)/60000),seconds=Math.floor((diff%60000)/1000);
  document.getElementById('result').innerHTML='<div class="countdown-grid">'
    +'<div class="cd-unit"><div class="cd-num">'+pad(days)+'</div><div class="cd-label">Jours</div></div>'
    +'<div class="cd-unit"><div class="cd-num">'+pad(hours)+'</div><div class="cd-label">Heures</div></div>'
    +'<div class="cd-unit"><div class="cd-num">'+pad(minutes)+'</div><div class="cd-label">Min</div></div>'
    +'<div class="cd-unit"><div class="cd-num">'+pad(seconds)+'</div><div class="cd-label">Sec</div></div>'
    +'</div>'
    +'<div class="total-days">Total : <strong>'+days.toLocaleString('fr-FR')+' jours</strong> restants</div>';
}
</script>
</body>
</html>
