<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculateur de Statistiques — Moyenne, Médiane, Mode | calculate.website</title>
<meta name="description" content="Calculez la moyenne, la médiane, le mode, l'écart-type et plus encore. Calculateur statistique gratuit en ligne.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://calculate.website/fr/statistics/">
<link rel="alternate" hreflang="en" href="https://calculate.website/statistics/">
<link rel="alternate" hreflang="es" href="https://calculate.website/es/statistics/">
<link rel="alternate" hreflang="pt-BR" href="https://calculate.website/pt/statistics/">
<link rel="alternate" hreflang="fr" href="https://calculate.website/fr/statistics/">
<link rel="alternate" hreflang="x-default" href="https://calculate.website/statistics/">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F8FA;--surface:#fff;--ink:#0A0E1A;--ink-2:#363B4F;--ink-3:#858AA0;--line:#E4E7EE;--accent:#4F6BFF;--accent-soft:#EEF1FF;--pos:#22C55E;--radius:16px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}a{color:inherit;text-decoration:none}
header{background:#0A0E1A;border-bottom:1px solid #1F2438;position:sticky;top:0;z-index:100;display:flex;align-items:center;height:58px;padding:0 20px}
.logo{font-size:16px;font-weight:700;letter-spacing:-0.03em;color:#fff}.logo span{color:var(--accent)}
.hero{background:#0A0E1A;color:#fff;padding:48px 20px 72px;text-align:center}
.bc{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:16px}.bc a{color:rgba(255,255,255,.4)}.bc a:hover{color:#fff}.bc span{margin:0 6px;opacity:.4}
h1{font-size:clamp(28px,5vw,44px);font-weight:800;letter-spacing:-0.03em;margin-bottom:12px}.sub{font-size:16px;color:rgba(255,255,255,.6);max-width:500px;margin:0 auto}
main{max-width:520px;margin:-40px auto 0;padding:0 16px 80px;position:relative;z-index:2}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:28px;box-shadow:0 4px 24px rgba(10,14,26,.06);margin-bottom:16px}
.field{margin-bottom:18px}label{display:block;font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:6px}
textarea{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:15px;font-family:'JetBrains Mono',monospace;color:var(--ink);background:var(--bg);outline:none;resize:vertical;min-height:100px;transition:border-color .15s}
textarea:focus{border-color:var(--accent)}
.result-card{background:linear-gradient(135deg,#EEF1FF,#E8EEFF);border:1px solid rgba(79,107,255,.2);border-radius:12px;padding:20px 24px;margin-top:4px}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-row{display:flex;flex-direction:column;gap:3px}.stl{font-size:11px;color:rgba(10,14,26,.4);font-weight:600;text-transform:uppercase;letter-spacing:.05em}.stv{font-size:20px;font-weight:800;color:var(--ink)}
.stv.big{font-size:28px;background:linear-gradient(135deg,#4F6BFF,#7C5CFF);-webkit-background-clip:text;background-clip:text;color:transparent}
.empty{color:var(--ink-3);font-size:14px;text-align:center;padding:16px 0}
@media(max-width:480px){.result-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><a href="/fr/" class="logo">calculate<span>.website</span></a></header>
<div class="hero">
  <div class="bc"><a href="/fr/">Accueil</a><span>›</span><a href="/fr/math/">Mathématiques</a><span>›</span>Statistiques</div>
  <h1>📊 Calculateur de Statistiques</h1>
  <p class="sub">Saisissez vos données pour calculer instantanément la moyenne, la médiane, le mode et bien plus encore.</p>
</div>
<main>
  <div class="card">
    <div class="field">
      <label>Données (séparées par des virgules, espaces ou retours à la ligne)</label>
      <textarea id="data" placeholder="ex. 4, 8, 15, 16, 23, 42" oninput="calc()"></textarea>
    </div>
    <div id="result"><div class="empty">Saisissez des nombres ci-dessus</div></div>
  </div>
</main>
<script src="/nav.js"></script>
<script>
function calc(){
  var raw=document.getElementById('data').value;
  var nums=raw.split(/[\s,;]+/).map(function(s){return parseFloat(s.replace(',','.'));}).filter(function(n){return !isNaN(n);});
  if(nums.length===0){document.getElementById('result').innerHTML='<div class="empty">Saisissez des nombres ci-dessus</div>';return;}
  nums.sort(function(a,b){return a-b;});
  var n=nums.length;
  var sum=nums.reduce(function(a,b){return a+b;},0);
  var mean=sum/n;
  var median=n%2===0?(nums[n/2-1]+nums[n/2])/2:nums[Math.floor(n/2)];
  var freq={};nums.forEach(function(x){freq[x]=(freq[x]||0)+1;});
  var maxF=Math.max.apply(null,Object.values(freq));
  var modes=Object.keys(freq).filter(function(k){return freq[k]===maxF;});
  var modeStr=maxF===1?'—':modes.map(Number).join(', ');
  var variance=nums.reduce(function(a,b){return a+Math.pow(b-mean,2);},0)/n;
  var std=Math.sqrt(variance);
  var range=nums[n-1]-nums[0];
  function f(v){return Number.isInteger(v)?v:parseFloat(v.toFixed(4));}
  document.getElementById('result').innerHTML='<div class="result-card"><div class="result-grid">'
    +'<div class="stat-row"><div class="stl">Moyenne</div><div class="stv big">'+f(mean)+'</div></div>'
    +'<div class="stat-row"><div class="stl">Médiane</div><div class="stv big">'+f(median)+'</div></div>'
    +'<div class="stat-row"><div class="stl">Mode</div><div class="stv">'+modeStr+'</div></div>'
    +'<div class="stat-row"><div class="stl">Écart-type</div><div class="stv">'+f(std)+'</div></div>'
    +'<div class="stat-row"><div class="stl">Variance</div><div class="stv">'+f(variance)+'</div></div>'
    +'<div class="stat-row"><div class="stl">Étendue</div><div class="stv">'+f(range)+'</div></div>'
    +'<div class="stat-row"><div class="stl">Minimum</div><div class="stv">'+nums[0]+'</div></div>'
    +'<div class="stat-row"><div class="stl">Maximum</div><div class="stv">'+nums[n-1]+'</div></div>'
    +'<div class="stat-row"><div class="stl">Somme</div><div class="stv">'+f(sum)+'</div></div>'
    +'<div class="stat-row"><div class="stl">Nombre</div><div class="stv">'+n+'</div></div>'
    +'</div></div>';
}
</script>
</body>
</html>
