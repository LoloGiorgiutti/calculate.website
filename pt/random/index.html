<meta name="description" content="Gere números aleatórios em qualquer intervalo, senhas seguras, lançamentos de dados e mais. Gerador online gratuito.">

<style>
:root{--bg:#F7F8FA;--surface:#FFF;--ink:#080A12;--ink-light:#60647A;--ink-faint:#B4B8CC;--hi:#4F6BFF;--hi-soft:#EEF1FF;--border:#D4D8E6;--radius:16px;--radius-sm:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
.page{max-width:520px;margin:0 auto;padding:36px 20px 60px}
h1{font-size:26px;font-weight:700;letter-spacing:-.03em;margin-bottom:6px}
.sub{font-size:14px;color:var(--ink-light);line-height:1.5;margin-bottom:28px}
.tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:8px 18px;border-radius:99px;border:1.5px solid var(--border);background:var(--surface);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:var(--ink-light);cursor:pointer;transition:all .15s}
.tab.active{background:var(--hi-soft);border-color:var(--hi);color:var(--hi)}
.panel{display:none}.panel.active{display:block}
.card{background:var(--surface);border-radius:var(--radius);padding:24px;margin-bottom:16px;border:1px solid var(--border)}
.field{margin-bottom:18px}.field:last-child{margin-bottom:0}
label{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-light);margin-bottom:8px}
input[type=number]{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Inter',sans-serif;font-size:16px;font-weight:600;color:var(--ink);background:var(--surface);outline:none;transition:border-color .15s;-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]:focus{border-color:var(--hi)}
.range-row{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center}
.range-sep{text-align:center;color:var(--ink-faint);font-weight:600}
.result-box{background:#0C1528;border-radius:var(--radius);padding:28px;text-align:center;margin-bottom:16px;border-top:3px solid var(--hi)}
.result-number{font-size:72px;font-weight:700;color:white;letter-spacing:-.03em;line-height:1;word-break:break-all}
.result-label{font-size:12px;color:rgba(255,255,255,.4);margin-top:8px;letter-spacing:.06em;text-transform:uppercase}
.result-password{font-size:22px;font-weight:600;color:white;font-family:monospace;word-break:break-all;line-height:1.4}
.btn{width:100%;padding:14px;background:var(--hi);border:none;border-radius:var(--radius-sm);font-family:'Inter',sans-serif;font-size:15px;font-weight:700;color:white;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.88}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--ink-light);margin-top:10px}
.btn-outline:hover{background:var(--surface);color:var(--ink)}
.checkboxes{display:flex;flex-wrap:wrap;gap:10px}
.cb-label{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--ink-light);cursor:pointer}
.dice-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.die{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:36px;cursor:pointer;transition:all .15s;user-select:none}
.die:hover{border-color:var(--hi);background:var(--hi-soft)}
.die.rolling{animation:shake .15s infinite}
@keyframes shake{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
</style>
</head>
<body>
<header></header>
<div class="page">
  <h1>Gerador Aleatório</h1>
  <p class="sub">Números, senhas, dados e mais.</p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('number',this)">🔢 Número</button>
    <button class="tab" onclick="switchTab('password',this)">🔐 Senha</button>
    <button class="tab" onclick="switchTab('dice',this)">🎲 Dado</button>
    <button class="tab" onclick="switchTab('coin',this)">🪙 Moeda</button>
  </div>

  <!-- Número -->
  <div class="panel active" id="panel-number">
    <div class="card">
      <div class="field">
        <label>Intervalo</label>
        <div class="range-row">
          <input type="number" id="num-min" value="1" placeholder="Mín">
          <span class="range-sep">a</span>
          <input type="number" id="num-max" value="100" placeholder="Máx">
        </div>
      </div>
      <div class="field">
        <label>Quantidade</label>
        <input type="number" id="num-count" value="1" min="1" max="20" placeholder="1">
      </div>
    </div>
    <div class="result-box" id="num-result"><div class="result-number" id="num-out">?</div><div class="result-label">Número aleatório</div></div>
    <button class="btn" onclick="genNumber()">Gerar número</button>
  </div>

  <!-- Senha -->
  <div class="panel" id="panel-password">
    <div class="card">
      <div class="field">
        <label>Comprimento</label>
        <input type="number" id="pwd-length" value="16" min="4" max="64">
      </div>
      <div class="field">
        <label>Incluir</label>
        <div class="checkboxes">
          <label class="cb-label"><input type="checkbox" id="pwd-upper" checked> A–Z</label>
          <label class="cb-label"><input type="checkbox" id="pwd-lower" checked> a–z</label>
          <label class="cb-label"><input type="checkbox" id="pwd-digits" checked> 0–9</label>
          <label class="cb-label"><input type="checkbox" id="pwd-symbols"> !@#$</label>
        </div>
      </div>
    </div>
    <div class="result-box" id="pwd-result"><div class="result-password" id="pwd-out">—</div><div class="result-label">Clique em gerar</div></div>
    <button class="btn" onclick="genPassword()">Gerar senha</button>
    <button class="btn btn-outline" onclick="copyPassword()">Copiar</button>
  </div>

  <!-- Dado -->
  <div class="panel" id="panel-dice">
    <div class="card">
      <div class="field"><label>Clique em um dado para jogá-lo</label></div>
      <div class="dice-grid">
        <div class="die" id="d4"  onclick="rollDie('d4',4)">🎲<br><span style="font-size:11px;color:var(--ink-light)">d4</span></div>
        <div class="die" id="d6"  onclick="rollDie('d6',6)">🎲<br><span style="font-size:11px;color:var(--ink-light)">d6</span></div>
        <div class="die" id="d8"  onclick="rollDie('d8',8)">🎲<br><span style="font-size:11px;color:var(--ink-light)">d8</span></div>
        <div class="die" id="d10" onclick="rollDie('d10',10)">🎲<br><span style="font-size:11px;color:var(--ink-light)">d10</span></div>
        <div class="die" id="d12" onclick="rollDie('d12',12)">🎲<br><span style="font-size:11px;color:var(--ink-light)">d12</span></div>
        <div class="die" id="d20" onclick="rollDie('d20',20)">🎲<br><span style="font-size:11px;color:var(--ink-light)">d20</span></div>
      </div>
    </div>
    <div class="result-box"><div class="result-number" id="dice-out">?</div><div class="result-label" id="dice-label">Clique em um dado para jogar</div></div>
  </div>

  <!-- Moeda -->
  <div class="panel" id="panel-coin">
    <div class="result-box"><div class="result-number" id="coin-out" style="font-size:80px">🪙</div><div class="result-label" id="coin-label">Clique para lançar</div></div>
    <button class="btn" onclick="flipCoin()">Lançar moeda</button>
  </div>
</div>

<script>
function switchTab(id,btn){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  btn.classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
}

function genNumber(){
  var min=parseInt(document.getElementById('num-min').value)||1;
  var max=parseInt(document.getElementById('num-max').value)||100;
  var count=Math.max(1,Math.min(20,parseInt(document.getElementById('num-count').value)||1));
  if(min>max){var t=min;min=max;max=t;}
  var nums=[];
  for(var i=0;i<count;i++) nums.push(Math.floor(Math.random()*(max-min+1))+min);
  document.getElementById('num-out').textContent=nums.map(function(n){return n.toLocaleString('pt-BR');}).join(', ');
}

function genPassword(){
  var len=Math.max(4,Math.min(64,parseInt(document.getElementById('pwd-length').value)||16));
  var chars='';
  if(document.getElementById('pwd-upper').checked) chars+='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if(document.getElementById('pwd-lower').checked) chars+='abcdefghijklmnopqrstuvwxyz';
  if(document.getElementById('pwd-digits').checked) chars+='0123456789';
  if(document.getElementById('pwd-symbols').checked) chars+='!@#$%^&*()-_=+[]{}|;:,.<>?';
  if(!chars) chars='abcdefghijklmnopqrstuvwxyz';
  var pwd='';
  for(var i=0;i<len;i++) pwd+=chars[Math.floor(Math.random()*chars.length)];
  document.getElementById('pwd-out').textContent=pwd;
}

function copyPassword(){
  var pwd=document.getElementById('pwd-out').textContent;
  if(pwd&&pwd!=='—') navigator.clipboard.writeText(pwd).then(function(){
    var btn=event.target;btn.textContent='Copiado!';setTimeout(function(){btn.textContent='Copiar';},1500);
  });
}

function rollDie(id,sides){
  var el=document.getElementById(id);
  var result=Math.floor(Math.random()*sides)+1;
  el.classList.add('rolling');
  setTimeout(function(){el.classList.remove('rolling');},300);
  document.getElementById('dice-out').textContent=result;
  document.getElementById('dice-label').textContent='d'+sides+' resultado';
}

function flipCoin(){
  var result=Math.random()<0.5;
  document.getElementById('coin-out').textContent=result?'🦅':'🪙';
  document.getElementById('coin-label').textContent=result?'Cara!':'Coroa!';
}
</script>
<script src="/nav.js"></script>
</body>
</html>
