<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversor de Bases Numéricas — Binário, Decimal, Hex, Octal | calculate.website</title>
<meta name="description" content="Converta números entre binário (base 2), decimal (base 10), hexadecimal (base 16) e octal (base 8). Conversor de bases grátis.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://calculate.website/pt/base-converter/">
<link rel="alternate" hreflang="en" href="https://calculate.website/base-converter/">
<link rel="alternate" hreflang="es" href="https://calculate.website/es/base-converter/">
<link rel="alternate" hreflang="pt-BR" href="https://calculate.website/pt/base-converter/">
<link rel="alternate" hreflang="fr" href="https://calculate.website/fr/base-converter/">
<link rel="alternate" hreflang="x-default" href="https://calculate.website/base-converter/">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F8FA;--surface:#fff;--ink:#0A0E1A;--ink-2:#363B4F;--ink-3:#858AA0;--line:#E4E7EE;--accent:#4F6BFF;--accent-soft:#EEF1FF;--pos:#22C55E;--radius:16px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}a{color:inherit;text-decoration:none}
header{background:#0A0E1A;border-bottom:1px solid #1F2438;position:sticky;top:0;z-index:100;display:flex;align-items:center;height:58px;padding:0 20px}
.logo{font-size:16px;font-weight:700;letter-spacing:-0.03em;color:#fff}.logo span{color:var(--accent)}
.hero{background:#0A0E1A;color:#fff;padding:48px 20px 72px;text-align:center}
.bc{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:16px}.bc a{color:rgba(255,255,255,.4)}.bc a:hover{color:#fff}.bc span{margin:0 6px;opacity:.4}
h1{font-size:clamp(28px,5vw,44px);font-weight:800;letter-spacing:-0.03em;margin-bottom:12px}.sub{font-size:16px;color:rgba(255,255,255,.6);max-width:500px;margin:0 auto}
main{max-width:520px;margin:-40px auto 0;padding:0 16px 80px;position:relative;z-index:2}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:28px;box-shadow:0 4px 24px rgba(10,14,26,.06);margin-bottom:16px}
.base-block{margin-bottom:20px}
.base-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.base-name{font-size:13px;font-weight:600;color:var(--ink-2)}
.base-tag{font-size:11px;font-weight:700;padding:2px 8px;background:var(--accent-soft);color:var(--accent);border-radius:4px}
.base-input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:16px;font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--ink);background:var(--bg);outline:none;transition:border-color .15s}
.base-input:focus{border-color:var(--accent)}
.error{font-size:12px;color:#ef4444;margin-top:4px;display:none}
</style>
</head>
<body>
<header><a href="/pt/" class="logo">calculate<span>.website</span></a></header>
<div class="hero">
  <div class="bc"><a href="/pt/">Início</a><span>›</span><a href="/pt/math/">Matemática</a><span>›</span>Conversor de Bases</div>
  <h1>🔢 Conversor de Bases Numéricas</h1>
  <p class="sub">Converta instantaneamente entre binário, decimal, hexadecimal, octal e qualquer base de 2 a 36.</p>
</div>
<main>
  <div class="card">
    <div class="base-block">
      <div class="base-label"><span class="base-name">Decimal</span><span class="base-tag">Base 10</span></div>
      <input class="base-input" type="text" id="dec" placeholder="ex. 255" oninput="convertFrom('dec')">
    </div>
    <div class="base-block">
      <div class="base-label"><span class="base-name">Binário</span><span class="base-tag">Base 2</span></div>
      <input class="base-input" type="text" id="bin" placeholder="ex. 11111111" oninput="convertFrom('bin')">
    </div>
    <div class="base-block">
      <div class="base-label"><span class="base-name">Hexadecimal</span><span class="base-tag">Base 16</span></div>
      <input class="base-input" type="text" id="hex" placeholder="ex. FF" oninput="convertFrom('hex')">
    </div>
    <div class="base-block">
      <div class="base-label"><span class="base-name">Octal</span><span class="base-tag">Base 8</span></div>
      <input class="base-input" type="text" id="oct" placeholder="ex. 377" oninput="convertFrom('oct')">
    </div>
    <div id="err" class="error">Entrada inválida para esta base.</div>
  </div>
</main>
<script src="/nav.js"></script>
<script>
var bases={dec:10,bin:2,hex:16,oct:8};
var updating=false;
function convertFrom(from){
  if(updating)return;updating=true;
  var val=document.getElementById(from).value.trim().toUpperCase();
  document.getElementById('err').style.display='none';
  if(!val){['dec','bin','hex','oct'].forEach(function(id){if(id!==from)document.getElementById(id).value='';});updating=false;return;}
  var n=parseInt(val,bases[from]);
  if(isNaN(n)||n<0){document.getElementById('err').style.display='block';updating=false;return;}
  ['dec','bin','hex','oct'].forEach(function(id){if(id!==from)document.getElementById(id).value=n.toString(bases[id]).toUpperCase();});
  updating=false;
}
</script>
</body>
</html>
