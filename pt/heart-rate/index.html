<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Zonas de Frequência Cardíaca | calculate.website</title>
<meta name="description" content="Calcule sua frequência cardíaca máxima e as 5 zonas de treino pela idade. Calculadora de FC grátis para corrida, ciclismo e todos os esportes.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://calculate.website/pt/heart-rate/">
<link rel="alternate" hreflang="en" href="https://calculate.website/heart-rate/">
<link rel="alternate" hreflang="es" href="https://calculate.website/es/heart-rate/">
<link rel="alternate" hreflang="pt-BR" href="https://calculate.website/pt/heart-rate/">
<link rel="alternate" hreflang="fr" href="https://calculate.website/fr/heart-rate/">
<link rel="alternate" hreflang="x-default" href="https://calculate.website/heart-rate/">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F8FA;--surface:#fff;--ink:#0A0E1A;--ink-2:#363B4F;--ink-3:#858AA0;--line:#E4E7EE;--accent:#4F6BFF;--accent-soft:#EEF1FF;--pos:#22C55E;--radius:16px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}a{color:inherit;text-decoration:none}
header{background:#0A0E1A;border-bottom:1px solid #1F2438;position:sticky;top:0;z-index:100;display:flex;align-items:center;height:58px;padding:0 20px}
.logo{font-size:16px;font-weight:700;letter-spacing:-0.03em;color:#fff}.logo span{color:var(--accent)}
.hero{background:#0A0E1A;color:#fff;padding:48px 20px 72px;text-align:center}
.bc{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:16px}.bc a{color:rgba(255,255,255,.4)}.bc a:hover{color:#fff}.bc span{margin:0 6px;opacity:.4}
h1{font-size:clamp(28px,5vw,44px);font-weight:800;letter-spacing:-0.03em;margin-bottom:12px}.sub{font-size:16px;color:rgba(255,255,255,.6);max-width:500px;margin:0 auto}
main{max-width:520px;margin:-40px auto 0;padding:0 16px 80px;position:relative;z-index:2}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:28px;box-shadow:0 4px 24px rgba(10,14,26,.06);margin-bottom:16px}
.field{margin-bottom:18px}label{display:block;font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:6px}
input[type="number"]{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:15px;font-family:inherit;color:var(--ink);background:var(--bg);outline:none;transition:border-color .15s;-moz-appearance:textfield}
input[type="number"]::-webkit-outer-spin-button,input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none}input:focus{border-color:var(--accent)}
.presets{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.preset{padding:4px 10px;background:var(--accent-soft);color:var(--accent);border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}.preset:hover{background:var(--accent);color:#fff}
.max-hr{background:linear-gradient(135deg,#EEF1FF,#E8EEFF);border:1px solid rgba(79,107,255,.2);border-radius:12px;padding:16px 20px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.max-hr-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:rgba(10,14,26,.4)}
.max-hr-val{font-size:36px;font-weight:800;background:linear-gradient(135deg,#4F6BFF,#7C5CFF);-webkit-background-clip:text;background-clip:text;color:transparent}
.zones{display:flex;flex-direction:column;gap:8px}
.zone{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;border:1.5px solid var(--line)}
.zone-color{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.zone-info{flex:1}.zone-name{font-size:13px;font-weight:700;color:var(--ink)}.zone-desc{font-size:11px;color:var(--ink-3);margin-top:1px}
.zone-bpm{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--ink)}
.empty{color:var(--ink-3);font-size:14px;text-align:center;padding:16px 0}
</style>
</head>
<body>
<header><a href="/pt/" class="logo">calculate<span>.website</span></a></header>
<div class="hero">
  <div class="bc"><a href="/pt/">Início</a><span>›</span><a href="/pt/health/">Saúde</a><span>›</span>Zonas de Frequência Cardíaca</div>
  <h1>❤️ Zonas de Frequência Cardíaca</h1>
  <p class="sub">Calcule sua frequência cardíaca máxima e as 5 zonas de treino com base na sua idade.</p>
</div>
<main>
  <div class="card">
    <div class="field">
      <label>Sua idade</label>
      <input type="number" id="age" min="10" max="100" placeholder="ex. 30" oninput="calc()">
      <div class="presets">
        <button class="preset" onclick="setV(20)">20</button>
        <button class="preset" onclick="setV(30)">30</button>
        <button class="preset" onclick="setV(40)">40</button>
        <button class="preset" onclick="setV(50)">50</button>
      </div>
    </div>
    <div class="field">
      <label>FC de repouso (opcional, bpm)</label>
      <input type="number" id="rhr" min="30" max="120" placeholder="ex. 60" oninput="calc()">
    </div>
    <div id="result"><div class="empty">Digite sua idade acima</div></div>
  </div>
</main>
<script src="/nav.js"></script>
<script>
function setV(v){document.getElementById('age').value=v;calc();}
var ZONES=[
  {name:'Zona 1 — Recuperação',desc:'Muito leve, aquecimento',pct:[0.5,0.6],color:'#6ee7b7'},
  {name:'Zona 2 — Base aeróbica',desc:'Queima de gordura, resistência',pct:[0.6,0.7],color:'#3b82f6'},
  {name:'Zona 3 — Aeróbica',desc:'Melhora o condicionamento cardiovascular',pct:[0.7,0.8],color:'#f59e0b'},
  {name:'Zona 4 — Limiar',desc:'Limiar de lactato, intenso',pct:[0.8,0.9],color:'#f97316'},
  {name:'Zona 5 — Máxima',desc:'Sprint, esforço VO₂max',pct:[0.9,1.0],color:'#ef4444'},
];
function calc(){
  var age=parseInt(document.getElementById('age').value);
  var rhr=parseFloat(document.getElementById('rhr').value)||null;
  if(isNaN(age)||age<10){document.getElementById('result').innerHTML='<div class="empty">Digite sua idade acima</div>';return;}
  var maxHR=220-age;
  var html='<div class="max-hr"><div><div class="max-hr-label">Frequência cardíaca máxima</div><div style="font-size:12px;color:var(--ink-3);margin-top:2px">Fórmula: 220 − idade</div></div><div class="max-hr-val">'+maxHR+' bpm</div></div>';
  html+='<div class="zones">';
  ZONES.forEach(function(z){
    var low,high;
    if(rhr){low=Math.round(rhr+(maxHR-rhr)*z.pct[0]);high=Math.round(rhr+(maxHR-rhr)*z.pct[1]);}
    else{low=Math.round(maxHR*z.pct[0]);high=Math.round(maxHR*z.pct[1]);}
    html+='<div class="zone"><div class="zone-color" style="background:'+z.color+'"></div><div class="zone-info"><div class="zone-name">'+z.name+'</div><div class="zone-desc">'+z.desc+'</div></div><div class="zone-bpm">'+low+'–'+high+'</div></div>';
  });
  html+='</div>';
  document.getElementById('result').innerHTML=html;
}
</script>
</body>
</html>
