<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Peso Ideal — 5 Fórmulas | calculate.website</title>
<meta name="description" content="Calcule seu peso ideal com 5 fórmulas científicas (Devine, Robinson, Miller, Hamwi, IMC). Calculadora de peso ideal grátis.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://calculate.website/pt/ideal-weight/">
<link rel="alternate" hreflang="en" href="https://calculate.website/ideal-weight/">
<link rel="alternate" hreflang="es" href="https://calculate.website/es/ideal-weight/">
<link rel="alternate" hreflang="pt-BR" href="https://calculate.website/pt/ideal-weight/">
<link rel="alternate" hreflang="fr" href="https://calculate.website/fr/ideal-weight/">
<link rel="alternate" hreflang="x-default" href="https://calculate.website/ideal-weight/">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F8FA;--surface:#fff;--ink:#0A0E1A;--ink-2:#363B4F;--ink-3:#858AA0;--line:#E4E7EE;--accent:#4F6BFF;--accent-soft:#EEF1FF;--pos:#22C55E;--radius:16px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}a{color:inherit;text-decoration:none}
header{background:#0A0E1A;border-bottom:1px solid #1F2438;position:sticky;top:0;z-index:100;display:flex;align-items:center;height:58px;padding:0 20px}
.logo{font-size:16px;font-weight:700;letter-spacing:-0.03em;color:#fff}.logo span{color:var(--accent)}
.hero{background:#0A0E1A;color:#fff;padding:48px 20px 72px;text-align:center}
.bc{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:16px}.bc a{color:rgba(255,255,255,.4)}.bc a:hover{color:#fff}.bc span{margin:0 6px;opacity:.4}
h1{font-size:clamp(28px,5vw,44px);font-weight:800;letter-spacing:-0.03em;margin-bottom:12px}.sub{font-size:16px;color:rgba(255,255,255,.6);max-width:500px;margin:0 auto}
main{max-width:520px;margin:-40px auto 0;padding:0 16px 80px;position:relative;z-index:2}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:28px;box-shadow:0 4px 24px rgba(10,14,26,.06);margin-bottom:16px}
.seg-row{display:flex;gap:8px;margin-bottom:20px}
.seg-btn{flex:1;padding:9px;border:1.5px solid var(--line);border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;background:var(--bg);color:var(--ink-3);font-family:inherit;transition:all .15s;text-align:center}
.seg-btn.active{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.field{margin-bottom:18px}label{display:block;font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:6px}
input[type="number"]{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:15px;font-family:inherit;color:var(--ink);background:var(--bg);outline:none;transition:border-color .15s;-moz-appearance:textfield}
input[type="number"]::-webkit-outer-spin-button,input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none}input:focus{border-color:var(--accent)}
.result-card{background:linear-gradient(135deg,#EEF1FF,#E8EEFF);border:1px solid rgba(79,107,255,.2);border-radius:12px;padding:20px 24px;margin-top:4px}
.result-lbl{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:rgba(10,14,26,.4);margin-bottom:4px}
.result-big{font-size:42px;font-weight:800;letter-spacing:-0.04em;background:linear-gradient(135deg,#4F6BFF,#7C5CFF);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:2px}
.formula-list{margin-top:14px;padding-top:14px;border-top:1px solid rgba(79,107,255,.15)}
.formula-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(79,107,255,.08)}
.formula-name{font-size:12px;color:var(--ink-3);font-weight:600}
.formula-val{font-size:16px;font-weight:700;color:var(--ink)}
.empty{color:var(--ink-3);font-size:14px;text-align:center;padding:16px 0}
</style>
</head>
<body>
<header><a href="/" class="logo">calculate<span>.website</span></a></header>
<div class="hero">
  <div class="bc"><a href="/pt/">Início</a><span>›</span><a href="/pt/health/">Saúde</a><span>›</span>Peso Ideal</div>
  <h1>🎯 Calculadora de Peso Ideal</h1>
  <p class="sub">Encontre seu peso ideal com 5 fórmulas científicas baseadas na sua altura e sexo.</p>
</div>
<main>
  <div class="card">
    <div class="seg-row">
      <button class="seg-btn active" id="btn-male" onclick="setSex('male')">Masculino</button>
      <button class="seg-btn" id="btn-female" onclick="setSex('female')">Feminino</button>
    </div>
    <div class="field">
      <label>Altura (cm)</label>
      <input type="number" id="height" min="100" max="250" placeholder="ex. 175" oninput="calc()">
    </div>
    <div id="result"><div class="empty">Digite sua altura acima</div></div>
  </div>
</main>
<script src="/nav.js"></script>
<script>
var sex='male';
function setSex(s){sex=s;document.getElementById('btn-male').classList.toggle('active',s==='male');document.getElementById('btn-female').classList.toggle('active',s==='female');calc();}
function calc(){
  var h=parseFloat(document.getElementById('height').value);
  if(isNaN(h)||h<100){document.getElementById('result').innerHTML='<div class="empty">Digite sua altura acima</div>';return;}
  var inches=(h/2.54)-60;var isMale=sex==='male';
  var devine=isMale?50+2.3*inches:45.5+2.3*inches;
  var robinson=isMale?52+1.9*inches:49+1.7*inches;
  var miller=isMale?56.2+1.41*inches:53.1+1.36*inches;
  var hamwi=isMale?48+2.7*inches:45.4+2.3*inches;
  var bmiIdeal=isMale?21.5*(h/100)*(h/100):21*(h/100)*(h/100);
  var avg=(devine+robinson+miller+hamwi+bmiIdeal)/5;
  function f(kg){return kg.toFixed(1).replace('.',',')+' kg';}
  document.getElementById('result').innerHTML='<div class="result-card"><div class="result-lbl">Peso ideal médio</div><div class="result-big">'+avg.toFixed(1).replace('.',',')+' kg</div>'
    +'<div class="formula-list">'
    +'<div class="formula-row"><span class="formula-name">Devine (1974)</span><span class="formula-val">'+f(devine)+'</span></div>'
    +'<div class="formula-row"><span class="formula-name">Robinson (1983)</span><span class="formula-val">'+f(robinson)+'</span></div>'
    +'<div class="formula-row"><span class="formula-name">Miller (1983)</span><span class="formula-val">'+f(miller)+'</span></div>'
    +'<div class="formula-row"><span class="formula-name">Hamwi (1964)</span><span class="formula-val">'+f(hamwi)+'</span></div>'
    +'<div class="formula-row"><span class="formula-name">Por IMC (21–22)</span><span class="formula-val">'+f(bmiIdeal)+'</span></div>'
    +'</div></div>';
}
</script>
</body>
</html>
