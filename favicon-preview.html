<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Favicon — Muestras</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
  body { font-family: 'Inter', sans-serif; background: #080C18; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 56px 24px 72px; gap: 0; }
  h1 { font-size: 11px; color: rgba(255,255,255,.35); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 48px; }
  .row { display: flex; gap: 36px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .label { font-size: 11px; color: rgba(255,255,255,.4); text-align: center; line-height: 1.6; max-width: 120px; }
  .label b { color: rgba(255,255,255,.75); font-size: 13px; display: block; margin-bottom: 2px; }
  .label code { font-size: 9.5px; color: rgba(255,255,255,.3); font-family: monospace; }
  svg { filter: drop-shadow(0 8px 24px rgba(0,0,0,.5)); }

  .divider { width: 100%; max-width: 700px; border: none; border-top: 1px solid rgba(255,255,255,.06); margin: 48px 0 40px; }
  .ref-label { font-size: 10px; color: rgba(255,255,255,.2); letter-spacing:.1em; text-transform:uppercase; margin-bottom:32px; }
</style>
</head>
<body>
<h1>Nuevas opciones de favicon — columnas iguales, relleno, sin igual</h1>
<div class="row">

  <!-- 1: Navy profundo → Azul real -->
  <div class="item">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="112" height="112">
      <defs><linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#1E3A8A"/>
        <stop offset="100%" stop-color="#2563EB"/>
      </linearGradient></defs>
      <rect width="128" height="128" rx="26" fill="url(#g1)"/>
      <rect x="16" y="14" width="96" height="30" rx="8" fill="rgba(255,255,255,.13)"/>
      <rect x="16" y="56" width="28" height="20" rx="6" fill="rgba(255,255,255,.75)"/>
      <rect x="50" y="56" width="28" height="20" rx="6" fill="rgba(255,255,255,.75)"/>
      <rect x="84" y="56" width="28" height="20" rx="6" fill="rgba(255,255,255,.75)"/>
      <rect x="16" y="84" width="28" height="30" rx="6" fill="rgba(255,255,255,.75)"/>
      <rect x="50" y="84" width="28" height="30" rx="6" fill="rgba(255,255,255,.75)"/>
      <rect x="84" y="84" width="28" height="30" rx="6" fill="rgba(255,255,255,.97)"/>
    </svg>
    <div class="label"><b>1 — Navy</b><code>#1E3A8A → #2563EB</code></div>
  </div>

  <!-- 2: Azul rey → Azul medio (el C de antes pero corregido) -->
  <div class="item">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="112" height="112">
      <defs><linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#1D4ED8"/>
        <stop offset="100%" stop-color="#3B82F6"/>
      </linearGradient></defs>
      <rect width="128" height="128" rx="26" fill="url(#g2)"/>
      <rect x="16" y="14" width="96" height="30" rx="8" fill="rgba(255,255,255,.13)"/>
      <rect x="16" y="56" width="28" height="20" rx="6" fill="rgba(255,255,255,.75)"/>
      <rect x="50" y="56" width="28" height="20" rx="6" fill="rgba(255,255,255,.75)"/>
      <rect x="84" y="56" width="28" height="20" rx="6" fill="rgba(255,255,255,.75)"/>
      <rect x="16" y="84" width="28" height="30" rx="6" fill="rgba(255,255,255,.75)"/>
      <rect x="50" y="84" width="28" height="30" rx="6" fill="rgba(255,255,255,.75)"/>
      <rect x="84" y="84" width="28" height="30" rx="6" fill="rgba(255,255,255,.97)"/>
    </svg>
    <div class="label"><b>2 — Royal</b><code>#1D4ED8 → #3B82F6</code></div>
  </div>

  <!-- 3: Azul medio → Celeste eléctrico -->
  <div class="item">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="112" height="112">
      <defs><linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#2563EB"/>
        <stop offset="100%" stop-color="#38BDF8"/>
      </linearGradient></defs>
      <rect width="128" height="128" rx="26" fill="url(#g3)"/>
      <rect x="16" y="14" width="96" height="30" rx="8" fill="rgba(255,255,255,.13)"/>
      <rect x="16" y="56" width="28" height="20" rx="6" fill="rgba(255,255,255,.75)"/>
      <rect x="50" y="56" width="28" height="20" rx="6" fill="rgba(255,255,255,.75)"/>
      <rect x="84" y="56" width="28" height="20" rx="6" fill="rgba(255,255,255,.75)"/>
      <rect x="16" y="84" width="28" height="30" rx="6" fill="rgba(255,255,255,.75)"/>
      <rect x="50" y="84" width="28" height="30" rx="6" fill="rgba(255,255,255,.75)"/>
      <rect x="84" y="84" width="28" height="30" rx="6" fill="rgba(255,255,255,.97)"/>
    </svg>
    <div class="label"><b>3 — Eléctrico</b><code>#2563EB → #38BDF8</code></div>
  </div>

  <!-- 4: Petróleo → Azul cielo -->
  <div class="item">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="112" height="112">
      <defs><linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#0C4A6E"/>
        <stop offset="100%" stop-color="#0284C7"/>
      </linearGradient></defs>
      <rect width="128" height="128" rx="26" fill="url(#g4)"/>
      <rect x="16" y="14" width="96" height="30" rx="8" fill="rgba(255,255,255,.13)"/>
      <rect x="16" y="56" width="28" height="20" rx="6" fill="rgba(255,255,255,.75)"/>
      <rect x="50" y="56" width="28" height="20" rx="6" fill="rgba(255,255,255,.75)"/>
      <rect x="84" y="56" width="28" height="20" rx="6" fill="rgba(255,255,255,.75)"/>
      <rect x="16" y="84" width="28" height="30" rx="6" fill="rgba(255,255,255,.75)"/>
      <rect x="50" y="84" width="28" height="30" rx="6" fill="rgba(255,255,255,.75)"/>
      <rect x="84" y="84" width="28" height="30" rx="6" fill="rgba(255,255,255,.97)"/>
    </svg>
    <div class="label"><b>4 — Atlántico</b><code>#0C4A6E → #0284C7</code></div>
  </div>

  <!-- 5: Medianoche → Accent actual del sitio -->
  <div class="item">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="112" height="112">
      <defs><linearGradient id="g5" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#1e2d6b"/>
        <stop offset="100%" stop-color="#4F6BFF"/>
      </linearGradient></defs>
      <rect width="128" height="128" rx="26" fill="url(#g5)"/>
      <rect x="16" y="14" width="96" height="30" rx="8" fill="rgba(255,255,255,.13)"/>
      <rect x="16" y="56" width="28" height="20" rx="6" fill="rgba(255,255,255,.75)"/>
      <rect x="50" y="56" width="28" height="20" rx="6" fill="rgba(255,255,255,.75)"/>
      <rect x="84" y="56" width="28" height="20" rx="6" fill="rgba(255,255,255,.75)"/>
      <rect x="16" y="84" width="28" height="30" rx="6" fill="rgba(255,255,255,.75)"/>
      <rect x="50" y="84" width="28" height="30" rx="6" fill="rgba(255,255,255,.75)"/>
      <rect x="84" y="84" width="28" height="30" rx="6" fill="rgba(255,255,255,.97)"/>
    </svg>
    <div class="label"><b>5 — Medianoche</b><code>#1E2D6B → #4F6BFF</code></div>
  </div>

</div>

<hr class="divider">
<div class="ref-label">Original (referencia)</div>
<div class="row">
  <div class="item">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="80" height="80" style="opacity:.4">
      <defs><linearGradient id="gRef" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#4F6BFF"/>
        <stop offset="100%" stop-color="#7C5CFF"/>
      </linearGradient></defs>
      <rect width="128" height="128" rx="26" fill="url(#gRef)"/>
      <rect x="16" y="14" width="96" height="30" rx="8" fill="rgba(255,255,255,.15)"/>
      <rect x="16" y="56" width="24" height="20" rx="6" fill="rgba(255,255,255,.75)"/>
      <rect x="48" y="56" width="24" height="20" rx="6" fill="rgba(255,255,255,.75)"/>
      <rect x="80" y="56" width="32" height="20" rx="6" fill="rgba(255,255,255,.75)"/>
      <rect x="16" y="84" width="24" height="30" rx="6" fill="rgba(255,255,255,.75)"/>
      <rect x="48" y="84" width="24" height="30" rx="6" fill="rgba(255,255,255,.75)"/>
      <rect x="80" y="84" width="32" height="30" rx="6" fill="rgba(255,255,255,.98)"/>
      <rect x="87" y="94" width="18" height="4.5" rx="2.25" fill="#4F6BFF"/>
      <rect x="87" y="103" width="18" height="4.5" rx="2.25" fill="#4F6BFF"/>
    </svg>
    <div class="label" style="color:rgba(255,255,255,.2)">Violeta / columnas distintas / con igual</div>
  </div>
</div>

</body>
</html>
