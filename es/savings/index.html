<style>
:root{--bg:#F7F8FA;--surface:#FFF;--ink:#080A12;--ink-light:#60647A;--ink-faint:#B4B8CC;--hi:#4F6BFF;--hi-soft:#EEF1FF;--border:#D4D8E6;--radius:16px;--radius-sm:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
.page{max-width:520px;margin:0 auto;padding:36px 20px 60px}
h1{font-size:26px;font-weight:700;letter-spacing:-.03em;margin-bottom:6px}
.sub{font-size:14px;color:var(--ink-light);line-height:1.6;margin-bottom:28px}
.card{background:var(--surface);border-radius:var(--radius);padding:24px;margin-bottom:16px;border:1px solid var(--border)}
.field{margin-bottom:18px}.field:last-child{margin-bottom:0}
label{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-light);margin-bottom:7px}
.input-wrap{position:relative}
.input-prefix{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--ink-light);font-size:15px;pointer-events:none;font-weight:500}
.input-suffix{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--ink-light);font-size:13px;pointer-events:none}
input[type=number]{width:100%;padding:13px 52px 13px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Inter',sans-serif;font-size:17px;font-weight:500;color:var(--ink);background:var(--surface);outline:none;transition:border-color .15s,background .15s,color .15s;-moz-appearance:textfield;appearance:textfield}
input[type=number].has-prefix{padding-left:30px}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]:focus{border-color:var(--hi)}
.field.is-target input[type=number]{background:var(--hi-soft)!important;border-color:var(--hi)!important;color:var(--hi)!important;font-weight:800}
.field.is-target input[type=number]:disabled{opacity:1;cursor:default}
.field.is-target label{color:var(--hi)}
.result-card{background:#0C1528;border-radius:var(--radius);padding:24px 28px;margin-bottom:16px;border-top:3px solid var(--hi)}
.result-eyebrow{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:14px}
.result-rows{display:flex;flex-direction:column;gap:10px}
.result-row{display:flex;justify-content:space-between;align-items:center}
.result-row-lbl{font-size:13px;color:rgba(255,255,255,.5)}
.result-row-val{font-size:14px;font-weight:600;color:rgba(255,255,255,.85);font-family:'JetBrains Mono',monospace}
.result-row-val.pos{color:#86EFAC}
.result-row-val.hi{color:#fff;font-size:15px;font-weight:800}
.result-row-val.hi.pos{color:#86EFAC}
.result-divider{height:1px;background:rgba(255,255,255,.08);margin:2px 0}
.result-note{margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.08);font-size:12px;color:rgba(255,255,255,.4);font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>
<header></header>
<div class="page">
  <h1>💰 Calculadora de Ahorros</h1>
  <p class="sub">Deja un campo en blanco — se calcula automáticamente a partir del resto.</p>

  <div class="card">
    <div class="field" id="field-initial">
      <label for="initial">Ahorro inicial</label>
      <div class="input-wrap">
        <span class="input-prefix">$</span>
        <input type="number" id="initial" class="has-prefix" placeholder="1.000" min="0">
      </div>
    </div>
    <div class="field" id="field-monthly">
      <label for="monthly">Aporte mensual</label>
      <div class="input-wrap">
        <span class="input-prefix">$</span>
        <input type="number" id="monthly" class="has-prefix" placeholder="200" min="0">
      </div>
    </div>
    <div class="field" id="field-years">
      <label for="years">Período</label>
      <div class="input-wrap">
        <input type="number" id="years" placeholder="10" min="0" step="0.5">
        <span class="input-suffix">años</span>
      </div>
    </div>
    <div class="field" id="field-goal">
      <label for="goal">Meta (saldo final)</label>
      <div class="input-wrap">
        <span class="input-prefix">$</span>
        <input type="number" id="goal" class="has-prefix" placeholder="50.000" min="0">
      </div>
    </div>
    <div class="field" id="field-rate">
      <label for="rate">Tasa de interés anual</label>
      <div class="input-wrap">
        <input type="number" id="rate" placeholder="0" min="0" step="0.25">
        <span class="input-suffix">%/año</span>
      </div>
    </div>
  </div>

  <div class="result-card" id="result-card" style="display:none">
    <div class="result-eyebrow">Desglose</div>
    <div id="result-rows" class="result-rows"></div>
  </div>
</div>

<script>
var TARGET='goal';
var ALL=['initial','monthly','years','goal','rate'];

function calcFV(pv,pmt,r,n){if(r<1e-10)return pv+pmt*n;var fn=Math.pow(1+r,n);return pv*fn+pmt*(fn-1)/r;}
function calcPV(fv,pmt,r,n){if(n<=0)return null;if(r<1e-10)return fv-pmt*n;var fn=Math.pow(1+r,n);return(fv-pmt*(fn-1)/r)/fn;}
function calcPMT(fv,pv,r,n){if(n<=0)return null;if(r<1e-10)return(fv-pv)/n;var fn=Math.pow(1+r,n);if(Math.abs(fn-1)<1e-10)return null;return(fv-pv*fn)*r/(fn-1);}
function calcN(fv,pv,pmt,r){
  if(r<1e-10){if(Math.abs(pmt)<0.01)return null;var n=(fv-pv)/pmt;return n>0?n:null;}
  var A=pv+pmt/r,B=fv+pmt/r;if(A<=0||B<=0)return null;
  var n=Math.log(B/A)/Math.log(1+r);return n>0?n:null;
}
function calcRate(fv,pv,pmt,n){
  if(n<=0)return null;
  function f(r){if(Math.abs(r)<1e-12)return pv+pmt*n-fv;var fn=Math.pow(1+r,n);return pv*fn+pmt*(fn-1)/r-fv;}
  if(f(0)>=0)return 0;
  var hi=0.1;while(f(hi)<0&&hi<100)hi*=2;if(f(hi)<0)return null;
  var lo=0;for(var i=0;i<100;i++){var mid=(lo+hi)/2;if(hi-lo<1e-12)break;if(f(mid)<0)lo=mid;else hi=mid;}
  return(lo+hi)/2;
}

function fmt(n){return'$'+Math.round(Math.abs(n)).toLocaleString('es-AR');}
function fmtYr(n){
  var y=Math.floor(n),m=Math.round((n-y)*12);
  if(m===12){y++;m=0;}
  var s='';if(y>0)s+=y+(y===1?' año':' años');
  if(m>0)s+=(s?' ':'')+m+(m===1?' mes':' meses');
  return s||'< 1 mes';
}

function setTarget(id){
  TARGET=id;
  ALL.forEach(function(f){
    var inp=document.getElementById(f);
    var field=document.getElementById('field-'+f);
    if(f===id){inp.disabled=true;inp.value='';field.classList.add('is-target');}
    else{inp.disabled=false;field.classList.remove('is-target');}
  });
  calculate();
}

function filled(id){var v=document.getElementById(id).value.trim();return v!==''&&!isNaN(parseFloat(v));}
function getV(id){return parseFloat(document.getElementById(id).value)||0;}

ALL.forEach(function(f){
  document.getElementById(f).addEventListener('input',function(){
    if(this.value.trim()===''&&f!==TARGET){setTarget(f);}
    else{calculate();}
  });
});

function calculate(){
  var pv  =TARGET!=='initial'?(filled('initial')?getV('initial'):null):null;
  var pmt =TARGET!=='monthly'?(filled('monthly')?getV('monthly'):null):null;
  var yrs =TARGET!=='years'  ?(filled('years')  ?getV('years')  :null):null;
  var fv  =TARGET!=='goal'   ?(filled('goal')   ?getV('goal')   :null):null;
  var rAnn=TARGET!=='rate'   ?getV('rate'):null;
  var r=rAnn!==null?(rAnn/100)/12:0;
  var n=yrs!==null?yrs*12:null;
  var result=null;
  try{
    if(TARGET==='goal'){if(pv===null||pmt===null||n===null||n<=0){clr();return;}result=calcFV(pv,pmt,r,n);}
    else if(TARGET==='initial'){if(pmt===null||n===null||n<=0||fv===null){clr();return;}result=calcPV(fv,pmt,r,n);}
    else if(TARGET==='monthly'){if(pv===null||n===null||n<=0||fv===null){clr();return;}result=calcPMT(fv,pv,r,n);}
    else if(TARGET==='years'){
      if(pv===null||pmt===null||fv===null||fv<=0){clr();return;}
      var months=calcN(fv,pv,pmt,r);result=months!==null?months/12:null;
    } else if(TARGET==='rate'){
      if(pv===null||pmt===null||n===null||n<=0||fv===null||fv<=0){clr();return;}
      var mr=calcRate(fv,pv,pmt,n);result=mr!==null?mr*12*100:null;
    }
  }catch(e){clr();return;}
  if(result===null||isNaN(result)||!isFinite(result)){clr();return;}

  var inp=document.getElementById(TARGET);
  if(TARGET==='years')inp.value=Math.round(result*10)/10;
  else if(TARGET==='rate')inp.value=Math.round(result*100)/100;
  else inp.value=Math.round(result);

  var sPV =TARGET==='initial'?result:(pv||0);
  var sPMT=TARGET==='monthly'?result:(pmt||0);
  var sYrs=TARGET==='years'  ?result:(yrs||0);
  var sFV =TARGET==='goal'   ?result:(fv||0);
  var dep=sPV+sPMT*sYrs*12,int_=sFV-dep;
  var html=
    '<div class="result-row"><span class="result-row-lbl">Total aportado</span>'
    +'<span class="result-row-val">'+fmt(dep)+'</span></div>'
    +'<div class="result-row"><span class="result-row-lbl">Intereses ganados</span>'
    +'<span class="result-row-val '+(int_>=0?'pos':'')+'">'+
    (int_>=0?'+ ':'− ')+fmt(int_)+'</span></div>'
    +'<div class="result-divider"></div>'
    +'<div class="result-row">'
    +'<span class="result-row-lbl" style="color:rgba(255,255,255,.85);font-weight:600">Saldo final</span>'
    +'<span class="result-row-val hi pos">'+fmt(sFV)+'</span></div>';
  if(TARGET==='years')html+='<div class="result-note">→ '+fmtYr(result)+'</div>';
  if(TARGET==='rate'){
    var ann=Math.round(result*100)/100,mon=Math.round(result/12*100)/100;
    html+='<div class="result-note">→ '+ann+'% anual ('+mon+'% mensual)</div>';
  }
  document.getElementById('result-rows').innerHTML=html;
  document.getElementById('result-card').style.display='block';
}
function clr(){document.getElementById(TARGET).value='';document.getElementById('result-card').style.display='none';}

setTarget('goal');
</script>
<script src="/nav.js"></script>
</body>
</html>
