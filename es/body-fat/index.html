<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Grasa Corporal — Método Navy y IMC | calculate.website</title>
<meta name="description" content="Calculá tu porcentaje de grasa corporal con el método de la Marina de EE.UU. o por IMC. Gratis para hombres y mujeres.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://calculate.website/es/body-fat/">
<link rel="alternate" hreflang="en" href="https://calculate.website/body-fat/">
<link rel="alternate" hreflang="es" href="https://calculate.website/es/body-fat/">
<link rel="alternate" hreflang="pt-BR" href="https://calculate.website/pt/body-fat/">
<link rel="alternate" hreflang="fr" href="https://calculate.website/fr/body-fat/">
<link rel="alternate" hreflang="x-default" href="https://calculate.website/body-fat/">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F8FA;--surface:#fff;--ink:#0A0E1A;--ink-2:#363B4F;--ink-3:#858AA0;--line:#E4E7EE;--accent:#4F6BFF;--accent-soft:#EEF1FF;--pos:#22C55E;--radius:16px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}a{color:inherit;text-decoration:none}
header{background:#0A0E1A;border-bottom:1px solid #1F2438;position:sticky;top:0;z-index:100;display:flex;align-items:center;height:58px;padding:0 20px}
.logo{font-size:16px;font-weight:700;letter-spacing:-0.03em;color:#fff}.logo span{color:var(--accent)}
.hero{background:#0A0E1A;color:#fff;padding:48px 20px 72px;text-align:center}
.bc{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:16px}.bc a{color:rgba(255,255,255,.4)}.bc a:hover{color:#fff}.bc span{margin:0 6px;opacity:.4}
h1{font-size:clamp(28px,5vw,44px);font-weight:800;letter-spacing:-0.03em;margin-bottom:12px}.sub{font-size:16px;color:rgba(255,255,255,.6);max-width:500px;margin:0 auto}
main{max-width:520px;margin:-40px auto 0;padding:0 16px 80px;position:relative;z-index:2}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:28px;box-shadow:0 4px 24px rgba(10,14,26,.06);margin-bottom:16px}
.seg-row{display:flex;gap:8px;margin-bottom:20px}
.seg-btn{flex:1;padding:9px;border:1.5px solid var(--line);border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;background:var(--bg);color:var(--ink-3);font-family:inherit;transition:all .15s;text-align:center}
.seg-btn.active{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.field{margin-bottom:16px}label{display:block;font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:6px}
input[type="number"]{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:15px;font-family:inherit;color:var(--ink);background:var(--bg);outline:none;transition:border-color .15s;-moz-appearance:textfield}
input[type="number"]::-webkit-outer-spin-button,input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none}input:focus{border-color:var(--accent)}
.result-card{background:linear-gradient(135deg,#EEF1FF,#E8EEFF);border:1px solid rgba(79,107,255,.2);border-radius:12px;padding:20px 24px;margin-top:4px}
.result-lbl{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:rgba(10,14,26,.4);margin-bottom:4px}
.result-big{font-size:56px;font-weight:800;letter-spacing:-0.04em;background:linear-gradient(135deg,#4F6BFF,#7C5CFF);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:2px}
.category{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;margin-top:6px;background:var(--accent-soft);color:var(--accent)}
.result-rows{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid rgba(79,107,255,.15)}
.result-row{display:flex;flex-direction:column;gap:3px}.rrl{font-size:11px;color:rgba(10,14,26,.4);font-weight:600;text-transform:uppercase;letter-spacing:.05em}.rrv{font-size:18px;font-weight:700;color:var(--ink)}
.empty{color:var(--ink-3);font-size:14px;text-align:center;padding:16px 0}
.note{font-size:12px;color:var(--ink-3);margin-top:12px;font-style:italic}
@media(max-width:480px){.result-rows{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><a href="/" class="logo">calculate<span>.website</span></a></header>
<div class="hero">
  <div class="bc"><a href="/es/">Inicio</a><span>›</span><a href="/es/health/">Salud</a><span>›</span>Calculadora de Grasa Corporal</div>
  <h1>📊 Calculadora de Grasa Corporal</h1>
  <p class="sub">Estimá tu porcentaje de grasa corporal con el método de la Marina de EE.UU. o por IMC.</p>
</div>
<main>
  <div class="card">
    <div class="seg-row">
      <button class="seg-btn active" id="btn-male" onclick="setSex('male')">Masculino</button>
      <button class="seg-btn" id="btn-female" onclick="setSex('female')">Femenino</button>
    </div>
    <div class="field"><label>Altura (cm)</label><input type="number" id="height" min="100" max="250" placeholder="ej. 175"></div>
    <div class="field"><label>Peso (kg)</label><input type="number" id="weight" min="30" max="300" placeholder="ej. 80"></div>
    <div class="field"><label>Cintura (cm)</label><input type="number" id="waist" min="40" max="200" placeholder="ej. 85"></div>
    <div class="field" id="neck-field"><label>Cuello (cm)</label><input type="number" id="neck" min="20" max="80" placeholder="ej. 38"></div>
    <div class="field" id="hip-field" style="display:none"><label>Cadera (cm) <span style="font-weight:400;color:var(--ink-3)">— solo mujeres</span></label><input type="number" id="hip" min="50" max="200" placeholder="ej. 95"></div>
    <div id="result"><div class="empty">Completá tus medidas arriba</div></div>
    <p class="note">Cintura a nivel del ombligo, cadera en el punto más ancho, cuello en el centro.</p>
  </div>
</main>
<script src="/nav.js"></script>
<script>
var sex='male';
['height','weight','waist','neck','hip'].forEach(function(id){document.getElementById(id).addEventListener('input',calc);});
function setSex(s){sex=s;document.getElementById('btn-male').classList.toggle('active',s==='male');document.getElementById('btn-female').classList.toggle('active',s==='female');document.getElementById('hip-field').style.display=s==='female'?'':'none';calc();}
function getCategory(bf,male){if(male){if(bf<6)return['Grasa esencial','#4F6BFF'];if(bf<14)return['Atlético','#22C55E'];if(bf<18)return['En forma','#84cc16'];if(bf<25)return['Aceptable','#f59e0b'];return['Obesidad','#ef4444'];}else{if(bf<14)return['Grasa esencial','#4F6BFF'];if(bf<21)return['Atlético','#22C55E'];if(bf<25)return['En forma','#84cc16'];if(bf<32)return['Aceptable','#f59e0b'];return['Obesidad','#ef4444'];}}
function calc(){
  var h=parseFloat(document.getElementById('height').value),w=parseFloat(document.getElementById('weight').value),waist=parseFloat(document.getElementById('waist').value),neck=parseFloat(document.getElementById('neck').value),hip=parseFloat(document.getElementById('hip').value)||0;
  var isMale=sex==='male';
  if(isNaN(h)||isNaN(w)||isNaN(waist)||isNaN(neck)||h<=0||w<=0||waist<=0||neck<=0){document.getElementById('result').innerHTML='<div class="empty">Completá tus medidas arriba</div>';return;}
  if(!isMale&&(isNaN(hip)||hip<=0)){document.getElementById('result').innerHTML='<div class="empty">Completá todas las medidas</div>';return;}
  var bf;
  if(isMale){bf=495/(1.0324-0.19077*Math.log10(waist-neck)+0.15456*Math.log10(h))-450;}
  else{bf=495/(1.29579-0.35004*Math.log10(waist+hip-neck)+0.22100*Math.log10(h))-450;}
  bf=Math.max(0,Math.min(60,bf));
  var bmi=w/(h/100*h/100);
  var cat=getCategory(bf,isMale);
  document.getElementById('result').innerHTML='<div class="result-card"><div class="result-lbl">Grasa corporal (método Navy)</div><div class="result-big">'+bf.toFixed(1)+'%</div><div class="category" style="background:'+cat[1]+'22;color:'+cat[1]+'">'+cat[0]+'</div><div class="result-rows"><div class="result-row"><div class="rrl">Masa grasa</div><div class="rrv">'+(w*bf/100).toFixed(1)+' kg</div></div><div class="result-row"><div class="rrl">Masa magra</div><div class="rrv">'+(w*(1-bf/100)).toFixed(1)+' kg</div></div><div class="result-row"><div class="rrl">Est. por IMC</div><div class="rrv">'+((isMale?1.20*bmi+0.23*30-16.2:1.20*bmi+0.23*30-5.4)).toFixed(1)+'%</div></div><div class="result-row"><div class="rrl">IMC</div><div class="rrv">'+bmi.toFixed(1)+'</div></div></div></div>';
}
</script>
</body>
</html>
