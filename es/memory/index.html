<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test de Memoria — Prueba tu Memoria a Corto Plazo | calculate.website</title>
<meta name="description" content="Probá tu memoria a corto plazo online. Recordá secuencias de números. Test de memoria gratis.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://calculate.website/es/memory/">
<link rel="alternate" hreflang="en" href="https://calculate.website/memory/">
<link rel="alternate" hreflang="es" href="https://calculate.website/es/memory/">
<link rel="alternate" hreflang="pt-BR" href="https://calculate.website/pt/memory/">
<link rel="alternate" hreflang="fr" href="https://calculate.website/fr/memory/">
<link rel="alternate" hreflang="x-default" href="https://calculate.website/memory/">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F8FA;--surface:#fff;--ink:#0A0E1A;--ink-2:#363B4F;--ink-3:#858AA0;--line:#E4E7EE;--accent:#4F6BFF;--accent-soft:#EEF1FF;--pos:#22C55E;--radius:16px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}a{color:inherit;text-decoration:none}
header{background:#0A0E1A;border-bottom:1px solid #1F2438;position:sticky;top:0;z-index:100;display:flex;align-items:center;height:58px;padding:0 20px}
.logo{font-size:16px;font-weight:700;letter-spacing:-0.03em;color:#fff}.logo span{color:var(--accent)}
.hero{background:#0A0E1A;color:#fff;padding:48px 20px 72px;text-align:center}
.bc{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:16px}.bc a{color:rgba(255,255,255,.4)}.bc a:hover{color:#fff}.bc span{margin:0 6px;opacity:.4}
h1{font-size:clamp(28px,5vw,44px);font-weight:800;letter-spacing:-0.03em;margin-bottom:12px}.sub{font-size:16px;color:rgba(255,255,255,.6);max-width:500px;margin:0 auto}
main{max-width:520px;margin:-40px auto 0;padding:0 16px 80px;position:relative;z-index:2}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:28px;box-shadow:0 4px 24px rgba(10,14,26,.06);margin-bottom:16px;text-align:center}
.level-badge{display:inline-block;padding:4px 14px;background:var(--accent-soft);color:var(--accent);border-radius:20px;font-size:13px;font-weight:700;margin-bottom:20px}
.sequence-display{font-family:'JetBrains Mono',monospace;font-size:48px;font-weight:800;letter-spacing:0.1em;color:var(--ink);min-height:64px;display:flex;align-items:center;justify-content:center;margin:16px 0;background:var(--bg);border:1.5px solid var(--line);border-radius:12px;padding:16px;transition:all .3s}
.sequence-display.flash{background:var(--accent-soft);border-color:var(--accent)}
.sequence-display.hidden{color:var(--bg);background:var(--bg)}
.status{font-size:15px;color:var(--ink-3);margin-bottom:16px;min-height:24px}
.input-row{display:flex;gap:10px;margin-bottom:16px;justify-content:center}
.digit-btn{width:56px;height:56px;border:1.5px solid var(--line);border-radius:10px;font-size:22px;font-weight:700;cursor:pointer;background:var(--bg);color:var(--ink);font-family:'JetBrains Mono',monospace;transition:all .12s}
.digit-btn:hover{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.digit-btn:active{transform:scale(.92)}
.typed-display{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:700;color:var(--accent);min-height:48px;margin-bottom:12px;letter-spacing:0.1em}
.btn{padding:12px 28px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;margin:4px}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#3d56e0}
.btn-del{background:var(--bg);color:var(--ink-2);border:1.5px solid var(--line)}.btn-del:hover{border-color:var(--ink-3)}
.result-card{background:linear-gradient(135deg,#EEF1FF,#E8EEFF);border:1px solid rgba(79,107,255,.2);border-radius:12px;padding:20px 24px;margin-top:12px}
.result-big{font-size:48px;font-weight:800;background:linear-gradient(135deg,#4F6BFF,#7C5CFF);-webkit-background-clip:text;background-clip:text;color:transparent}
.result-sub{font-size:14px;color:var(--ink-3);margin-top:4px}
</style>
</head>
<body>
<header><a href="/es/" class="logo">calculate<span>.website</span></a></header>
<div class="hero">
  <div class="bc"><a href="/es/">Inicio</a><span>›</span><a href="/es/games/">Juegos y Tests</a><span>›</span>Test de Memoria</div>
  <h1>🧠 Test de Memoria</h1>
  <p class="sub">Recordá secuencias de números. Cada nivel agrega un dígito. ¿Hasta dónde podés llegar?</p>
</div>
<main>
  <div class="card">
    <div class="level-badge" id="level-badge">Nivel 1</div>
    <div class="sequence-display" id="seq-display">?</div>
    <div class="status" id="status">Presioná Iniciar para comenzar</div>
    <div class="typed-display" id="typed-display"></div>
    <div class="input-row">
      <button class="digit-btn" onclick="typeDigit(1)">1</button>
      <button class="digit-btn" onclick="typeDigit(2)">2</button>
      <button class="digit-btn" onclick="typeDigit(3)">3</button>
      <button class="digit-btn" onclick="typeDigit(4)">4</button>
      <button class="digit-btn" onclick="typeDigit(5)">5</button>
    </div>
    <div class="input-row">
      <button class="digit-btn" onclick="typeDigit(6)">6</button>
      <button class="digit-btn" onclick="typeDigit(7)">7</button>
      <button class="digit-btn" onclick="typeDigit(8)">8</button>
      <button class="digit-btn" onclick="typeDigit(9)">9</button>
      <button class="digit-btn" onclick="typeDigit(0)">0</button>
    </div>
    <div>
      <button class="btn btn-del" onclick="delDigit()">⌫ Borrar</button>
      <button class="btn btn-primary" id="start-btn" onclick="startGame()">▶ Iniciar</button>
    </div>
    <div id="result"></div>
  </div>
</main>
<script src="/nav.js"></script>
<script>
var sequence=[],typed=[],level=1,phase='idle',bestLevel=1;
function randDigit(){return Math.floor(Math.random()*10);}
function generateSequence(len){var s=[];for(var i=0;i<len;i++)s.push(randDigit());return s;}
function startGame(){level=1;bestLevel=1;sequence=generateSequence(level);typed=[];phase='showing';document.getElementById('result').innerHTML='';document.getElementById('start-btn').textContent='Reiniciar';showSequence();}
function nextLevel(){level++;sequence=generateSequence(level);typed=[];phase='showing';showSequence();}
function showSequence(){
  document.getElementById('level-badge').textContent='Nivel '+level;
  document.getElementById('status').textContent='Mirá con atención…';
  document.getElementById('typed-display').textContent='';
  var el=document.getElementById('seq-display');
  var i=0;
  function showNext(){
    if(i>=sequence.length){el.textContent='?';el.className='sequence-display';phase='input';document.getElementById('status').textContent='Ahora escribí la secuencia:';return;}
    el.className='sequence-display flash';el.textContent=sequence[i];
    setTimeout(function(){el.className='sequence-display hidden';el.textContent='';setTimeout(function(){i++;showNext();},200);},600);
  }
  setTimeout(showNext,500);
}
function typeDigit(d){if(phase!=='input')return;typed.push(d);document.getElementById('typed-display').textContent=typed.join('');if(typed.length===sequence.length){checkAnswer();}}
function delDigit(){if(phase!=='input'||typed.length===0)return;typed.pop();document.getElementById('typed-display').textContent=typed.join('');}
function checkAnswer(){
  phase='checking';
  var correct=typed.every(function(d,i){return d===sequence[i];});
  if(correct){if(level>bestLevel)bestLevel=level;document.getElementById('status').textContent='✅ ¡Correcto! Nivel '+(level+1)+' en camino…';setTimeout(nextLevel,1200);}
  else{document.getElementById('status').textContent='❌ ¡Incorrecto! La secuencia era: '+sequence.join(' ');document.getElementById('seq-display').textContent=sequence.join('');document.getElementById('seq-display').className='sequence-display';phase='idle';document.getElementById('result').innerHTML='<div class="result-card"><div class="result-big">Nivel '+level+'</div><div class="result-sub">Mejor nivel alcanzado: '+Math.max(level,bestLevel)+'  ·  Presioná Iniciar para intentar de nuevo</div></div>';}
}
document.addEventListener('keydown',function(e){if(e.key>='0'&&e.key<='9')typeDigit(parseInt(e.key));else if(e.key==='Backspace')delDigit();});
</script>
</body>
</html>
