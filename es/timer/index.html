<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temporizador y Cronómetro Online | calculate.website</title>
<meta name="description" content="Temporizador con alarma y cronómetro con vueltas. Gratis, sin instalación. Ideal para Pomodoro, ejercicio y cocina.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://calculate.website/es/timer/">
<link rel="alternate" hreflang="en" href="https://calculate.website/timer/">
<link rel="alternate" hreflang="es" href="https://calculate.website/es/timer/">
<link rel="alternate" hreflang="pt-BR" href="https://calculate.website/pt/timer/">
<link rel="alternate" hreflang="fr" href="https://calculate.website/fr/timer/">
<link rel="alternate" hreflang="x-default" href="https://calculate.website/timer/">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F8FA;--surface:#fff;--ink:#0A0E1A;--ink-2:#363B4F;--ink-3:#858AA0;--line:#E4E7EE;--accent:#4F6BFF;--accent-soft:#EEF1FF;--pos:#22C55E;--radius:16px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}a{color:inherit;text-decoration:none}
header{background:#0A0E1A;border-bottom:1px solid #1F2438;position:sticky;top:0;z-index:100;display:flex;align-items:center;height:58px;padding:0 20px}
.logo{font-size:16px;font-weight:700;letter-spacing:-0.03em;color:#fff}.logo span{color:var(--accent)}
.hero{background:#0A0E1A;color:#fff;padding:48px 20px 72px;text-align:center}
.bc{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:16px}.bc a{color:rgba(255,255,255,.4)}.bc a:hover{color:#fff}.bc span{margin:0 6px;opacity:.4}
h1{font-size:clamp(28px,5vw,44px);font-weight:800;letter-spacing:-0.03em;margin-bottom:12px}.sub{font-size:16px;color:rgba(255,255,255,.6);max-width:500px;margin:0 auto}
main{max-width:520px;margin:-40px auto 0;padding:0 16px 80px;position:relative;z-index:2}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:28px;box-shadow:0 4px 24px rgba(10,14,26,.06);margin-bottom:16px}
.mode-row{display:flex;gap:8px;margin-bottom:24px}
.mode-btn{flex:1;padding:10px;border:1.5px solid var(--line);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;background:var(--bg);color:var(--ink-3);font-family:inherit;transition:all .15s;text-align:center}
.mode-btn.active{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.display{font-family:'JetBrains Mono',monospace;font-size:64px;font-weight:600;text-align:center;letter-spacing:-0.02em;color:var(--ink);padding:20px 0;line-height:1}
.display.running{color:var(--accent)}.display.done{color:var(--pos)}
.presets{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}
.preset{padding:6px 14px;background:var(--accent-soft);color:var(--accent);border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}.preset:hover{background:var(--accent);color:#fff}
.inputs-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
.time-input{text-align:center}
.time-input label{display:block;font-size:11px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.time-input input{width:100%;padding:10px 4px;border:1.5px solid var(--line);border-radius:10px;font-size:24px;font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--ink);background:var(--bg);outline:none;text-align:center;-moz-appearance:textfield}
.time-input input::-webkit-outer-spin-button,.time-input input::-webkit-inner-spin-button{-webkit-appearance:none}
.time-input input:focus{border-color:var(--accent)}
.btn-row{display:flex;gap:10px;justify-content:center;margin-bottom:16px}
.btn{padding:12px 28px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-start{background:var(--accent);color:#fff}.btn-start:hover{background:#3d56e0}
.btn-stop{background:#FF4757;color:#fff}.btn-stop:hover{background:#e03040}
.btn-reset{background:var(--bg);color:var(--ink-2);border:1.5px solid var(--line)}.btn-reset:hover{border-color:var(--ink-3)}
.btn-lap{background:var(--accent-soft);color:var(--accent);border:1.5px solid rgba(79,107,255,.2)}.btn-lap:hover{background:var(--accent);color:#fff}
.laps{margin-top:8px}
.lap-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
.lap-num{color:var(--ink-3);font-weight:600}.lap-time{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--ink)}
</style>
</head>
<body>
<header><a href="/" class="logo">calculate<span>.website</span></a></header>
<div class="hero">
  <div class="bc"><a href="/es/">Inicio</a><span>›</span><a href="/es/dates/">Fechas</a><span>›</span>Temporizador</div>
  <h1>⏱️ Temporizador y Cronómetro</h1>
  <p class="sub">Temporizador con alarma y cronómetro con vueltas. Sin instalación.</p>
</div>
<main>
  <div class="card">
    <div class="mode-row">
      <button class="mode-btn active" id="btn-timer" onclick="setMode('timer')">⏲️ Temporizador</button>
      <button class="mode-btn" id="btn-stopwatch" onclick="setMode('stopwatch')">⏱️ Cronómetro</button>
    </div>
    <div id="timer-ui">
      <div class="presets">
        <button class="preset" onclick="setTimer(1,0)">1 min</button>
        <button class="preset" onclick="setTimer(5,0)">5 min</button>
        <button class="preset" onclick="setTimer(10,0)">10 min</button>
        <button class="preset" onclick="setTimer(25,0)">25 min</button>
        <button class="preset" onclick="setTimer(60,0)">1 h</button>
      </div>
      <div class="inputs-row">
        <div class="time-input"><label>Horas</label><input type="number" id="t-h" min="0" max="99" value="0"></div>
        <div class="time-input"><label>Min</label><input type="number" id="t-m" min="0" max="59" value="5"></div>
        <div class="time-input"><label>Seg</label><input type="number" id="t-s" min="0" max="59" value="0"></div>
      </div>
      <div class="display" id="timer-display">05:00</div>
      <div class="btn-row">
        <button class="btn btn-start" id="timer-start-btn" onclick="timerStartStop()">Iniciar</button>
        <button class="btn btn-reset" onclick="timerReset()">Reiniciar</button>
      </div>
    </div>
    <div id="stopwatch-ui" style="display:none">
      <div class="display" id="sw-display">00:00.0</div>
      <div class="btn-row">
        <button class="btn btn-start" id="sw-start-btn" onclick="swStartStop()">Iniciar</button>
        <button class="btn btn-lap" id="sw-lap-btn" onclick="swLap()" style="display:none">Vuelta</button>
        <button class="btn btn-reset" onclick="swReset()">Reiniciar</button>
      </div>
      <div class="laps" id="sw-laps"></div>
    </div>
  </div>
</main>
<script src="/nav.js"></script>
<script>
var mode='timer';
function setMode(m){mode=m;document.getElementById('btn-timer').classList.toggle('active',m==='timer');document.getElementById('btn-stopwatch').classList.toggle('active',m==='stopwatch');document.getElementById('timer-ui').style.display=m==='timer'?'':'none';document.getElementById('stopwatch-ui').style.display=m==='stopwatch'?'':'none';}
var timerInterval=null,timerRunning=false,timerRemaining=0;
function setTimer(m,s){document.getElementById('t-h').value=0;document.getElementById('t-m').value=m;document.getElementById('t-s').value=s;timerReset();}
function timerSeconds(){var h=parseInt(document.getElementById('t-h').value)||0,m=parseInt(document.getElementById('t-m').value)||0,s=parseInt(document.getElementById('t-s').value)||0;return h*3600+m*60+s;}
function fmtTimer(s){var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return (h>0?(h<10?'0'+h:h)+':':'')+(m<10?'0'+m:m)+':'+(sec<10?'0'+sec:sec);}
function timerRender(){var d=document.getElementById('timer-display');d.textContent=fmtTimer(timerRemaining);d.className='display'+(timerRunning?' running':timerRemaining===0&&timerSeconds()>0?' done':'');}
function timerStartStop(){if(timerRunning){clearInterval(timerInterval);timerInterval=null;timerRunning=false;document.getElementById('timer-start-btn').textContent='Continuar';timerRender();return;}if(timerRemaining===0){timerRemaining=timerSeconds();}if(timerRemaining===0)return;timerRunning=true;document.getElementById('timer-start-btn').textContent='Pausar';timerInterval=setInterval(function(){timerRemaining--;timerRender();if(timerRemaining<=0){clearInterval(timerInterval);timerRunning=false;timerRemaining=0;document.getElementById('timer-start-btn').textContent='Iniciar';timerDone();}},1000);}
function timerReset(){clearInterval(timerInterval);timerInterval=null;timerRunning=false;timerRemaining=timerSeconds();document.getElementById('timer-start-btn').textContent='Iniciar';timerRender();}
function timerDone(){try{var a=new AudioContext();var o=a.createOscillator();var g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=880;g.gain.setValueAtTime(0.3,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+1.5);o.start();o.stop(a.currentTime+1.5);}catch(e){}}
['t-h','t-m','t-s'].forEach(function(id){document.getElementById(id).addEventListener('input',function(){if(!timerRunning){timerRemaining=timerSeconds();timerRender();}});});
timerRender();
var swInterval=null,swRunning=false,swElapsed=0,swStart=0,swLaps=[];
function fmtSW(ms){var m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000),t=Math.floor((ms%1000)/100);return (m<10?'0'+m:m)+':'+(s<10?'0'+s:s)+'.'+t;}
function swRender(){document.getElementById('sw-display').textContent=fmtSW(swElapsed);}
function swStartStop(){if(swRunning){clearInterval(swInterval);swElapsed+=Date.now()-swStart;swRunning=false;document.getElementById('sw-start-btn').textContent='Continuar';document.getElementById('sw-start-btn').className='btn btn-start';document.getElementById('sw-lap-btn').style.display='none';}else{swStart=Date.now();swRunning=true;document.getElementById('sw-start-btn').textContent='Pausar';document.getElementById('sw-start-btn').className='btn btn-stop';document.getElementById('sw-lap-btn').style.display='';swInterval=setInterval(function(){swElapsed=swElapsed+(Date.now()-swStart);swStart=Date.now();swRender();},100);}}
function swLap(){if(!swRunning)return;swLaps.push(swElapsed);var html='';swLaps.slice().reverse().forEach(function(t,i){html+='<div class="lap-item"><span class="lap-num">Vuelta '+(swLaps.length-i)+'</span><span class="lap-time">'+fmtSW(t)+'</span></div>';});document.getElementById('sw-laps').innerHTML=html;}
function swReset(){clearInterval(swInterval);swRunning=false;swElapsed=0;swStart=0;swLaps=[];swRender();document.getElementById('sw-start-btn').textContent='Iniciar';document.getElementById('sw-start-btn').className='btn btn-start';document.getElementById('sw-lap-btn').style.display='none';document.getElementById('sw-laps').innerHTML='';}
swRender();
</script>
</body>
</html>
