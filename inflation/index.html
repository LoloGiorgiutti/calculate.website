<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inflation Calculator — Purchasing Power Over Time | calculate.website</title>
<meta name="description" content="Calculate the effect of inflation on purchasing power. Find out what a past amount is worth today, or what today's amount will be worth in the future.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://calculate.website/inflation/">
<link rel="alternate" hreflang="en" href="https://calculate.website/inflation/">
<link rel="alternate" hreflang="es" href="https://calculate.website/es/inflation/">
<link rel="alternate" hreflang="pt-BR" href="https://calculate.website/pt/inflation/">
<link rel="alternate" hreflang="fr" href="https://calculate.website/fr/inflation/">
<link rel="alternate" hreflang="x-default" href="https://calculate.website/inflation/">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F8FA;--surface:#fff;--ink:#0A0E1A;--ink-2:#363B4F;--ink-3:#858AA0;--line:#E4E7EE;--accent:#4F6BFF;--accent-soft:#EEF1FF;--pos:#22C55E;--radius:16px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}a{color:inherit;text-decoration:none}
header{background:#0A0E1A;border-bottom:1px solid #1F2438;position:sticky;top:0;z-index:100;display:flex;align-items:center;height:58px;padding:0 20px}
.logo{font-size:16px;font-weight:700;letter-spacing:-0.03em;color:#fff}.logo span{color:var(--accent)}
.hero{background:#0A0E1A;color:#fff;padding:48px 20px 72px;text-align:center}
.bc{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:16px}.bc a{color:rgba(255,255,255,.4)}.bc a:hover{color:#fff}.bc span{margin:0 6px;opacity:.4}
h1{font-size:clamp(28px,5vw,44px);font-weight:800;letter-spacing:-0.03em;margin-bottom:12px}.sub{font-size:16px;color:rgba(255,255,255,.6);max-width:500px;margin:0 auto}
main{max-width:520px;margin:-40px auto 0;padding:0 16px 80px;position:relative;z-index:2}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:28px;box-shadow:0 4px 24px rgba(10,14,26,.06);margin-bottom:16px}
.field{margin-bottom:18px}label{display:block;font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:6px}
input[type="number"]{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:15px;font-family:inherit;color:var(--ink);background:var(--bg);outline:none;transition:border-color .15s;-moz-appearance:textfield}
input[type="number"]::-webkit-outer-spin-button,input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none}input:focus{border-color:var(--accent)}
.presets{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.preset{padding:4px 10px;background:var(--accent-soft);color:var(--accent);border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}.preset:hover{background:var(--accent);color:#fff}
.result-card{background:linear-gradient(135deg,#EEF1FF,#E8EEFF);border:1px solid rgba(79,107,255,.2);border-radius:12px;padding:20px 24px;margin-top:4px}
.result-lbl{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:rgba(10,14,26,.4);margin-bottom:4px}
.result-big{font-size:42px;font-weight:800;letter-spacing:-0.04em;background:linear-gradient(135deg,#4F6BFF,#7C5CFF);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:2px}
.result-rows{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid rgba(79,107,255,.15)}
.result-row{display:flex;flex-direction:column;gap:3px}.rrl{font-size:11px;color:rgba(10,14,26,.4);font-weight:600;text-transform:uppercase;letter-spacing:.05em}.rrv{font-size:18px;font-weight:700;color:var(--ink)}
.empty{color:var(--ink-3);font-size:14px;text-align:center;padding:16px 0}
@media(max-width:480px){.result-rows{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><a href="/" class="logo">calculate<span>.website</span></a></header>
<div class="hero">
  <div class="bc"><a href="/">Home</a><span>›</span><a href="/finance/">Finance</a><span>›</span>Inflation Calculator</div>
  <h1>💸 Inflation Calculator</h1>
  <p class="sub">Calculate how inflation affects purchasing power over time. Enter an amount, rate and period.</p>
</div>
<main>
  <div class="card">
    <div class="field">
      <label>Initial amount</label>
      <input type="number" id="amount" min="0" step="100" placeholder="e.g. 1000" oninput="calc()">
    </div>
    <div class="field">
      <label>Annual inflation rate (%)</label>
      <input type="number" id="rate" min="0" step="0.1" placeholder="e.g. 3" oninput="calc()">
      <div class="presets">
        <button class="preset" onclick="setV('rate',2)">2%</button>
        <button class="preset" onclick="setV('rate',3)">3%</button>
        <button class="preset" onclick="setV('rate',5)">5%</button>
        <button class="preset" onclick="setV('rate',10)">10%</button>
        <button class="preset" onclick="setV('rate',50)">50%</button>
      </div>
    </div>
    <div class="field">
      <label>Number of years</label>
      <input type="number" id="years" min="1" step="1" placeholder="e.g. 10" oninput="calc()">
      <div class="presets">
        <button class="preset" onclick="setV('years',5)">5 yr</button>
        <button class="preset" onclick="setV('years',10)">10 yr</button>
        <button class="preset" onclick="setV('years',20)">20 yr</button>
        <button class="preset" onclick="setV('years',30)">30 yr</button>
      </div>
    </div>
    <div id="result"><div class="empty">Fill in the fields above</div></div>
  </div>
</main>
<script src="/nav.js"></script>
<script>
function fmt(n){return n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function setV(id,v){document.getElementById(id).value=v;calc();}
function calc(){
  var amount=parseFloat(document.getElementById('amount').value);
  var rate=parseFloat(document.getElementById('rate').value);
  var years=parseInt(document.getElementById('years').value);
  if(isNaN(amount)||isNaN(rate)||isNaN(years)||amount<=0||years<=0){document.getElementById('result').innerHTML='<div class="empty">Fill in the fields above</div>';return;}
  var futureValue=amount*Math.pow(1+rate/100,years);
  var purchasingPowerLost=futureValue-amount;
  var purchasingPower=amount/Math.pow(1+rate/100,years);
  var totalRate=((futureValue-amount)/amount)*100;
  document.getElementById('result').innerHTML='<div class="result-card"><div class="result-lbl">Future equivalent value</div><div class="result-big">$'+fmt(futureValue)+'</div>'
    +'<div class="result-rows">'
    +'<div class="result-row"><div class="rrl">Original amount</div><div class="rrv">$'+fmt(amount)+'</div></div>'
    +'<div class="result-row"><div class="rrl">Value lost to inflation</div><div class="rrv">$'+fmt(purchasingPowerLost)+'</div></div>'
    +'<div class="result-row"><div class="rrl">Purchasing power today</div><div class="rrv">$'+fmt(purchasingPower)+'</div></div>'
    +'<div class="result-row"><div class="rrl">Total inflation rate</div><div class="rrv">'+fmt(totalRate)+'%</div></div>'
    +'</div></div>';
}
</script>
</body>
</html>
