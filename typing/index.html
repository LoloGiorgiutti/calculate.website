<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing Speed Test — WPM Calculator | calculate.website</title>
<meta name="description" content="Test your typing speed online. Measure words per minute (WPM) and accuracy. Free typing speed test.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://calculate.website/typing/">
<link rel="alternate" hreflang="en" href="https://calculate.website/typing/">
<link rel="alternate" hreflang="es" href="https://calculate.website/es/typing/">
<link rel="alternate" hreflang="pt-BR" href="https://calculate.website/pt/typing/">
<link rel="alternate" hreflang="fr" href="https://calculate.website/fr/typing/">
<link rel="alternate" hreflang="x-default" href="https://calculate.website/typing/">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F8FA;--surface:#fff;--ink:#0A0E1A;--ink-2:#363B4F;--ink-3:#858AA0;--line:#E4E7EE;--accent:#4F6BFF;--accent-soft:#EEF1FF;--pos:#22C55E;--radius:16px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}a{color:inherit;text-decoration:none}
header{background:#0A0E1A;border-bottom:1px solid #1F2438;position:sticky;top:0;z-index:100;display:flex;align-items:center;height:58px;padding:0 20px}
.logo{font-size:16px;font-weight:700;letter-spacing:-0.03em;color:#fff}.logo span{color:var(--accent)}
.hero{background:#0A0E1A;color:#fff;padding:48px 20px 72px;text-align:center}
.bc{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:16px}.bc a{color:rgba(255,255,255,.4)}.bc a:hover{color:#fff}.bc span{margin:0 6px;opacity:.4}
h1{font-size:clamp(28px,5vw,44px);font-weight:800;letter-spacing:-0.03em;margin-bottom:12px}.sub{font-size:16px;color:rgba(255,255,255,.6);max-width:500px;margin:0 auto}
main{max-width:600px;margin:-40px auto 0;padding:0 16px 80px;position:relative;z-index:2}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:28px;box-shadow:0 4px 24px rgba(10,14,26,.06);margin-bottom:16px}
.stats-bar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px}
.stat{text-align:center;padding:12px;background:var(--bg);border:1.5px solid var(--line);border-radius:10px}
.stat.active{border-color:var(--accent);background:var(--accent-soft)}
.stat-val{font-size:28px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--ink);letter-spacing:-0.02em}
.stat.active .stat-val{color:var(--accent)}
.stat-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);margin-top:2px}
.text-display{background:var(--bg);border:1.5px solid var(--line);border-radius:10px;padding:16px;font-size:18px;line-height:1.8;font-family:'JetBrains Mono',monospace;color:var(--ink-3);margin-bottom:16px;min-height:100px;user-select:none}
.text-display .correct{color:var(--pos)}
.text-display .wrong{color:#ef4444;background:#fef2f2;border-radius:2px}
.text-display .current{background:var(--accent-soft);border-bottom:2px solid var(--accent);color:var(--ink)}
textarea.typing-input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:16px;font-family:'JetBrains Mono',monospace;color:var(--ink);background:var(--bg);outline:none;resize:none;height:60px;transition:border-color .15s}
textarea.typing-input:focus{border-color:var(--accent)}
.btn-row{display:flex;gap:10px;margin-top:14px}
.btn{padding:10px 22px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#3d56e0}
.btn-secondary{background:var(--bg);color:var(--ink-2);border:1.5px solid var(--line)}.btn-secondary:hover{border-color:var(--ink-3)}
.result-card{background:linear-gradient(135deg,#EEF1FF,#E8EEFF);border:1px solid rgba(79,107,255,.2);border-radius:12px;padding:20px 24px;margin-top:16px}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.rr{display:flex;flex-direction:column;gap:3px}.rrl{font-size:11px;color:rgba(10,14,26,.4);font-weight:600;text-transform:uppercase;letter-spacing:.05em}.rrv{font-size:22px;font-weight:800;color:var(--ink)}
@media(max-width:400px){.stats-bar{grid-template-columns:1fr 1fr}.result-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><a href="/" class="logo">calculate<span>.website</span></a></header>
<div class="hero">
  <div class="bc"><a href="/">Home</a><span>›</span><a href="/games/">Games & Tests</a><span>›</span>Typing Speed</div>
  <h1>⌨️ Typing Speed Test</h1>
  <p class="sub">Measure your typing speed in words per minute (WPM) and accuracy.</p>
</div>
<main>
  <div class="card">
    <div class="stats-bar">
      <div class="stat" id="stat-wpm"><div class="stat-val" id="wpm-val">0</div><div class="stat-lbl">WPM</div></div>
      <div class="stat" id="stat-acc"><div class="stat-val" id="acc-val">—</div><div class="stat-lbl">Accuracy</div></div>
      <div class="stat" id="stat-time"><div class="stat-val" id="time-val">60</div><div class="stat-lbl">Seconds</div></div>
    </div>
    <div class="text-display" id="text-display"></div>
    <textarea class="typing-input" id="typing-input" placeholder="Click here and start typing..." oninput="onType()" disabled></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="startTest()">Start / Restart</button>
      <button class="btn btn-secondary" onclick="changeText()">New text</button>
    </div>
    <div id="result"></div>
  </div>
</main>
<script src="/nav.js"></script>
<script>
var TEXTS=[
  "The quick brown fox jumps over the lazy dog. Pack my box with five dozen liquor jugs. How vexingly quick daft zebras jump.",
  "Programming is the art of telling another human being what one wants the computer to do. Computers are good at following instructions.",
  "The best way to predict the future is to invent it. Learning to write programs stretches your mind and helps you think better.",
  "Success is not the key to happiness. Happiness is the key to success. If you love what you are doing, you will be successful.",
  "Not all those who wander are lost. The world is a book, and those who do not travel read only one page of it."
];
var words=[],typed=[],startTime=null,timerInterval=null,timeLeft=60,testRunning=false,textIdx=0;
function getWords(){return TEXTS[textIdx].split(' ');}
function changeText(){textIdx=(textIdx+1)%TEXTS.length;startTest();}
function renderText(){
  var html='';
  words.forEach(function(w,i){
    if(i<typed.length){
      var cls=typed[i]===w?'correct':'wrong';
      html+='<span class="'+cls+'">'+w+'</span> ';
    } else if(i===typed.length){
      html+='<span class="current">'+w+'</span> ';
    } else {
      html+='<span>'+w+'</span> ';
    }
  });
  document.getElementById('text-display').innerHTML=html;
}
function startTest(){
  clearInterval(timerInterval);testRunning=false;
  words=getWords();typed=[];startTime=null;timeLeft=60;
  document.getElementById('typing-input').value='';
  document.getElementById('typing-input').disabled=false;
  document.getElementById('typing-input').focus();
  document.getElementById('wpm-val').textContent='0';
  document.getElementById('acc-val').textContent='—';
  document.getElementById('time-val').textContent='60';
  document.getElementById('result').innerHTML='';
  renderText();
}
function onType(){
  if(!testRunning){
    startTime=Date.now();testRunning=true;
    timerInterval=setInterval(function(){
      timeLeft--;
      document.getElementById('time-val').textContent=timeLeft;
      if(timeLeft<=0){clearInterval(timerInterval);endTest();}
    },1000);
  }
  var input=document.getElementById('typing-input').value;
  var parts=input.split(' ');
  typed=parts.slice(0,-1);
  var current=parts[parts.length-1];
  if(input.endsWith(' ')&&typed.length<words.length){
    typed=parts.slice(0,-1);document.getElementById('typing-input').value='';
  }
  var correct=typed.filter(function(w,i){return w===words[i];}).length;
  var elapsed=(Date.now()-startTime)/60000;
  var wpm=elapsed>0?Math.round(correct/elapsed):0;
  document.getElementById('wpm-val').textContent=wpm;
  if(typed.length>0){document.getElementById('acc-val').textContent=Math.round(correct/typed.length*100)+'%';}
  renderText();
  if(typed.length>=words.length){clearInterval(timerInterval);endTest();}
}
function endTest(){
  testRunning=false;document.getElementById('typing-input').disabled=true;
  var elapsed=(Date.now()-startTime)/60000;
  var correct=typed.filter(function(w,i){return w===words[i];}).length;
  var wpm=elapsed>0?Math.round(correct/elapsed):0;
  var acc=typed.length>0?Math.round(correct/typed.length*100):0;
  document.getElementById('result').innerHTML='<div class="result-card"><div class="result-grid">'
    +'<div class="rr"><div class="rrl">Final WPM</div><div class="rrv">'+wpm+'</div></div>'
    +'<div class="rr"><div class="rrl">Accuracy</div><div class="rrv">'+acc+'%</div></div>'
    +'<div class="rr"><div class="rrl">Correct words</div><div class="rrv">'+correct+'</div></div>'
    +'<div class="rr"><div class="rrl">Total typed</div><div class="rrv">'+typed.length+'</div></div>'
    +'</div></div>';
}
startTest();
</script>
</body>
</html>
