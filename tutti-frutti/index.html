<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9523976383161076" crossorigin="anonymous"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tutti Frutti Online con Timer — Calculadora.live</title>
<meta name="description" content="Jugá al Tutti Frutti online. Sorteá una letra al azar, configurá tus propias categorías, el tiempo por ronda y las letras excluidas. ¡Gratis y sin registro!">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://calculadora.live/tutti-frutti/">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F0F2F7;--surface:#FFF;--ink:#080A12;--ink-light:#60647A;--ink-faint:#B4B8CC;--hi:#1A5FE8;--hi-soft:#EEF3FD;--border:#D4D8E6;--radius:16px;--radius-sm:10px;--dark:#0C1528}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;transition:background .3s}
  body.playing{background:var(--dark);color:#fff}

  /* Header */
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;position:sticky;top:0;z-index:100;transition:background .3s,border-color .3s}
  body.playing header{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1)}
  .logo{font-size:18px;font-weight:700;color:var(--ink);text-decoration:none;letter-spacing:-0.02em}.logo span{color:var(--hi)}
  body.playing .logo{color:#fff}
  .header-right{display:flex;align-items:center;gap:10px}

  /* ── CONFIG SCREEN ── */
  #screen-config{padding:28px 20px 60px;max-width:520px;margin:0 auto}
  .page-title{font-size:28px;font-weight:700;letter-spacing:-0.03em;margin-bottom:4px;text-align:center}
  .page-sub{font-size:14px;color:var(--ink-light);text-align:center;margin-bottom:28px}
  .card{background:var(--surface);border-radius:var(--radius);padding:20px;margin-bottom:14px;border:1px solid var(--border)}
  .card-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:14px}

  /* Categories */
  .cats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .cat-toggle{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--radius-sm);border:1.5px solid var(--border);cursor:pointer;transition:all .15s;user-select:none}
  .cat-toggle:hover{border-color:var(--hi)}
  .cat-toggle.checked{background:var(--hi-soft);border-color:var(--hi)}
  .cat-toggle input{display:none}
  .cat-check{width:18px;height:18px;border-radius:4px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
  .cat-toggle.checked .cat-check{background:var(--hi);border-color:var(--hi);color:#fff}
  .cat-name{font-size:13px;font-weight:600;flex:1;line-height:1.2}
  .cat-icon{font-size:16px;flex-shrink:0}

  /* Timer options */
  .timer-opts{display:flex;gap:8px;flex-wrap:wrap}
  .timer-opt{padding:8px 14px;border-radius:99px;border:1.5px solid var(--border);background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--ink-light);cursor:pointer;transition:all .15s}
  .timer-opt:hover{border-color:var(--hi);color:var(--hi)}
  .timer-opt.active{background:var(--hi);border-color:var(--hi);color:#fff}

  /* Options toggles */
  .opt-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
  .opt-row+.opt-row{border-top:1px solid var(--bg)}
  .opt-lbl{font-size:14px;font-weight:500;color:var(--ink)}
  .toggle{position:relative;width:40px;height:22px;flex-shrink:0}
  .toggle input{opacity:0;width:0;height:0}
  .toggle-track{position:absolute;inset:0;background:var(--border);border-radius:11px;cursor:pointer;transition:.2s}
  .toggle input:checked + .toggle-track{background:var(--hi)}
  .toggle-track::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:.2s}
  .toggle input:checked + .toggle-track::after{left:21px}

  /* Start button */
  .start-btn{width:100%;padding:18px;background:var(--hi);border:none;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:18px;font-weight:700;color:#fff;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:4px}
  .start-btn:hover{background:#1550CC;transform:translateY(-2px);box-shadow:0 8px 24px rgba(26,95,232,.35)}
  .start-btn:active{transform:translateY(0)}

  /* ── GAME SCREEN ── */
  #screen-game{display:none;min-height:calc(100vh - 56px);flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
  body.playing #screen-game{display:flex}

  /* Timer ring */
  .timer-ring-wrap{position:relative;width:200px;height:200px;margin:0 auto 0}
  .timer-ring-svg{transform:rotate(-90deg)}
  .timer-ring-bg{fill:none;stroke:rgba(255,255,255,.08)}
  .timer-ring-fill{fill:none;stroke:var(--hi);stroke-linecap:round;transition:stroke-dashoffset .9s linear,stroke .5s}
  .letter-display{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .letter-char{font-size:90px;font-weight:700;color:#fff;line-height:1;letter-spacing:-0.04em;transition:transform .1s}
  .letter-char.pop{animation:letter-pop .4s cubic-bezier(.34,1.56,.64,1)}
  @keyframes letter-pop{0%{transform:scale(.2);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
  .timer-text{font-size:16px;font-weight:700;color:rgba(255,255,255,.6);margin-top:4px}
  .timer-done{font-size:13px;font-weight:600;color:#EF4444}

  /* Categories in game */
  .cats-game-list{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:20px 0;max-width:420px}
  .cat-game-pill{padding:6px 14px;background:rgba(255,255,255,.08);border-radius:99px;font-size:13px;font-weight:600;color:rgba(255,255,255,.8)}

  /* Action buttons */
  .action-btns{display:flex;gap:12px;margin-top:8px;width:100%;max-width:380px}
  .btn-next{flex:1;padding:15px;background:var(--hi);border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;color:#fff;cursor:pointer;transition:all .18s}
  .btn-next:hover{background:#1550CC}
  .btn-stop{padding:15px 20px;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;color:rgba(255,255,255,.6);cursor:pointer;transition:all .15s}
  .btn-stop:hover{background:rgba(255,255,255,.12);color:#fff}

  /* Historial de letras */
  .history-wrap{margin-top:20px;max-width:420px;width:100%}
  .history-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:8px}
  .history-chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
  .hist-chip{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.07);font-size:15px;font-weight:700;color:rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center}

  /* Tiempo! overlay */
  .tiempo-msg{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:200;background:rgba(0,0,0,.7);backdrop-filter:blur(4px)}
  .tiempo-msg.show{display:flex}
  .tiempo-inner{text-align:center;padding:40px;animation:pop-in .3s ease-out}
  .tiempo-big{font-size:56px;font-weight:700;color:#fff;letter-spacing:-0.03em;margin-bottom:8px}
  .tiempo-sub{font-size:16px;color:rgba(255,255,255,.6);margin-bottom:24px}
  .tiempo-next{padding:14px 32px;background:var(--hi);border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;color:#fff;cursor:pointer}
  @keyframes pop-in{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<header>
  <a class="logo" href="/">Calculadora<span>.live</span></a></header>

<!-- ── CONFIG ── -->
<div id="screen-config">
  <h1 class="page-title">Tutti Frutti</h1>
  <p class="page-sub">Configurá las categorías y ¡a jugar!</p>

  <!-- Categorías -->
  <div class="card">
    <div class="card-title">Categorías</div>
    <div class="cats-grid" id="cats-grid"></div>
    <div id="custom-cats-grid" class="cats-grid" style="margin-top:8px"></div>
    <div style="margin-top:12px;display:flex;gap:8px;align-items:center">
      <input id="custom-cat-name" type="text" placeholder="Agregar categoría… ej: Superhéroe" maxlength="30"
        style="flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);outline:none;background:#fff;transition:border-color .15s"
        onfocus="this.style.borderColor='var(--hi)'" onblur="this.style.borderColor='var(--border)'"
        onkeydown="if(event.key==='Enter'){addCustomCat();event.preventDefault()}">
      <button onclick="addCustomCat()"
        style="padding:10px 16px;background:var(--hi);border:none;border-radius:var(--radius-sm);color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .15s"
        onmouseover="this.style.background='#1550CC'" onmouseout="this.style.background='var(--hi)'">+ Agregar</button>
    </div>
  </div>

  <!-- Timer -->
  <div class="card">
    <div class="card-title">Tiempo por ronda</div>
    <div class="timer-opts" id="timer-opts">
      <button class="timer-opt" data-s="0"   onclick="setTimer(0,this)">Sin tiempo</button>
      <button class="timer-opt active" data-s="60"  onclick="setTimer(60,this)">1 min</button>
      <button class="timer-opt" data-s="90"  onclick="setTimer(90,this)">1:30 min</button>
      <button class="timer-opt" data-s="120" onclick="setTimer(120,this)">2 min</button>
      <button class="timer-opt" id="btn-custom-timer" onclick="setTimerCustom(this)">✏️ Personalizar</button>
    </div>
    <div id="custom-timer-row" style="display:none;margin-top:10px;align-items:center;gap:10px">
      <input id="custom-timer-secs" type="number" min="1" max="3600" placeholder="60"
        style="width:80px;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;color:var(--ink);outline:none;text-align:center;transition:border-color .15s"
        onfocus="this.style.borderColor='var(--hi)'" onblur="this.style.borderColor='var(--border)'"
        oninput="timerSecs=Math.max(1,parseInt(this.value)||60)">
      <span style="font-size:13px;color:var(--ink-light)">segundos por ronda</span>
    </div>
  </div>

  <!-- Opciones -->
  <div class="card">
    <div class="card-title">Opciones</div>
    <div class="opt-row">
      <span class="opt-lbl">Incluir Ñ</span>
      <label class="toggle"><input type="checkbox" id="opt-enie" checked><div class="toggle-track"></div></label>
    </div>
    <div class="opt-row">
      <span class="opt-lbl">Excluir letras raras (K, W, X, Y)</span>
      <label class="toggle"><input type="checkbox" id="opt-raras"><div class="toggle-track"></div></label>
    </div>
    <div class="opt-row">
      <span class="opt-lbl">No repetir letras jugadas</span>
      <label class="toggle"><input type="checkbox" id="opt-norep" checked><div class="toggle-track"></div></label>
    </div>
    <div class="opt-row" style="flex-direction:column;align-items:flex-start;gap:8px;padding-top:12px">
      <span class="opt-lbl">Excluir letras adicionales</span>
      <input id="custom-exclude" type="text" placeholder="Ej: Q  Z  V" maxlength="20"
        style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;color:var(--ink);outline:none;letter-spacing:0.15em;text-transform:uppercase;transition:border-color .15s"
        onfocus="this.style.borderColor='var(--hi)'" onblur="this.style.borderColor='var(--border)'"
        oninput="this.value=this.value.toUpperCase().replace(/[^A-ZÁÉÍÓÚÑ\s]/g,'')">
    </div>
  </div>

  <button class="start-btn" onclick="startGame()">🎲 Sortear letra</button>
</div>

<!-- ── GAME ── -->
<div id="screen-game">
  <!-- Timer + Letra -->
  <div class="timer-ring-wrap" id="ring-wrap">
    <svg class="timer-ring-svg" width="200" height="200" viewBox="0 0 200 200">
      <circle class="timer-ring-bg" cx="100" cy="100" r="88" stroke-width="8"/>
      <circle class="timer-ring-fill" id="ring-fill" cx="100" cy="100" r="88" stroke-width="8"
        stroke-dasharray="553" stroke-dashoffset="0"/>
    </svg>
    <div class="letter-display">
      <div class="letter-char" id="letter-char">?</div>
      <div class="timer-text" id="timer-text"></div>
    </div>
  </div>

  <!-- Categorías activas -->
  <div class="cats-game-list" id="cats-game-list"></div>

  <!-- Botones -->
  <div class="action-btns">
    <button class="btn-next" onclick="nextLetter()">🎲 Nueva letra</button>
    <button class="btn-stop" onclick="stopGame()">✕ Terminar</button>
  </div>

  <!-- Historial -->
  <div class="history-wrap">
    <div class="history-label">Letras jugadas</div>
    <div class="history-chips" id="history-chips"></div>
  </div>
</div>

<!-- Tiempo! overlay -->
<div class="tiempo-msg" id="tiempo-msg">
  <div class="tiempo-inner">
    <div class="tiempo-big">⏰ ¡Tiempo!</div>
    <div class="tiempo-sub">Paren de escribir</div>
    <button class="tiempo-next" onclick="closeTiempo()">Siguiente letra →</button>
  </div>
</div>

<script>
  /* ── Categorías disponibles ── */
  const ALL_CATS = [
    { id:'nombre',    name:'Nombre',        icon:'👤', checked:true  },
    { id:'apellido',  name:'Apellido',       icon:'👨‍👩‍👧', checked:true  },
    { id:'pais',      name:'País',           icon:'🌍', checked:true  },
    { id:'ciudad',    name:'Ciudad',         icon:'🏙️', checked:true  },
    { id:'animal',    name:'Animal',         icon:'🐾', checked:true  },
    { id:'fruta',     name:'Fruta/Verdura',  icon:'🍎', checked:true  },
    { id:'color',     name:'Color',          icon:'🎨', checked:true  },
    { id:'cosa',      name:'Cosa/Objeto',    icon:'📦', checked:true  },
    { id:'comida',    name:'Comida/Bebida',  icon:'🍽️', checked:false },
    { id:'deporte',   name:'Deporte',        icon:'⚽', checked:false },
    { id:'marca',     name:'Marca',          icon:'🏷️', checked:false },
    { id:'profesion', name:'Profesión',      icon:'💼', checked:false },
    { id:'pelicula',  name:'Película/Serie', icon:'🎬', checked:false },
    { id:'cancion',   name:'Canción/Artista',icon:'🎵', checked:false },
    { id:'flor',      name:'Flor/Planta',    icon:'🌿', checked:false },
  ];

  /* ── Estado ── */
  let timerSecs    = 60;
  let timerLeft    = 0;
  let timerIv      = null;
  let usedLetters  = [];
  let customCats   = [];
  const CIRCUMFERENCE = 2 * Math.PI * 88; // r=88

  /* ── Alphabet ── */
  function getAlphabet(){
    var base = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
    if(document.getElementById('opt-enie').checked) base.push('Ñ');
    if(document.getElementById('opt-raras').checked) base = base.filter(l=>!['K','W','X','Y'].includes(l));
    // Letras extra excluidas manualmente
    var excluir = document.getElementById('custom-exclude').value
      .toUpperCase().replace(/\s/g,'').split('').filter(Boolean);
    if(excluir.length) base = base.filter(l=>!excluir.includes(l));
    return base;
  }

  /* ── Categorías personalizadas ── */
  function addCustomCat(){
    var inp = document.getElementById('custom-cat-name');
    var name = inp.value.trim();
    if(!name) return;
    var cat = { id:'custom_'+Date.now(), name:name, icon:'⭐', checked:true };
    customCats.push(cat);
    inp.value = '';
    renderCustomCats();
  }

  function renderCustomCats(){
    var grid = document.getElementById('custom-cats-grid');
    grid.innerHTML = '';
    customCats.forEach(function(c){
      var div = document.createElement('div');
      div.className = 'cat-toggle' + (c.checked?' checked':'');
      div.innerHTML = '<div class="cat-check">'+(c.checked?'✓':'')+'</div>'
        + '<span class="cat-icon">'+c.icon+'</span>'
        + '<span class="cat-name">'+c.name+'</span>'
        + '<button onclick="removeCustomCat(\''+c.id+'\')" title="Eliminar" '
        + 'style="margin-left:auto;background:none;border:none;cursor:pointer;color:var(--ink-faint);font-size:14px;padding:0 2px;line-height:1" '
        + 'onmouseover="this.style.color=\'#EF4444\'" onmouseout="this.style.color=\'var(--ink-faint)\'">✕</button>';
      div.onclick = function(e){
        if(e.target.tagName==='BUTTON') return;
        c.checked = !c.checked;
        div.classList.toggle('checked', c.checked);
        div.querySelector('.cat-check').textContent = c.checked ? '✓' : '';
      };
      grid.appendChild(div);
    });
  }

  function removeCustomCat(id){
    customCats = customCats.filter(function(c){ return c.id !== id; });
    renderCustomCats();
  }

  function getAllActiveCats(){
    return ALL_CATS.concat(customCats).filter(function(c){ return c.checked; });
  }

  /* ── Timer personalizado ── */
  function setTimerCustom(btn){
    document.querySelectorAll('.timer-opt').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    var row = document.getElementById('custom-timer-row');
    row.style.display = 'flex';
    var inp = document.getElementById('custom-timer-secs');
    timerSecs = Math.max(1, parseInt(inp.value)||60);
    inp.focus();
  }

  /* ── Build config UI ── */
  (function(){
    var grid = document.getElementById('cats-grid');
    ALL_CATS.forEach(function(c){
      var div = document.createElement('div');
      div.className = 'cat-toggle' + (c.checked?' checked':'');
      div.dataset.id = c.id;
      div.innerHTML = '<div class="cat-check">'+(c.checked?'✓':'')+'</div>'
        + '<span class="cat-icon">'+c.icon+'</span>'
        + '<span class="cat-name">'+c.name+'</span>';
      div.onclick = function(){
        c.checked = !c.checked;
        div.classList.toggle('checked', c.checked);
        div.querySelector('.cat-check').textContent = c.checked ? '✓' : '';
      };
      grid.appendChild(div);
    });
  })();

  function setTimer(s, btn){
    timerSecs = s;
    document.querySelectorAll('.timer-opt').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    document.getElementById('custom-timer-row').style.display = 'none';
  }

  /* ── Start game ── */
  function startGame(){
    var activeCats = getAllActiveCats();
    if(activeCats.length === 0){ alert('Seleccioná al menos una categoría.'); return; }
    usedLetters = [];
    document.getElementById('history-chips').innerHTML = '';
    buildGameCats(activeCats);
    document.body.classList.add('playing');
    document.getElementById('screen-config').style.display = 'none';
    document.getElementById('screen-game').style.display = 'flex';
    document.getElementById('back-lnk').style.display = 'none';
    pickLetter();
  }

  function buildGameCats(cats){
    var list = document.getElementById('cats-game-list');
    list.innerHTML = '';
    cats.forEach(function(c){
      var pill = document.createElement('div');
      pill.className = 'cat-game-pill';
      pill.textContent = c.icon + ' ' + c.name;
      list.appendChild(pill);
    });
  }

  /* ── Pick a letter ── */
  function pickLetter(){
    stopTimer();
    var pool = getAlphabet();
    if(document.getElementById('opt-norep').checked){
      pool = pool.filter(function(l){ return !usedLetters.includes(l); });
    }
    if(pool.length === 0){
      // All letters used — restart
      usedLetters = [];
      pool = getAlphabet();
      document.getElementById('history-chips').innerHTML = '';
    }
    var letter = pool[Math.floor(Math.random() * pool.length)];
    usedLetters.push(letter);
    revealLetter(letter);
    addToHistory(letter);
    if(timerSecs > 0) startTimer(timerSecs);
  }

  /* ── Shuffle animation ── */
  function revealLetter(final){
    var el = document.getElementById('letter-char');
    el.classList.remove('pop');
    var pool = getAlphabet();
    var count = 0, total = 18;
    var iv = setInterval(function(){
      count++;
      el.textContent = pool[Math.floor(Math.random()*pool.length)];
      el.style.opacity = 0.3 + (count/total)*0.7;
      if(count >= total){
        clearInterval(iv);
        el.textContent = final;
        el.style.opacity = 1;
        void el.offsetWidth;
        el.classList.add('pop');
      }
    }, 55);
  }

  /* ── Timer ── */
  function startTimer(secs){
    timerLeft = secs;
    var fill = document.getElementById('ring-fill');
    fill.style.stroke = 'var(--hi)';
    fill.style.strokeDashoffset = 0;
    updateTimerDisplay();
    timerIv = setInterval(function(){
      timerLeft--;
      var progress = timerLeft / secs;
      fill.style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);
      if(timerLeft <= 10) fill.style.stroke = '#EF4444';
      if(timerLeft <= 0){
        stopTimer();
        showTiempo();
      }
      updateTimerDisplay();
    }, 1000);
  }

  function stopTimer(){
    if(timerIv){ clearInterval(timerIv); timerIv=null; }
    document.getElementById('timer-text').textContent = '';
    var fill = document.getElementById('ring-fill');
    fill.style.strokeDashoffset = 0;
    fill.style.stroke = 'var(--hi)';
  }

  function updateTimerDisplay(){
    if(timerSecs <= 0){ document.getElementById('timer-text').textContent = ''; return; }
    var m = Math.floor(timerLeft/60), s = timerLeft%60;
    document.getElementById('timer-text').textContent = (m>0?m+':':'') + (s<10&&m>0?'0':'')+s;
  }

  /* ── Tiempo! overlay ── */
  function showTiempo(){ document.getElementById('tiempo-msg').classList.add('show'); }
  function closeTiempo(){
    document.getElementById('tiempo-msg').classList.remove('show');
    pickLetter();
  }

  /* ── Next letter ── */
  function nextLetter(){
    document.getElementById('tiempo-msg').classList.remove('show');
    pickLetter();
  }

  /* ── History ── */
  function addToHistory(letter){
    var chip = document.createElement('div');
    chip.className = 'hist-chip';
    chip.textContent = letter;
    document.getElementById('history-chips').appendChild(chip);
  }

  /* ── Stop game ── */
  function stopGame(){
    stopTimer();
    document.body.classList.remove('playing');
    document.getElementById('screen-config').style.display = 'block';
    document.getElementById('screen-game').style.display = 'none';
    document.getElementById('back-lnk').style.display = '';
    document.getElementById('tiempo-msg').classList.remove('show');
  }
</script>
<script src="/nav.js"></script>
</body>
</html>
