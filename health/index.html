<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9523976383161076" crossorigin="anonymous"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health & Fitness Calculators — calculate.website</title>
<meta name="description" content="Free health and fitness calculators: BMI, daily calories, protein intake, hydration, weight loss and more. Instant results, no sign-up.">
<link rel="canonical" href="https://calculate.website/health/">
<meta property="og:title" content="Health & Fitness Calculators — calculate.website">
<meta property="og:url" content="https://calculate.website/health/">
<meta property="og:image" content="https://calculate.website/og-image.png">
<meta property="og:locale" content="en_US">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F8FA;--surface:#FFF;--ink:#0A0E1A;--ink-2:#363B4F;--ink-3:#858AA0;--line:#E4E7EE;--accent:#4F6BFF;--accent-soft:#EEF1FF;--dark:#0A0E1A;--dark-line:#1F2438;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
header{background:var(--dark);border-bottom:1px solid var(--dark-line);position:sticky;top:0;z-index:100;display:flex;align-items:center;height:58px;padding:0 20px}
.logo{font-size:16px;font-weight:700;letter-spacing:-0.03em;flex-shrink:0;text-decoration:none}
.logo .name{color:#fff}
.logo .dot{color:var(--accent)}

.cat-hero{background:var(--dark);padding:64px 0 96px;position:relative;overflow:hidden}
.cat-hero::before{content:'';position:absolute;top:-100px;right:-60px;width:600px;height:600px;background:radial-gradient(circle,rgba(79,107,255,.14) 0%,transparent 55%);pointer-events:none}
.cat-inner{max-width:1240px;margin:0 auto;padding:0 32px;position:relative;z-index:1}
.cat-breadcrumb{font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,.4);margin-bottom:20px;letter-spacing:.03em}
.cat-breadcrumb a{color:rgba(255,255,255,.4);text-decoration:none;transition:color .15s}
.cat-breadcrumb a:hover{color:rgba(255,255,255,.7)}
.cat-breadcrumb span{color:rgba(255,255,255,.25);margin:0 6px}
.cat-tag{display:inline-flex;align-items:center;gap:8px;padding:5px 12px;background:rgba(79,107,255,.18);border:1px solid rgba(79,107,255,.3);border-radius:99px;font-size:11px;font-weight:600;color:rgba(255,255,255,.7);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.08em;margin-bottom:20px}
h1{font-size:54px;font-weight:800;letter-spacing:-0.04em;color:#fff;line-height:1.05;margin-bottom:14px}
.cat-desc{font-size:17px;color:rgba(255,255,255,.55);line-height:1.6;max-width:540px}

.cat-main{max-width:1240px;margin:-48px auto 0;padding:0 32px 100px;position:relative;z-index:2}
.section-label{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin-bottom:18px;display:flex;align-items:center;gap:10px}
.section-label::after{content:'';flex:1;height:1px;background:var(--line)}

@media(max-width:768px){h1{font-size:38px}.cat-inner,.cat-main{padding:0 20px}.cat-main{margin-top:-32px}}
@media(max-width:480px){h1{font-size:30px}.cat-hero{padding:48px 0 72px}}
</style>
</head>
<body>
<header>
  <a href="/" class="logo"><span class="name">calculate</span><span class="dot">.website</span></a>
</header>

<div class="cat-hero">
  <div class="cat-inner">
    <div class="cat-breadcrumb"><a href="/">calculate.website</a><span>/</span>Health & Fitness</div>
    <div class="cat-tag">💪 Health & Fitness</div>
    <h1>Health &amp;<br>Fitness</h1>
    <p class="cat-desc">BMI, calories, protein, hydration, weight loss and more. Science-based tools to track and improve your health.</p>
  </div>
</div>

<main class="cat-main">
  <div class="section-label">All calculators</div>
  <div id="cat-grid-root"></div>
</main>

<script src="/nav.js"></script>
</body>
</html>
