<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statistics Calculator — Mean, Median, Mode, Standard Deviation | calculate.website</title>
<meta name="description" content="Calculate mean, median, mode, standard deviation, variance and more from any dataset. Free statistics calculator online.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://calculate.website/statistics/">
<link rel="alternate" hreflang="en" href="https://calculate.website/statistics/">
<link rel="alternate" hreflang="es" href="https://calculate.website/es/statistics/">
<link rel="alternate" hreflang="pt-BR" href="https://calculate.website/pt/statistics/">
<link rel="alternate" hreflang="fr" href="https://calculate.website/fr/statistics/">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F8FA;--surface:#fff;--ink:#0A0E1A;--ink-2:#363B4F;--ink-3:#858AA0;--line:#E4E7EE;--accent:#4F6BFF;--accent-soft:#EEF1FF;--pos:#22C55E;--radius:16px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}a{color:inherit;text-decoration:none}
header{background:#0A0E1A;border-bottom:1px solid #1F2438;position:sticky;top:0;z-index:100;display:flex;align-items:center;height:58px;padding:0 20px}
.logo{font-size:16px;font-weight:700;letter-spacing:-0.03em;color:#fff}.logo span{color:var(--accent)}
.hero{background:#0A0E1A;color:#fff;padding:48px 20px 72px;text-align:center}
.bc{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:16px}.bc a{color:rgba(255,255,255,.4)}.bc a:hover{color:#fff}.bc span{margin:0 6px;opacity:.4}
h1{font-size:clamp(28px,5vw,44px);font-weight:800;letter-spacing:-0.03em;margin-bottom:12px}.sub{font-size:16px;color:rgba(255,255,255,.6);max-width:500px;margin:0 auto}
main{max-width:520px;margin:-40px auto 0;padding:0 16px 80px;position:relative;z-index:2}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:28px;box-shadow:0 4px 24px rgba(10,14,26,.06);margin-bottom:16px}
label{display:block;font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:6px}
textarea{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:15px;font-family:'JetBrains Mono',monospace;color:var(--ink);background:var(--bg);outline:none;transition:border-color .15s;resize:vertical;min-height:100px}
textarea:focus{border-color:var(--accent)}
.hint{font-size:12px;color:var(--ink-3);margin-top:6px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.stat-box{background:var(--bg);border:1.5px solid var(--line);border-radius:10px;padding:14px 16px}
.stat-box.highlight{border-color:var(--accent);background:var(--accent-soft)}
.sb-label{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3);margin-bottom:4px}
.stat-box.highlight .sb-label{color:var(--accent)}
.sb-val{font-size:22px;font-weight:800;color:var(--ink);font-family:'JetBrains Mono',monospace;letter-spacing:-0.02em}
.stat-box.highlight .sb-val{color:var(--accent)}
.empty{color:var(--ink-3);font-size:14px;text-align:center;padding:16px 0}
@media(max-width:400px){.stats-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><a href="/" class="logo">calculate<span>.website</span></a></header>
<div class="hero">
  <div class="bc"><a href="/">Home</a><span>›</span><a href="/math/">Math</a><span>›</span>Statistics Calculator</div>
  <h1>📈 Statistics Calculator</h1>
  <p class="sub">Enter a list of numbers and instantly get mean, median, mode, standard deviation, and more.</p>
</div>
<main>
  <div class="card">
    <label>Enter numbers (separated by commas, spaces or new lines)</label>
    <textarea id="nums" placeholder="e.g. 4, 8, 15, 16, 23, 42" oninput="calc()"></textarea>
    <p class="hint">Example: 4, 8, 15, 16, 23, 42</p>
    <div id="result"><div class="empty">Enter numbers above to see statistics</div></div>
  </div>
</main>
<script src="/nav.js"></script>
<script>
function fmt(n){return isNaN(n)?'—':parseFloat(n.toFixed(4)).toString();}
function calc(){
  var raw=document.getElementById('nums').value;
  var nums=raw.split(/[\s,;]+/).map(Number).filter(function(n){return !isNaN(n)&&raw.trim()!=='';});
  if(nums.length===0){document.getElementById('result').innerHTML='<div class="empty">Enter numbers above to see statistics</div>';return;}
  var n=nums.length;
  var sum=nums.reduce(function(a,b){return a+b;},0);
  var mean=sum/n;
  var sorted=nums.slice().sort(function(a,b){return a-b;});
  var median=n%2===0?(sorted[n/2-1]+sorted[n/2])/2:sorted[Math.floor(n/2)];
  var freq={};nums.forEach(function(x){freq[x]=(freq[x]||0)+1;});
  var maxF=Math.max.apply(null,Object.values(freq));
  var modes=Object.keys(freq).filter(function(k){return freq[k]===maxF;});
  var modeStr=maxF===1?'None':modes.join(', ');
  var variance=nums.reduce(function(a,x){return a+(x-mean)*(x-mean);},0)/(n-1);
  var stdDev=Math.sqrt(variance);
  var range=sorted[n-1]-sorted[0];
  var q1=sorted[Math.floor(n/4)];
  var q3=sorted[Math.floor(3*n/4)];
  document.getElementById('result').innerHTML='<div class="stats-grid">'
    +'<div class="stat-box highlight"><div class="sb-label">Mean</div><div class="sb-val">'+fmt(mean)+'</div></div>'
    +'<div class="stat-box highlight"><div class="sb-label">Median</div><div class="sb-val">'+fmt(median)+'</div></div>'
    +'<div class="stat-box"><div class="sb-label">Std Deviation</div><div class="sb-val">'+fmt(stdDev)+'</div></div>'
    +'<div class="stat-box"><div class="sb-label">Variance</div><div class="sb-val">'+fmt(variance)+'</div></div>'
    +'<div class="stat-box"><div class="sb-label">Mode</div><div class="sb-val" style="font-size:16px">'+modeStr+'</div></div>'
    +'<div class="stat-box"><div class="sb-label">Range</div><div class="sb-val">'+fmt(range)+'</div></div>'
    +'<div class="stat-box"><div class="sb-label">Min</div><div class="sb-val">'+fmt(sorted[0])+'</div></div>'
    +'<div class="stat-box"><div class="sb-label">Max</div><div class="sb-val">'+fmt(sorted[n-1])+'</div></div>'
    +'<div class="stat-box"><div class="sb-label">Sum</div><div class="sb-val">'+fmt(sum)+'</div></div>'
    +'<div class="stat-box"><div class="sb-label">Count</div><div class="sb-val">'+n+'</div></div>'
    +'</div>';
}
</script>
</body>
</html>
