<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salary Calculator — Annual, Monthly & Hourly Rate | calculate.website</title>
<meta name="description" content="Convert between annual salary, monthly salary and hourly rate. Calculate your take-home pay. Free salary calculator.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://calculate.website/salary/">
<link rel="alternate" hreflang="en" href="https://calculate.website/salary/">
<link rel="alternate" hreflang="es" href="https://calculate.website/es/salary/">
<link rel="alternate" hreflang="pt-BR" href="https://calculate.website/pt/salary/">
<link rel="alternate" hreflang="fr" href="https://calculate.website/fr/salary/">
<link rel="alternate" hreflang="x-default" href="https://calculate.website/salary/">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F8FA;--surface:#fff;--ink:#0A0E1A;--ink-2:#363B4F;--ink-3:#858AA0;--line:#E4E7EE;--accent:#4F6BFF;--accent-soft:#EEF1FF;--pos:#22C55E;--radius:16px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}a{color:inherit;text-decoration:none}
header{background:#0A0E1A;border-bottom:1px solid #1F2438;position:sticky;top:0;z-index:100;display:flex;align-items:center;height:58px;padding:0 20px}
.logo{font-size:16px;font-weight:700;letter-spacing:-0.03em;color:#fff}.logo span{color:var(--accent)}
.hero{background:#0A0E1A;color:#fff;padding:48px 20px 72px;text-align:center}
.bc{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:16px}.bc a{color:rgba(255,255,255,.4)}.bc a:hover{color:#fff}.bc span{margin:0 6px;opacity:.4}
h1{font-size:clamp(28px,5vw,44px);font-weight:800;letter-spacing:-0.03em;margin-bottom:12px}.sub{font-size:16px;color:rgba(255,255,255,.6);max-width:500px;margin:0 auto}
main{max-width:520px;margin:-40px auto 0;padding:0 16px 80px;position:relative;z-index:2}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:28px;box-shadow:0 4px 24px rgba(10,14,26,.06);margin-bottom:16px}
.field{margin-bottom:18px}label{display:block;font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:6px}
input[type="number"]{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:15px;font-family:inherit;color:var(--ink);background:var(--bg);outline:none;transition:border-color .15s;-moz-appearance:textfield}
input[type="number"]::-webkit-outer-spin-button,input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none}input:focus{border-color:var(--accent)}
.presets{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.preset{padding:4px 10px;background:var(--accent-soft);color:var(--accent);border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}.preset:hover{background:var(--accent);color:#fff}
.result-card{background:linear-gradient(135deg,#EEF1FF,#E8EEFF);border:1px solid rgba(79,107,255,.2);border-radius:12px;padding:20px 24px;margin-top:4px}
.result-lbl{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:rgba(10,14,26,.4);margin-bottom:4px}
.result-rows{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
.result-row{display:flex;flex-direction:column;gap:3px}.rrl{font-size:11px;color:rgba(10,14,26,.4);font-weight:600;text-transform:uppercase;letter-spacing:.05em}.rrv{font-size:22px;font-weight:800;color:var(--ink);letter-spacing:-0.02em}
.rrv.big{font-size:32px;background:linear-gradient(135deg,#4F6BFF,#7C5CFF);-webkit-background-clip:text;background-clip:text;color:transparent}
.empty{color:var(--ink-3);font-size:14px;text-align:center;padding:16px 0}
@media(max-width:480px){.result-rows{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><a href="/" class="logo">calculate<span>.website</span></a></header>
<div class="hero">
  <div class="bc"><a href="/">Home</a><span>›</span><a href="/finance/">Finance</a><span>›</span>Salary Calculator</div>
  <h1>💼 Salary Calculator</h1>
  <p class="sub">Convert between annual, monthly, weekly and hourly salary. Enter any value to see all breakdowns.</p>
</div>
<main>
  <div class="card">
    <div class="field">
      <label>Annual salary</label>
      <input type="number" id="annual" min="0" placeholder="e.g. 60000" oninput="calcFrom('annual')">
      <div class="presets">
        <button class="preset" onclick="setV('annual',40000)">$40k</button>
        <button class="preset" onclick="setV('annual',60000)">$60k</button>
        <button class="preset" onclick="setV('annual',80000)">$80k</button>
        <button class="preset" onclick="setV('annual',100000)">$100k</button>
      </div>
    </div>
    <div class="field">
      <label>Monthly salary</label>
      <input type="number" id="monthly" min="0" placeholder="e.g. 5000" oninput="calcFrom('monthly')">
    </div>
    <div class="field">
      <label>Hours per week</label>
      <input type="number" id="hours" min="1" max="80" value="40" placeholder="40" oninput="recalc()">
    </div>
    <div id="result"><div class="empty">Enter a salary amount above</div></div>
  </div>
</main>
<script src="/nav.js"></script>
<script>
function fmt(n){return n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function setV(id,v){document.getElementById(id).value=v;calcFrom(id);}
var lastAnnual=0;
function recalc(){if(lastAnnual>0)renderResult(lastAnnual);}
function calcFrom(from){
  var annual=parseFloat(document.getElementById('annual').value);
  var monthly=parseFloat(document.getElementById('monthly').value);
  if(from==='monthly'&&!isNaN(monthly)&&monthly>0){annual=monthly*12;document.getElementById('annual').value=annual;}
  else if(from==='annual'&&!isNaN(annual)&&annual>0){document.getElementById('monthly').value=(annual/12).toFixed(2);}
  if(isNaN(annual)||annual<=0){lastAnnual=0;document.getElementById('result').innerHTML='<div class="empty">Enter a salary amount above</div>';return;}
  lastAnnual=annual;renderResult(annual);
}
function renderResult(annual){
  var hours=parseFloat(document.getElementById('hours').value)||40;
  var monthly=annual/12,weekly=annual/52,daily=annual/260,hourly=annual/(52*hours);
  document.getElementById('result').innerHTML='<div class="result-card"><div class="result-rows">'
    +'<div class="result-row"><div class="rrl">Annual</div><div class="rrv big">$'+fmt(annual)+'</div></div>'
    +'<div class="result-row"><div class="rrl">Monthly</div><div class="rrv">$'+fmt(monthly)+'</div></div>'
    +'<div class="result-row"><div class="rrl">Weekly</div><div class="rrv">$'+fmt(weekly)+'</div></div>'
    +'<div class="result-row"><div class="rrl">Daily</div><div class="rrv">$'+fmt(daily)+'</div></div>'
    +'<div class="result-row"><div class="rrl">Hourly</div><div class="rrv">$'+fmt(hourly)+'</div></div>'
    +'<div class="result-row"><div class="rrl">Hours/week</div><div class="rrv">'+hours+'h</div></div>'
    +'</div></div>';
}
</script>
</body>
</html>
