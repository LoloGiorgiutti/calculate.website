<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuel Cost Calculator — Trip Cost by Distance | calculate.website</title>
<meta name="description" content="Calculate the total fuel cost for any trip. Enter distance, fuel consumption and price per liter. Works with km/L, L/100km and MPG. Free fuel calculator.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://calculate.website/fuel/">
<link rel="alternate" hreflang="en" href="https://calculate.website/fuel/">
<link rel="alternate" hreflang="es" href="https://calculate.website/es/fuel/">
<link rel="alternate" hreflang="pt-BR" href="https://calculate.website/pt/fuel/">
<link rel="alternate" hreflang="fr" href="https://calculate.website/fr/fuel/">
<link rel="alternate" hreflang="x-default" href="https://calculate.website/fuel/">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F8FA;--surface:#fff;--ink:#0A0E1A;--ink-2:#363B4F;--ink-3:#858AA0;--line:#E4E7EE;--accent:#4F6BFF;--accent-soft:#EEF1FF;--pos:#22C55E;--radius:16px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}a{color:inherit;text-decoration:none}
header{background:#0A0E1A;border-bottom:1px solid #1F2438;position:sticky;top:0;z-index:100;display:flex;align-items:center;height:58px;padding:0 20px}
.logo{font-size:16px;font-weight:700;letter-spacing:-0.03em;color:#fff}.logo span{color:var(--accent)}
.hero{background:#0A0E1A;color:#fff;padding:48px 20px 72px;text-align:center}
.bc{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:16px}.bc a{color:rgba(255,255,255,.4)}.bc a:hover{color:#fff}.bc span{margin:0 6px;opacity:.4}
h1{font-size:clamp(28px,5vw,44px);font-weight:800;letter-spacing:-0.03em;margin-bottom:12px}.sub{font-size:16px;color:rgba(255,255,255,.6);max-width:500px;margin:0 auto}
main{max-width:520px;margin:-40px auto 0;padding:0 16px 80px;position:relative;z-index:2}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:28px;box-shadow:0 4px 24px rgba(10,14,26,.06);margin-bottom:16px}
.unit-row{display:flex;gap:8px;margin-bottom:22px}
.unit-btn{flex:1;padding:8px;border:1.5px solid var(--line);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:var(--bg);color:var(--ink-3);font-family:inherit;transition:all .15s;text-align:center}
.unit-btn.active{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.field{margin-bottom:18px}
label{display:block;font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:6px}
input[type="number"]{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:15px;font-family:inherit;color:var(--ink);background:var(--bg);outline:none;transition:border-color .15s;-moz-appearance:textfield}
input[type="number"]::-webkit-outer-spin-button,input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none}
input:focus{border-color:var(--accent)}
.presets{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.preset{padding:4px 10px;background:var(--accent-soft);color:var(--accent);border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}.preset:hover{background:var(--accent);color:#fff}
.result-card{background:linear-gradient(135deg,#EEF1FF,#E8EEFF);border:1px solid rgba(79,107,255,.2);border-radius:12px;padding:20px 24px;margin-top:4px}
.result-lbl{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:rgba(10,14,26,.4);margin-bottom:4px}
.result-big{font-size:42px;font-weight:800;letter-spacing:-0.04em;background:linear-gradient(135deg,#4F6BFF,#7C5CFF);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:2px}
.result-rows{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid rgba(79,107,255,.15)}
.result-row{display:flex;flex-direction:column;gap:3px}
.rrl{font-size:11px;color:rgba(10,14,26,.4);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.rrv{font-size:20px;font-weight:700;color:var(--ink);letter-spacing:-0.02em}
.empty{color:var(--ink-3);font-size:14px;text-align:center;padding:16px 0}
@media(max-width:480px){.result-rows{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><a href="/" class="logo">calculate<span>.website</span></a></header>
<div class="hero">
  <div class="bc"><a href="/">Home</a><span>›</span><a href="/finance/">Finance</a><span>›</span>Fuel Cost Calculator</div>
  <h1>⛽ Fuel Cost Calculator</h1>
  <p class="sub">Calculate the total fuel cost for any trip based on distance, consumption and fuel price.</p>
</div>
<main>
  <div class="card">
    <div class="unit-row">
      <button class="unit-btn active" id="btn-metric" onclick="setUnit('metric')">Metric (km · L)</button>
      <button class="unit-btn" id="btn-imperial" onclick="setUnit('imperial')">Imperial (mi · gal)</button>
    </div>
    <div class="field">
      <label id="dist-lbl">Distance (km)</label>
      <input type="number" id="dist" min="0" step="1" placeholder="e.g. 400">
      <div class="presets">
        <button class="preset" onclick="setV('dist',100)">100</button>
        <button class="preset" onclick="setV('dist',300)">300</button>
        <button class="preset" onclick="setV('dist',500)">500</button>
        <button class="preset" onclick="setV('dist',1000)">1000</button>
      </div>
    </div>
    <div class="field">
      <label id="cons-lbl">Consumption (L/100km)</label>
      <input type="number" id="cons" min="0" step="0.1" placeholder="e.g. 8">
      <div class="presets">
        <button class="preset" onclick="setV('cons',6)">6 L/100</button>
        <button class="preset" onclick="setV('cons',8)">8 L/100</button>
        <button class="preset" onclick="setV('cons',10)">10 L/100</button>
        <button class="preset" onclick="setV('cons',12)">12 L/100</button>
      </div>
    </div>
    <div class="field">
      <label id="price-lbl">Price per liter</label>
      <input type="number" id="ppL" min="0" step="0.001" placeholder="e.g. 1.50">
    </div>
    <div id="result"><div class="empty">Fill in the fields above</div></div>
  </div>
</main>
<script src="/nav.js"></script>
<script>
var unit='metric';
var distEl=document.getElementById('dist'),consEl=document.getElementById('cons'),ppLEl=document.getElementById('ppL'),resEl=document.getElementById('result');
function fmt(n,d){return n.toLocaleString('en-US',{minimumFractionDigits:d||2,maximumFractionDigits:d||2});}
function setV(id,v){document.getElementById(id).value=v;calc();}
function setUnit(u){
  unit=u;
  document.getElementById('btn-metric').classList.toggle('active',u==='metric');
  document.getElementById('btn-imperial').classList.toggle('active',u==='imperial');
  document.getElementById('dist-lbl').textContent=u==='metric'?'Distance (km)':'Distance (miles)';
  document.getElementById('cons-lbl').textContent=u==='metric'?'Consumption (L/100km)':'Fuel efficiency (MPG)';
  document.getElementById('price-lbl').textContent=u==='metric'?'Price per liter':'Price per gallon';
  consEl.placeholder=u==='metric'?'e.g. 8':'e.g. 30';
  calc();
}
function calc(){
  var dist=parseFloat(distEl.value),cons=parseFloat(consEl.value),price=parseFloat(ppLEl.value);
  if(isNaN(dist)||isNaN(cons)||isNaN(price)||dist<=0||cons<=0||price<=0){resEl.innerHTML='<div class="empty">Fill in the fields above</div>';return;}
  var liters,totalCost;
  if(unit==='metric'){liters=dist*cons/100;totalCost=liters*price;}
  else{liters=dist/cons*3.785;totalCost=dist/cons*price;}// MPG: gallons = dist/MPG
  var costPer100km=unit==='metric'?(cons*price):(100/1.60934/cons*3.785*price);
  resEl.innerHTML='<div class="result-card"><div class="result-lbl">Total fuel cost</div><div class="result-big">'+fmt(totalCost)+'</div>'
    +'<div class="result-rows">'
    +'<div class="result-row"><div class="rrl">Fuel needed</div><div class="rrv">'+fmt(liters)+' '+(unit==='metric'?'L':'gal')+'</div></div>'
    +'<div class="result-row"><div class="rrl">Distance</div><div class="rrv">'+fmt(dist,0)+' '+(unit==='metric'?'km':'mi')+'</div></div>'
    +'<div class="result-row"><div class="rrl">Cost per 100km</div><div class="rrv">'+fmt(costPer100km)+'</div></div>'
    +'<div class="result-row"><div class="rrl">Fuel price</div><div class="rrv">'+fmt(price,3)+'/L</div></div>'
    +'</div></div>';
}
[distEl,consEl,ppLEl].forEach(function(el){el.addEventListener('input',calc);});
</script>
</body>
</html>
