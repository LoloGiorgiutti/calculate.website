name: Actualizar Rankings Diario

on:
  # Corre automáticamente todos los días a las 07:00 UTC (04:00 Argentina)
  schedule:
    - cron: '0 7 * * *'
  # También se puede correr manualmente desde la pestaña Actions en GitHub
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Necesario para hacer commit del JSON actualizado

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install google-analytics-data

      - name: Actualizar rankings desde GA4
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA4_CREDENTIALS: ${{ secrets.GA4_CREDENTIALS }}
        run: python scripts/update_rankings.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name "Rankings Bot"
          git config user.email "rankings-bot@calculadora.live"
          git add rankings-data.json
          if git diff --staged --quiet; then
            echo "Sin cambios en rankings-data.json"
          else
            git commit -m "chore: actualizar rankings $(date -u '+%Y-%m-%d') [skip ci]"
            git push
          fi
